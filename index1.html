/* ============================================================
   VALIDATION ENGINE — ported from ValidateDraftSubmittal suite
   ============================================================ */
function validate(silent=false){
  const R=[]; const m=D.master;
  const add=(lvl,cat,msg,pg)=>R.push({lvl,cat,msg,pg});
  const has=v=>String(v??'').trim()!=='';

  /* — ValidateMasterTab — */
  REQ_FIELDS.forEach(([p,label])=>{
    has(getPath(D,p)) ? add('ok','Master',label+' entered','master')
                      : add('err','Master',label+' is required','master');
  });
  if(has(m.smys)&&!isFinite(num(m.smys))) add('err','Master','SMYS is not numeric','master');
  if(has(m.maop)&&!isFinite(num(m.maop))) add('err','Master','MAOP is not numeric','master');
  if(!has(m.mop)) add('warn','Master','MOP blank — enter MAOP value if MOP unknown (workbook rule)','master');

  /* — ValidatePlannedVsActualLength — */
  const pl=num(m.plannedLength), al=num(m.actualLength);
  if(isFinite(pl)&&isFinite(al)){
    Math.abs(pl-al)>0.5
      ? add('warn','Length',`Actual length ${al} ft differs from planned ${pl} ft — confirm and note in comments`,'master')
      : add('ok','Length','Planned vs actual inspection length agree','master');
  } else if(isFinite(pl)&&!isFinite(al)) add('warn','Length','Actual inspection length not entered','master');

  /* — ValidateSectionsTab — */
  if(!D.sections.length) add('err','Sections','No pipe sections entered','sections');
  D.sections.forEach((s,i)=>{
    const a=num(s.start), b=num(s.end);
    if(!isFinite(a)||!isFinite(b)) add('err','Sections',`Section ${i+1} missing start or end distance`,'sections');
    else if(b<=a) add('err','Sections',`Section ${i+1} end (${b}) must be greater than start (${a})`,'sections');
    else add('ok','Sections',`Section ${i+1} geometry OK (${a} → ${b} ft)`,'sections');
    if(i>0){
      const prevEnd=num(D.sections[i-1].end);
      if(isFinite(prevEnd)&&isFinite(a)&&Math.abs(prevEnd-a)>0.01)
        add('warn','Sections',`Gap/overlap between section ${i} end (${prevEnd}) and section ${i+1} start (${a})`,'sections');
    }
    const uttN=s.utt.filter(v=>isFinite(num(v))&&num(v)>0).length;
    if(uttN===0) add('warn','Sections',`Section ${i+1} has no 12-pt UTT readings`,'sections');
    else if(uttN<12) add('warn','Sections',`Section ${i+1} has only ${uttN}/12 UTT readings`,'sections');
    if(!has(s.seamLoc)) add('warn','Sections',`Section ${i+1} long seam location blank (use "SMLS" or "NA" if applicable)`,'sections');
  });
  if(isFinite(num(m.assessStart))&&D.sections.length&&isFinite(num(D.sections[0].start))
     &&Math.abs(num(m.assessStart)-num(D.sections[0].start))>0.01)
    add('warn','Sections','Section 1 start should equal Assessment Start (workbook rule)','sections');

  /* — UTT vs NWT (87.5%) — */
  const nwtMils=wallIn(m.nwt)*1000;
  const uttAll=D.sections.flatMap(s=>s.utt.map(v=>num(v))).filter(v=>isFinite(v)&&v>0);
  if(uttAll.length&&isFinite(nwtMils)){
    const mn=Math.min(...uttAll);
    mn<nwtMils*0.875
      ? add('warn','UTT',`Minimum UTT ${mn} mils is below 87.5% of nominal wall (${fmt(nwtMils*0.875)} mils) — document as metal loss`,'sections')
      : add('ok','UTT','All UTT readings within 87.5% of nominal wall','sections');
  }

  /* — ValidateH1Page — */
  if(!(D.h1.landUse||[]).length) add('warn','H1','Land use not selected','h1');
  if(!(D.h1.soilType||[]).length) add('warn','H1','Native soil type not selected','h1');
  if(!has(D.h1.docCtr)&&!has(D.h1.docUS)&&!has(D.h1.docDS)) add('warn','H1','No depth-of-cover readings entered','h1');
  if(!(D.h1.coatingTypeFound||[]).length) add('warn','H1','Coating type as found not selected','h1');
  (has(D.h1.ps12US)&&has(D.h1.ps12DS)) ? add('ok','H1','P/S in-ditch potentials recorded','h1')
    : add('warn','H1','US and DS pipe-to-soil potentials incomplete','h1');

  /* — Indication completeness — */
  if(D.indications.length){
    let bad=0;
    D.indications.forEach((r,i)=>{
      const missing=['type','dist','clock','len','wid','depth'].filter(k=>!has(r[k]));
      if(missing.length){bad++; add('err','Indications',`Row ${i+1}${r.id?' ('+r.id+')':''} missing: ${missing.join(', ')}`,'ind');}
      const dep=num(r.depth), awt=num(r.awt)||nwtMils;
      if(isFinite(dep)&&isFinite(awt)&&awt>0&&dep/awt>0.8)
        add('err','Indications',`Row ${i+1}${r.id?' ('+r.id+')':''}: depth ${dep} mils exceeds 80% of wall — repair evaluation required`,'ind');
    });
    if(!bad) add('ok','Indications',`All ${D.indications.length} indication rows complete`,'ind');
  } else add('ok','Indications','No indications logged (Sections summary will read "None")','ind');

  /* — RSTRENG required when EC present — */
  { const seen=new Set();
    D.indications.forEach(r=>{ if(!r.type||!r.id)return; const key=r.type+'-'+r.id;
      if(seen.has(key))add('err','Indications',`Duplicate indication ID ${key} — every indication must have a unique type+number`,'ind'); seen.add(key); }); }
  { const seen=new Set();
    D.coatDamage.forEach(r=>{ if(!r.type||!r.no)return; const key=r.type+'-'+r.no;
      if(seen.has(key))add('err','Coating','Duplicate coating damage ID '+key+' — every entry must have a unique type+number','h7'); seen.add(key); }); }
  const hasEC=D.indications.some(r=>['EC','CEC','EML'].includes(r.type))||D.corrLog.length>0;
  const gridsRun=D.rstreng.grids.filter(g=>g.results);
  if(hasEC){
    gridsRun.length ? add('ok','RSTRENG',`Failure pressure calculated on ${gridsRun.length} grid(s)`,'h4')
                    : add('warn','RSTRENG','External corrosion logged but RSTRENG has not been run','h4');
  }
  gridsRun.forEach((g,i)=>{ if(g.results.pctWall>80)
    add('err','RSTRENG',`Grid: max defect depth ${g.results.pctWall.toFixed(1)}% of wall (>80%) — repair may be required`,'h4');});
  /* samples & resistivity (ValidateSoilSamples / GroundwaterSamples / ResistivityData) */
  if(D.h1.gwPresent==='Yes'&&!String(D.h1.gwCollected).trim())
    add('warn','H1','Groundwater present but "collected?" not answered','h1');
  if(D.h1.gwCollected==='Yes'&&!String(D.h1.gwPH).trim())
    add('warn','H1','Groundwater collected but pH not recorded','h1');
  if(D.h1.corrProductPresent==='Yes'&&!String(D.h1.corrProductSample).trim())
    add('warn','H1','Corrosion product present but sample disposition blank','h1');
  if(String(D.h1.pin4Ohms).trim()&&!String(D.h1.pin4Res).trim())
    add('warn','H1','4-pin ohms entered but resistivity not computed','h1');
  /* casing */
  if(D.casing.present==='Yes'){
    if(!String(D.casing.casingDia).trim()) add('err','Casing','Casing present but casing diameter blank','casing');
    if(!String(D.casing.shorted).trim()) add('warn','Casing','Casing present — shorted/isolated status not recorded','casing');
  }
  /* LSC */
  if(D.master.lsc==='Yes'){
    D.lsc.seamType ? add('ok','LSC','Seam type concluded: '+D.lsc.seamType,'lsc')
                   : add('err','LSC','LSC requested on Master but seam type conclusion is blank','lsc');
    if(!(D.lsc.methods||[]).length) add('warn','LSC','No inspection methods checked on LSC sheet','lsc');
  }

  /* — ValidateGPSData — */
  const gpsPts=D.gps.rows.filter(r=>isFinite(num(r.lat))&&num(r.lat)!==0);
  if(gpsPts.length<2) add('warn','GPS','Fewer than 2 GPS points with coordinates','gps');
  else{
    let ok=true;
    gpsPts.forEach(r=>{const la=num(r.lat),lo=num(r.lon);
      if(la<32||la>42.2||lo<-125||lo>-114){ok=false;add('err','GPS',`${r.label||'Point'}: coordinates (${la}, ${lo}) outside California range`,'gps');}});
    if(ok) add('ok','GPS',`${gpsPts.length} GPS points within expected range`,'gps');
  }

  /* — ValidateNDEReports + GetCalibrationSeverity — */
  const calChecks=[[nP('mt','yokeCal'),'MT yoke'],[nP('mt','lmCal'),'MT light meter'],[nP('ut','unitCal'),'UT unit']];
  calChecks.forEach(([p,label])=>{
    const v=getPath(D,p); if(!has(v))return;
    const sev=calSeverity(v);
    if(sev==='expired') add('err','NDE',`${label} calibration is PAST DUE (${v})`,'nde');
    else if(sev==='soon') add('warn','NDE',`${label} calibration due within 30 days (${v})`,'nde');
    else add('ok','NDE',`${label} calibration current (${v})`,'nde');
  });
  if(has(NDE('mt').tech)&&!has(NDE('mt').level2)) add('warn','NDE','MT report missing Level II sign-off name','nde');
  if(has(NDE('ut').tech)&&!has(NDE('ut').level2)) add('warn','NDE','UT report missing Level II sign-off name','nde');

  /* — National Grid COR02022 Attachment 8 / 9 —
     Only runs when the sheets are actually included in the deliverable,
     so PG&E jobs never see NG errors in their validation list. */
  if(D.report.include.ng8||D.report.include.ng9){
    const g=D.ng;
    /* the form marks this one "(Required)" in bold */
    if(!(g.attachments||[]).includes('Photographs'))
      add('err','NG Att.8','Photographs are a required attachment on Attachment 8','ng8');
    if(!has(g.sopNo)) add('err','NG Att.8','SOP # is blank (§1)','ng8');
    if(!has(g.excLogNo)) add('warn','NG Att.8','Excavation / Log # is blank (§1)','ng8');
    if(!has(g.confidence)) add('warn','NG Att.8','Confidence of Attributes not stated (§3) — auditors look for this','ng8');
    if(!has(g.npsVerify)) add('warn','NG Att.8','NPS verification method not recorded (§4, ENG03036 p.5)','ng8');
    /* §5 marks the jeep test "(Required)" */
    if(!has(D.h1.holidayTest)) add('err','NG Att.8','High-voltage jeep test result is required (§5)','h1');
    else if(String(D.h1.holidayTest).toLowerCase()==='yes'&&!has(D.h1.holidayVolts))
      add('warn','NG Att.8','Jeep test passed but no test voltage recorded (§5)','h1');
    if(!has(g.anaerobic)) add('warn','NG Att.8','Anaerobic bacteria test not recorded (§7)','ng8');
    if(String(g.soilLab).toLowerCase()==='yes'&&!has(g.soilLabDate))
      add('err','NG Att.8','Soil sent to lab but no date sent (§7)','ng8');
    if(String(g.soilLab).toLowerCase()==='no'&&!has(g.soilLabReason))
      add('warn','NG Att.8','Soil not sent to lab and no reason given (§7)','ng8');
    if(String(g.metalDamage).toLowerCase()==='yes'){
      if(!(g.damageType||[]).length) add('err','NG Att.8','Metal damage found but no type of damage selected (§9)','ng8');
      if(!has(ngv('maxDepth'))) add('err','NG Att.8','Metal damage found but maximum depth not measured (§9)','ng8');
      add('warn','NG Att.8','Metal damage found — CNST04015 Att. 1 (Pipe Anomaly & Repair Rpt) is also required and is not produced by this tool','ng8');
    }
    if(String(g.repairsReq).toLowerCase()==='yes'&&!has(g.repairKind))
      add('err','NG Att.8','Repairs required but no coating repair type selected (§10)','ng8');
    if(has(g.repairKind)&&g.repairKind!=='Circumferential'&&!has(g.repairWid))
      add('warn','NG Att.8','Patch repair needs a width (§10 — width is N/A only for circumferential)','ng8');
    /* the H-Form and the NG sheet must not tell two different stories */
    if(D.report.include.hform&&D.report.include.ng8){
      const nd=String(g.metalDamage||'').toLowerCase();
      const anyInd=(D.indications||[]).length>0;
      if(nd==='no'&&anyInd)
        add('err','NG Att.8',`Attachment 8 §9 says no metal damage, but ${D.indications.length} indication(s) are logged — the two sheets disagree`,'ng8');
      if(nd==='yes'&&!anyInd)
        add('warn','NG Att.8','Attachment 8 §9 says metal damage found, but the indication table is empty','ind');
    }
  }
  if(D.report.include.ng9){
    D.ng.utGrids.forEach((g,i)=>{
      const st=ng9Stats(g), lbl=`Att.9 sheet ${i+1}`;
      if(!st.n){ add('err','NG Att.9',`${lbl} has no readings`,'ng9'); return; }
      if(!has(g.tech)) add('err','NG Att.9',`${lbl} has no technician name`,'ng9');
      if(!has(g.equipId)) add('err','NG Att.9',`${lbl} missing equipment ID / serial #`,'ng9');
      if(!has(g.calBlockSN)) add('err','NG Att.9',`${lbl} missing calibration block serial #`,'ng9');
      if(!has(g.probeDia)||!has(g.probeFreq)) add('warn','NG Att.9',`${lbl} missing probe diameter or frequency`,'ng9');
      const anyPost=g.cal.post.some(v=>has(v));
      if(!anyPost) add('err','NG Att.9',`${lbl} has no post-test calibration verification — the form requires one`,'ng9');
      if(!has(g.cal.preTime)||!has(g.cal.postTime)) add('warn','NG Att.9',`${lbl} calibration verification is missing a time stamp`,'ng9');
      /* the form's own stated accuracy */
      [0,1,2].forEach(k=>{
        const spec=num(g.cal.spec[k]); if(!isFinite(spec))return;
        ['pre','post'].forEach(w=>{
          const v=num(g.cal[w][k]);
          if(isFinite(v)&&Math.abs(v-spec)>0.003)
            add('err','NG Att.9',`${lbl} ${w}-test step ${k+1} reads ${v.toFixed(3)}" against a ${spec.toFixed(3)}" block — outside the ±0.003" the form requires`,'ng9');
        });
      });
      /* readings quoted to fewer than 3 dp are almost always a transcription slip */
      let coarse=0;
      (g.cells||[]).forEach(row=>row.forEach(v=>{
        const t=String(v||'').trim();
        if(t&&/^\d*\.?\d{0,2}$/.test(t))coarse++;
      }));
      if(coarse) add('warn','NG Att.9',`${lbl}: ${coarse} reading(s) not quoted to the thousandth place — the form requires 3 decimals`,'ng9');
      const nwt=wallIn(g.nwt||D.master.nwt);
      if(isFinite(nwt)&&isFinite(st.max)&&st.max>nwt*1.15)
        add('warn','NG Att.9',`${lbl} max wall ${st.max.toFixed(3)}" exceeds nominal ${nwt.toFixed(3)}" by more than 15% — check units (inches, not mils)`,'ng9');
      if(isFinite(st.max)&&st.max>3)
        add('err','NG Att.9',`${lbl} readings look like mils, not inches (max ${st.max})`,'ng9');
      else add('ok','NG Att.9',`${lbl}: ${st.n} readings, min ${st.min.toFixed(3)}"`,'ng9');
    });
  }
  /* — Photo cross-check (port of the caption/dimension macro's audit half) —
     Only meaningful once photos exist; before that every defect would report as
     unphotographed and drown out everything else. */
  if(D.photoLog.length){
    missingPhotoLabels().forEach(it=>
      add('warn','Photos',`${it.kind} ${it.label} is logged but no photo caption mentions it`,'h9'));
    const stale=[];
    damageItems().forEach(it=>{
      D.photoLog.forEach(p=>{
        if(!labelRe(it.label).test(p.comments||''))return;
        const cur=stripDims(p.comments);
        const want=cur+' | '+it.dims;
        /* only judge single-label captions; multi-label ones are formatted
           differently and comparing them here would cry wolf */
        const hits=damageItems().filter(x=>labelRe(x.label).test(cur));
        if(hits.length===1&&p.comments!==want&&!stale.includes(it.label))stale.push(it.label);
      });
    });
    if(stale.length)
      add('warn','Photos',`Caption dimensions are out of date for ${stale.slice(0,6).join(', ')}${stale.length>6?` and ${stale.length-6} more`:''} — run “Update captions & cross-check” on the Photo Log`,'h9');
    const seenPh=new Set(D.photoLog.map(p=>p.phase).filter(Boolean));
    if(seenPh.size){
      phaseReq().filter(p=>!seenPh.has(p)).forEach(p=>
        add('warn','Photos',`No photo assigned to the “${p}” phase`,'h9'));
    }
    const noCap=D.photoLog.filter(p=>p.img&&!String(p.comments||'').trim()).length;
    if(noCap)add('warn','Photos',`${noCap} photo${noCap!==1?'s have':' has'} no caption — the photo report would print it with no description`,'h9');
  }
  /* — ValidateRepairInfo — */
  if(D.h10.repairMade==='Yes'){
    if(!has(D.h10.numRepairs)) add('err','Repair','Repair made but "number of repairs" is blank','h10');
    if(!D.h10.repairType.length) add('err','Repair','Repair made but no repair type selected','h10');
    if(!D.h10.repairedDefect.length) add('err','Repair','Repair made but no repaired defect type selected','h10');
  }

  /* — Comments end with a period (workbook pet rule) — */
  [['master.inspComments','Inspection comments'],['ss.findings','SS findings']].forEach(([p,label])=>{
    const v=String(getPath(D,p)||'').trim();
    if(v&&!/[.!?]$/.test(v)) add('warn','Style',`${label} should end with a period (workbook rule)`,'master');
  });

  if(!silent){
    const ul=$('#vout');
    const order={err:0,warn:1,ok:2};
    const sorted=[...R].sort((a,b)=>order[a.lvl]-order[b.lvl]);
    ul.innerHTML=sorted.map(r=>`<li class="${r.lvl}"><span class="tag">${r.lvl==='ok'?'PASS':r.lvl==='warn'?'WARN':'FAIL'}</span>
      <div>${esc(r.msg)}<span class="where">${r.cat} · <a href="#" data-nav="${r.pg}">go to page →</a></span></div></li>`).join('');
  }
  const e=R.filter(x=>x.lvl==='err').length, w=R.filter(x=>x.lvl==='warn').length;
  const vb=$('#vbadge');
  vb.className=e?'err':(w?'warn':'ok');
  vb.textContent=e?`● ${e} error${e>1?'s':''}`:(w?`● ${w} warning${w>1?'s':''}`:'● all checks pass');
  return R;
}

/* ============================================================
   NATIONAL GRID — read-through resolver
   Attachment 8 repeats a lot of what DE Digital already holds. Rather
   than duplicate the fields (and invite the two sheets to disagree),
   the NG form reads through to the existing model and only stores its
   own value when the operator deliberately overrides. Anything the
   NG form asks for that has no DE Digital home lives in D.ng.
   ============================================================ */
function ngv(key){
  const m=D.master, h=D.h1, t=D.h10, g=D.ng;
  const pick=(own,...fall)=>{ if(own!==undefined&&String(own).trim()!=='')return own;
    for(const f of fall){ if(f!==undefined&&String(f).trim()!=='')return f; } return ''; };
  switch(key){
    case 'workOrder':   return pick(m.workOrder,m.orderNumber);
    case 'excReason':   return pick(g.excReason,m.testProgram);
    case 'pipelineName':return pick(g.pipelineName,m.lineNumber);
    case 'segmentId':   return pick(g.segmentId,m.nSegment,m.lineNumber);
    case 'lat':         return pick(h.lat,m.latEng);
    case 'lon':         return pick(h.lon,m.lonEng);
    case 'boro':        return pick(g.boro,m.city,m.county);
    case 'x1':          return pick(g.x1,m.primaryCross);
    case 'x2':          return pick(g.x2,m.secondaryCross);
    case 'maop':        return m.maop;
    case 'smys':        return m.smys;
    case 'nps':         return pick(m.diameter,m.calcDiameter);
    case 'grade':       return [m.material,m.grade].filter(Boolean).join(' / ')||m.grade;
    case 'nwt':         return m.nwt;
    case 'installed':   return m.installYear;
    case 'seamTypeDoc': return pick(g.seamTypeDoc,m.seamTypeDoc);
    case 'doc':         return pick(h.docCtr,h.docUS,h.docDS);
    case 'inspBy':      return pick(g.inspBy,m.leadInspector,m.techs);
    case 'inspDate':    return pick(g.inspDate,m.dInspStart,m.dExcavation);
    case 'examSeam':    return pick(g.examSeam,(D.sections[0]||{}).seamType);
    case 'coatThk':     return h.coatingThk;
    case 'moisture':    return h.liquidUnderCoating;
    case 'moisturePH':  return h.liquidPH;
    case 'jeep':        return String(h.holidayTest||'').toLowerCase()==='yes'?'Pass':(String(h.holidayTest||'').toLowerCase()==='no'?'':'');
    case 'jeepVolts':   return h.holidayVolts;
    case 'prodPresent': return pick(g.prodPresent,h.corrProductPresent);
    case 'prodDesc':    return pick(g.prodDesc,h.corrProductComments);
    case 'repairCoating':return pick(g.repairCoating,t.recoatedWith);
    case 'repairDate':  return pick(g.repairDate,m.dRecoat);
    case 'ambientTemp': return pick(g.ambientTemp,t.airTemp);
    case 'maxDepth':    return pick(g.maxDepth,ngMaxDepthMils());
    default: return g[key]??'';
  }
}
/* deepest pit across every H4 grid, in mils — Attachment 8 §9 "Maximum Depth Measured" */
function ngMaxDepthMils(){
  let mx=NaN;
  (D.rstreng.grids||[]).forEach(g=>{ (g.cells||[]).forEach(row=>row.forEach(v=>{
    const n=num(v); if(isFinite(n)&&(!isFinite(mx)||n>mx))mx=n; })); });
  (D.h5grids||[]).forEach(g=>{ (g.cells||[]).forEach(row=>row.forEach(v=>{
    const n=num(v); if(isFinite(n)&&(!isFinite(mx)||n>mx))mx=n; })); });
  return isFinite(mx)?String(mx):'';
}
const NG9 = ()=> D.ng.utGrids[Math.max(0,Math.min(D.ng.utGrids.length-1,num(D.ng.ut9idx)||0))]||blankNG9();
const ng9i = ()=> Math.max(0,Math.min(D.ng.utGrids.length-1,num(D.ng.ut9idx)||0));

/* ============================================================
   NATIONAL GRID — input pages
   ============================================================ */
function ngPages(){
  let html='';

    }</div>`,'GTE')
   +card('4','Inspection results: pipe',`<div class="fgrid">${
      fldContact('ng.inspBy','Inspection performed by',{ph:ngv('inspBy')||'inherits lead inspector'})+

   ATTACHMENT 9 — UT wall thickness grid (inches, 3 dp)
   ============================================================ */
function ng9Title(i){ const g=D.ng.utGrids[i]||{};
  return g.gridLoc||`UT sheet ${i+1}${g.tech?' — '+g.tech:''}`; }

function ng9Picker(){

      ${list.length>1?`<button class="del" data-ng9del>✕ Remove this sheet</button>`:''}
    </div>
  </div></div>`;

/* Attachment 9 takes remaining wall in inches — which is exactly what the H6
   IC wall-loss grid already holds, so H6 is a straight copy with no conversion
   and no dependency on AWT being right. H4/H5 hold pit depth in mils against an
   adjacent-wall reference, so those still need WT = AWT − depth ⁄ 1000; they are
   kept as sources because an external-corrosion dig may have no UT grid at all.
   Either way the technician measures once. */
const NG9_SRC={
  h6:{list:()=>D.intGrids,      label:'H6 IC wall-loss grid', unit:'in',   conv:false},
  h4:{list:()=>D.rstreng.grids, label:'H4 pit grid',          unit:'mils', conv:true},
  h5:{list:()=>D.h5grids||[],   label:'H5 internal pit grid',  unit:'mils', conv:true}
};
/* Attachment 9 is a fixed 8×8. Sources are routinely bigger — H6 is 12×12 by
   spec rule, and an H4 RSTRENG grid runs to 24×120 — so the old top-left copy
   silently dropped readings, and the one it was most likely to drop is the
   thinnest wall: the only reading the form really exists for. Window on that
   cell instead, and say what was left out. */
function ng9Window(rows,cols,cr,cc){
  const R=Math.min(rows,8), C=Math.min(cols,8);
  return {R, C,
    r0:Math.max(0,Math.min(rows-R,cr-(R>>1))),
    c0:Math.max(0,Math.min(cols-C,cc-(C>>1)))};
}
function ng9ImportFrom(kind,srcIdx){
  const S=NG9_SRC[kind]; if(!S)return 'Unknown source grid.';
  const src=(S.list()||[])[srcIdx];
  if(!src)return `No ${S.label} at that index.`;
  if(!src.rows||!src.cols)return `${S.label} ${srcIdx+1} has no grid yet — size it and enter readings first.`;
  let awt=NaN;
  if(S.conv){
    awt=wallIn(src.awt);
    if(!isFinite(awt)||awt<=0)
      return `${S.label} ${srcIdx+1} has no adjacent wall thickness (AWT) — set it first, otherwise the depths have no reference to convert against.`;
  }
  /* every cell as remaining wall in inches, whichever way it was recorded */
  const wt=(v)=>{ const n=num(v); if(!isFinite(n))return NaN; return S.conv?awt-n/1000:n; };
  let cr=0, cc=0, worst=Infinity, total=0;
  for(let r=0;r<src.rows;r++)for(let c=0;c<src.cols;c++){
    const w=wt(src.cells[r]?.[c]); if(!isFinite(w))continue;
    total++;
    if(w<worst){ worst=w; cr=r; cc=c; }
  }
  if(!total)return `${S.label} ${srcIdx+1} has no readings in it yet.`;
  const {r0,c0,R,C}=ng9Window(src.rows,src.cols,cr,cc);
  const g=D.ng.utGrids[ng9i()];
  ng9Resize(g,R,C);
  let n=0;
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){
    const w=wt(src.cells[r0+r]?.[c0+c]);
    g.cells[r][c]=isFinite(w)?w.toFixed(3):'';
    if(isFinite(w))n++;
  }
  if(!g.nwt)g.nwt=D.master.nwt||'';
  const cut=src.rows>8||src.cols>8;
  return `Imported ${n} reading${n!==1?'s':''} from ${S.label} ${srcIdx+1}`
    +(S.conv?` (AWT ${awt.toFixed(3)}" − depth)`:' (already inches — copied as measured)')
    +(cut?`. Source is ${src.rows}×${src.cols} and Attachment 9 takes 8×8, so the window was centred on the thinnest wall (${worst.toFixed(3)}" at row ${cr+1}, col ${cc+1}) — it is cell ${COLS_AH[cc-c0]||'?'}${cr-r0+1} here. ${total-n} reading${total-n!==1?'s':''} outside the window were not imported.`:'.');
}
function ng9Resize(g,rows,cols){
  rows=Math.max(1,Math.min(8,rows|0)); cols=Math.max(1,Math.min(8,cols|0));
  const nc=[];
  for(let r=0;r<rows;r++)nc.push(Array.from({length:cols},(_,c)=>(g.cells[r]&&g.cells[r][c]!==undefined)?g.cells[r][c]:''));
  g.rows=rows; g.cols=cols; g.cells=nc;
}
/* min / max / mean across populated cells, in inches */
function ng9Stats(g){
  const v=[]; (g.cells||[]).forEach(row=>row.forEach(x=>{const n=num(x); if(isFinite(n))v.push(n);}));
  if(!v.length)return {n:0};
  const min=Math.min(...v), max=Math.max(...v);
  const nwt=wallIn(g.nwt||D.master.nwt);
  return {n:v.length,min,max,avg:v.reduce((a,b)=>a+b,0)/v.length,
    pct:isFinite(nwt)&&nwt>0?(1-min/nwt)*100:NaN, nwt};
}
const COLS_AH=['a','b','c','d','e','f','g','h'];

function ng9Table(g,gi){
  const nwt=wallIn(g.nwt||D.master.nwt);
  let h=`<table class="pit"><thead><tr><th class="rowhdr"></th>`;
  for(let c=0;c<g.cols;c++)h+=`<th>${COLS_AH[c]}</th>`;
  h+=`</tr></thead><tbody>`;
  for(let r=0;r<g.rows;r++){
    h+=`<tr><th class="rowhdr">${r+1}</th>`;
    for(let c=0;c<g.cols;c++){
      const v=g.cells[r][c], nv=num(v);
      /* colour by wall LOSS so it reads the same direction as the H4 heat map */
      const style=isFinite(nv)&&isFinite(nwt)&&nwt>0
        ? ` style="background:${gradientColor('traffic',Math.max(0,Math.min(1,1-nv/nwt)))}"`:'';
      h+=`<td${style}><input inputmode="decimal" data-cell="ng9,${gi},${r},${c}" value="${esc(v)}" aria-label="row ${r+1} col ${COLS_AH[c]}"></td>`;
    }
    h+=`</tr>`;
  }
  h+=`</tbody></table>`;
  return h;
}

function updateNG9Cell(gi,r,c){
  const g=D.ng.utGrids[gi], inp=$(`[data-cell="ng9,${gi},${r},${c}"]`);

}

/* the form's own tolerance, checked live */
function ng9CalWarn(){
  const el=$('#ng9-calwarn'); if(!el)return;
  const g=NG9(); let bad=[];
  [0,1,2].forEach(i=>{
    const s=num(g.cal.spec[i]);
    if(!isFinite(s))return;
    ['pre','post'].forEach(k=>{
      const v=num(g.cal[k][i]);
      if(isFinite(v)&&Math.abs(v-s)>0.003)
        bad.push(`${k==='pre'?'Pre':'Post'}-test step ${i+1}: ${v.toFixed(3)}" vs spec ${s.toFixed(3)}" (Δ ${(Math.abs(v-s)).toFixed(3)}")`);
    });
  });
  el.innerHTML=bad.length?`<div class="banner crit" style="margin-top:10px">Outside the ±0.003" tolerance the form requires — ${bad.join(' · ')}</div>`:'';
}

   NATIONAL GRID — printed sheets
   Attachment 8 (5 pp.) and Attachment 9 (1 p. per UT sheet).
   Reuses the Form-H print vocabulary (cbx / cbGroup / hfLine /
   ynBoxes / fillV) because COR02022 is the same fill-in-the-blank
   idiom; only the page furniture and vocabulary differ.
   ============================================================ */
function ngHdr(pg,of){
  return `<div style="display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid #000;padding-bottom:3px;margin-bottom:7px">
    <div style="font-weight:700;font-size:12px">ATTACHMENT 8: TRANSMISSION MAIN INSPECTION FORM</div>
    <div style="font-size:9px">Page ${pg} of ${of||5}</div>
  </div>`;
}
/* section banner carrying the form's own owner tag (GTE / CORROSION) */
function ngSec(no,title,owner){
  return `<div class="hf-sec" style="display:flex;justify-content:space-between">
    <span>${no}. ${title}</span>${owner?`<span style="font-weight:400;opacity:.85">${owner}</span>`:''}</div>`;
}
const ngFill=(l,v,w)=>`<span class="hf-fill"><b>${l}</b><span${w?` style="min-width:${w}px"`:''}>${rEsc(v||'')||'&nbsp;'}</span></span>`;
/* a signature rule — the paper form has one and auditors look for it */
const ngSign=(l)=>`<span class="hf-fill"><b>${l}</b><span style="min-width:150px">&nbsp;</span></span>`;

/* Attachment 8 §4 asks for wall thickness in INCHES; the 12-point UTT readings
   on the Pipe Sections page are stored in mils. uttStats() can't be reused —
   it's a DOM renderer that returns nothing. wallIn() is applied per reading so
   a technician who typed 0.375 instead of 375 still lands in the right place. */
function ngWallMinMax(){
  const all=D.sections.flatMap(s=>(s.utt||[]).map(v=>wallIn(v))).filter(v=>isFinite(v)&&v>0);
  if(!all.length)return {n:0,min:NaN,max:NaN};
  return {n:all.length,min:Math.min(...all),max:Math.max(...all)};
}

/* ============================================================
   IMAGE INTAKE
   A modern phone photo is ~4 MB; base64 inflates that by a third, and 40 of
   them would blow the localStorage quota and make the saved job file unusable.
   Everything that enters the app as a photo goes through here first.
   ============================================================ */
const PHOTO_MAX_DIM=1400, PHOTO_QUALITY=0.82;
function downscaleImage(src,maxDim=PHOTO_MAX_DIM,quality=PHOTO_QUALITY){
  return new Promise((resolve,reject)=>{
    const im=new Image();
    im.onload=()=>{
      let {width:w,height:h}=im;
      if(!w||!h)return reject(new Error('image has no dimensions'));
      const sc=Math.min(1,maxDim/Math.max(w,h));
      w=Math.round(w*sc); h=Math.round(h*sc);
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      const cx=cv.getContext('2d');
      /* JPEG has no alpha — flatten onto white or PNG screenshots go black */
      cx.fillStyle='#fff'; cx.fillRect(0,0,w,h);
      cx.drawImage(im,0,0,w,h);
      try{ resolve(cv.toDataURL('image/jpeg',quality)); }catch(err){ reject(err); }
    };
    im.onerror=()=>reject(new Error('could not decode image'));
    im.src=src;
  });
}
const fileToDataURL=f=>new Promise((res,rej)=>{
  const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=()=>rej(new Error('read failed')); r.readAsDataURL(f);
});
async function ingestPhoto(fileOrURL){
  const src=typeof fileOrURL==='string'?fileOrURL:await fileToDataURL(fileOrURL);
  try{ return await downscaleImage(src); }
  catch(err){ return src; }   /* SVG and friends — keep the original rather than lose it */
}
const dataURLBytes=s=>{ const i=String(s||'').indexOf(','); return i<0?0:Math.round((s.length-i-1)*3/4); };
function photoWeight(){
  let n=0,b=0;
  (D.photoLog||[]).forEach(p=>{if(p.img){n++;b+=dataURLBytes(p.img);}});
  ((D.lsc&&D.lsc.photos)||[]).forEach(p=>{if(p.img){n++;b+=dataURLBytes(p.img);}});
  return {n,b};
}

/* ============================================================
   ZIP  —  just enough to read a .pptx
   A .pptx is a ZIP of XML. The browser can already inflate (DecompressionStream),
   so no third-party library is needed and the file stays self-contained/offline.
   ============================================================ */
async function unzip(buf){
  const dv=new DataView(buf), u8=new Uint8Array(buf);
  let eocd=-1;
  const floor=Math.max(0,buf.byteLength-66000);
  for(let i=buf.byteLength-22;i>=floor;i--){ if(dv.getUint32(i,true)===0x06054b50){eocd=i;break;} }
  if(eocd<0)throw new Error('not a zip file (no end-of-central-directory record)');
  const count=dv.getUint16(eocd+10,true);
  let off=dv.getUint32(eocd+16,true);
  const dec=new TextDecoder();
  const out=new Map();
  for(let k=0;k<count;k++){
    if(off+46>buf.byteLength||dv.getUint32(off,true)!==0x02014b50)break;
    const method=dv.getUint16(off+10,true);
    const csize=dv.getUint32(off+20,true);
    const nameLen=dv.getUint16(off+28,true), exLen=dv.getUint16(off+30,true), cmLen=dv.getUint16(off+32,true);
    const lho=dv.getUint32(off+42,true);
    const name=dec.decode(u8.subarray(off+46,off+46+nameLen));
    /* the local header's extra field can differ in length from the central one,
       so the data offset has to be read from the local header, not computed */
    const lnLen=dv.getUint16(lho+26,true), lxLen=dv.getUint16(lho+28,true);
    const start=lho+30+lnLen+lxLen;
    out.set(name,{method,raw:u8.subarray(start,start+csize)});
    off+=46+nameLen+exLen+cmLen;
  }
  return out;
}
async function zipRead(entries,name){
  const e=entries.get(name); if(!e)return null;
  if(e.method===0)return e.raw;
  if(e.method!==8)throw new Error('unsupported compression in '+name);
  const st=new Blob([e.raw]).stream().pipeThrough(new DecompressionStream('deflate-raw'));
  return new Uint8Array(await new Response(st).arrayBuffer());
}
const zipText=async(entries,name)=>{ const b=await zipRead(entries,name); return b?new TextDecoder().decode(b):null; };

/* ============================================================
   XLSX  —  just enough to read an ILI pipe tally
   Same trick as the .pptx importer below: an .xlsx is a ZIP of XML and the
   browser can already inflate, so there is no library to load and this file
   stays a single self-contained offline document.
   The sheet XML of a full-line tally runs to ~10 MB. DOMParser would turn that
   into several hundred thousand nodes and take seconds, so the sheet is scanned
   with regexes rather than parsed into a tree.
   ============================================================ */
const xmlUnesc=s=>String(s)
  .replace(/&#x([0-9a-fA-F]+);/g,(_,h)=>String.fromCodePoint(parseInt(h,16)))
  .replace(/&#(\d+);/g,(_,d)=>String.fromCodePoint(+d))
  .replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"')
  .replace(/&apos;/g,"'").replace(/&amp;/g,'&');
/* "AB" of "AB12" -> 28, 1-based */
function xlsxCol(ref){ let n=0;
  for(let i=0;i<ref.length;i++){ const c=ref.charCodeAt(i); if(c<65||c>90)break; n=n*26+(c-64); }
  return n; }
/* <si> may be a plain <t> or a run of them; a bare <si/> still consumes an index */
function xlsxStrings(xml){
  const out=[]; if(!xml)return out;
  const si=/<si\b[^>]*(?:\/>|>([\s\S]*?)<\/si>)/g; let m;
  while((m=si.exec(xml))){
    let s=''; const t=/<t\b[^>]*(?:\/>|>([\s\S]*?)<\/t>)/g; let n;
    while((n=t.exec(m[1]||'')))s+=xmlUnesc(n[1]||'');
    out.push(s);
  }
  return out;
}
/* -> rows[] of sparse arrays; values are number | string | boolean | null */
function xlsxSheetRows(xml,sst){
  const rows=[];
  const rowRe=/<row\b([^>]*)(?:\/>|>([\s\S]*?)<\/row>)/g;
  const cellRe=/<c\b([^>]*?)(?:\/>|>([\s\S]*?)<\/c>)/g;
  let r;
  while((r=rowRe.exec(xml))){
    const rn=+((r[1].match(/\br="(\d+)"/)||[])[1]||rows.length+1);
    const body=r[2]||'', arr=[];
    let c; cellRe.lastIndex=0;
    while((c=cellRe.exec(body))){
      const at=c[1]||'', inner=c[2]||'';
      const ref=(at.match(/\br="([A-Z]+)\d+"/)||[])[1];
      const ci=ref?xlsxCol(ref)-1:arr.length;
      const t=(at.match(/\bt="([^"]*)"/)||[])[1]||'n';
      let v=null;
      if(t==='inlineStr'){
        let s=''; const tr=/<t\b[^>]*(?:\/>|>([\s\S]*?)<\/t>)/g; let n;
        while((n=tr.exec(inner)))s+=xmlUnesc(n[1]||'');
        v=s;
      }else{
        const raw=(inner.match(/<v\b[^>]*>([\s\S]*?)<\/v>/)||[])[1];
        if(raw!=null&&raw!==''){
          if(t==='s')v=sst[+raw]??'';
          else if(t==='str')v=xmlUnesc(raw);
          else if(t==='b')v=raw==='1';
          else if(t==='e')v=null;                 /* #REF!, #N/A … — treat as empty */
          else v=Number(raw);
        }
      }
      if(ci>=0)arr[ci]=v;
    }
    if(rn>0)rows[rn-1]=arr;
  }
  for(let i=0;i<rows.length;i++) if(!rows[i])rows[i]=[];
  return rows;
}
async function readXlsx(buf){
  const z=await unzip(buf);
  const wbx=await zipText(z,'xl/workbook.xml');
  if(!wbx)throw new Error('no xl/workbook.xml inside — this is a zip, but not an .xlsx workbook');
  const rels=await zipText(z,'xl/_rels/workbook.xml.rels')||'';
  const rel={};
  (rels.match(/<Relationship\b[^>]*>/g)||[]).forEach(x=>{
    const id=(x.match(/\bId="([^"]+)"/)||[])[1], t=(x.match(/\bTarget="([^"]+)"/)||[])[1];
    if(id&&t)rel[id]=String(t).replace(/^\//,'').replace(/^xl\//,'');
  });
  const sst=xlsxStrings(await zipText(z,'xl/sharedStrings.xml'));
  const sheets=[];
  (wbx.match(/<sheet\b[^>]*?\/?>/g)||[]).forEach(x=>{
    const name=xmlUnesc((x.match(/\bname="([^"]*)"/)||[])[1]||'');
    const rid=(x.match(/\br:id="([^"]+)"/)||[])[1];
    if(rel[rid])sheets.push({name,path:'xl/'+rel[rid]});
  });
  if(!sheets.length)throw new Error('no worksheets found in the workbook');
  return {sheets, read:async p=>xlsxSheetRows(await zipText(z,p)||'',sst)};
}

/* ============================================================
   PPTX  —  photo-log import
   Mirrors ExtractTextFromAllSlidesWithoutTable, with three differences worth
   knowing about; see the notes on ngPptxImport below.
   ============================================================ */
const PPT_DEFAULTS={numName:'Slide Number Placeholder 2',txtName:'Text Placeholder 3'};
const MIME={png:'image/png',jpg:'image/jpeg',jpeg:'image/jpeg',gif:'image/gif',bmp:'image/bmp',webp:'image/webp',tif:'image/tiff',tiff:'image/tiff',emf:'image/emf',wmf:'image/wmf'};
const u8ToB64=u8=>{ let s=''; const CH=0x8000;
  for(let i=0;i<u8.length;i+=CH)s+=String.fromCharCode.apply(null,u8.subarray(i,i+CH));
  return btoa(s); };

/* text of one shape, paragraphs joined the way the macro did (vbCr -> "  |  ") */
function pptShapeText(sp){
  const paras=[...sp.getElementsByTagName('a:p')];
  const lines=paras.map(p=>[...p.getElementsByTagName('a:t')].map(t=>t.textContent).join('').trim()).filter(Boolean);
  return lines.join('  |  ');
}
function pptShapeName(sp){
  const c=sp.getElementsByTagName('p:cNvPr')[0];
  return c?(c.getAttribute('name')||''):'';
}
async function parsePptx(buf,opts={}){
  const numName=opts.numName||PPT_DEFAULTS.numName;
  const txtName=opts.txtName||PPT_DEFAULTS.txtName;
  const z=await unzip(buf);
  const slideNames=[...z.keys()].filter(n=>/^ppt\/slides\/slide\d+\.xml$/.test(n))
    .sort((a,b)=>(+a.match(/(\d+)/)[1])-(+b.match(/(\d+)/)[1]));
  if(!slideNames.length)throw new Error('no slides found — is this really a .pptx?');
  const dp=new DOMParser();
  const out=[];
  for(let i=0;i<slideNames.length;i++){
    const name=slideNames[i];
    const xml=await zipText(z,name);
    const doc=dp.parseFromString(xml,'application/xml');
    const shapes=[...doc.getElementsByTagName('p:sp')];

    let numTxt='', capTxt='';
    /* Reset per slide. The macro used `On Error Resume Next` around the two
       Set calls without clearing the objects first, so a slide missing a
       placeholder silently reused the PREVIOUS slide's text. */
    for(const sp of shapes){
      const nm=pptShapeName(sp);
      if(nm===numName&&!numTxt)numTxt=pptShapeText(sp);
      if(nm===txtName&&!capTxt)capTxt=pptShapeText(sp);
    }
    /* fall back to something sensible rather than dropping the slide */
    let guessed=false;
    if(!capTxt){
      const cands=shapes.map(sp=>({t:pptShapeText(sp),n:pptShapeName(sp)}))
        .filter(x=>x.t&&x.n!==numName&&!/^\d{1,3}$/.test(x.t));
      cands.sort((a,b)=>b.t.length-a.t.length);
      if(cands[0]){capTxt=cands[0].t;guessed=true;}
    }
    if(!numTxt)numTxt=String(i+1);

    /* the picture on the slide — the macro could not do this at all */
    let img='';
    const rels=await zipText(z,`ppt/slides/_rels/${name.split('/').pop()}.rels`);
    if(rels){
      const rdoc=dp.parseFromString(rels,'application/xml');
      const map={};
      [...rdoc.getElementsByTagName('Relationship')].forEach(r=>{ map[r.getAttribute('Id')]=r.getAttribute('Target'); });
      const blips=[...doc.getElementsByTagName('a:blip')];
      let best=null;
      for(const b of blips){
        const id=b.getAttribute('r:embed')||b.getAttribute('embed'); if(!id||!map[id])continue;
        const target=map[id].replace(/^\.\.\//,'ppt/').replace(/^\//,'');
        const bytes=await zipRead(z,target);
        if(bytes&&(!best||bytes.length>best.bytes.length))best={bytes,target};
      }
      if(best){
        const ext=(best.target.split('.').pop()||'png').toLowerCase();
        img=`data:${MIME[ext]||'image/png'};base64,${u8ToB64(best.bytes)}`;
      }
    }
    out.push({no:numTxt,comments:capTxt,img,guessed,slide:i+1});
  }
  return out;
}

/* ============================================================
   CREAFORM CSV  —  indication import
   Port of ImportCSVToIndicationTable / DetectDelimiter.
   ============================================================ */
function detectDelimiter(line){
  const semi=line.split(';').length-1, comma=line.split(',').length-1, tab=line.split('\t').length-1;
  if(semi>=comma&&semi>=tab)return ';';
  if(comma>=tab)return ',';
  return '\t';
}
const vbaIsNumeric=v=>{ const s=String(v??'').trim(); return s!==''&&isFinite(Number(s)); };
const vbaVal=v=>{ const m=String(v??'').trim().match(/^[+-]?(\d+\.?\d*|\.\d+)([eE][+-]?\d+)?/); return m?parseFloat(m[0]):0; };

/* Does this field actually read as a clock position? Pipecheck writes o'clock
   as "4:30", "4:30:00 PM", "04:30". A defect class ("PINH", "PITT - PINH",
   "CIGR - PINH - PITT") never will — which is how we tell the two columns apart. */
function isClockish(v){
  const s=String(v??'').trim();
  return /^(\d{1,2}):([0-5]\d)(?::[0-5]\d)?\s*([AaPp][Mm])?$/.test(s) && +s.split(':')[0]<=12;
}
/* "4:30:00 PM" / "4:30 PM" / "4:30" -> the clock string the app stores */
function csvClock(v){
  const s=String(v??'').trim(); if(!s)return '';
  const m=s.match(/^(\d{1,2}):(\d{2})(?::\d{2})?\s*([AaPp][Mm])?$/);
  if(!m)return s;
  let h=+m[1]; const mi=m[2], ap=(m[3]||'').toUpperCase();
  if(ap==='PM'&&h<12)h+=12; if(ap==='AM'&&h===12)h=0;
  h=h%12; if(h===0)h=12;
  return `${h}:${mi}`;
}
/* Rows are accepted on exactly the macro's test: >=9 fields and a numeric
   first field. That is what skips the header and any trailing junk. */
function parseCreaformCSV(text){
  const rows=[], skipped=[];
  const lines=String(text).replace(/\r\n?/g,'\n').split('\n');
  let delim=null;
  lines.forEach((line,i)=>{
    if(!line.trim())return;
    const d=detectDelimiter(line);
    if(delim===null)delim=d;
    const f=line.split(d);
    if(!(f.length>=9&&vbaIsNumeric(f[0]))){ skipped.push({line:i+1,text:line.slice(0,90)}); return; }

    let type='', id='';
    /* The macro tests fields(2) for a dash but falls back to fields(1) — kept
       verbatim, because on a Pipecheck export col B is the label and col C is
       the "CEC-01" style name, so the fallback is deliberate, not a slip. */
    if(String(f[2]).indexOf('-')>=0){
      const parts=String(f[2]).split('-');
      type=String(parts[0]).trim(); id=String(parts[1]??'').trim();
    }else{
      type=String(f[1]).trim(); id='';
    }
    /* Cols D and E are not in a fixed order across Pipecheck export versions:
       some builds put the clock in D and the defect class in E, newer ones swap
       them, which is how "PINH" ended up in Orientation and "10:49" in Comments.
       Take whichever of the two reads as a clock and let the other fall through
       to Comments, so both layouts import correctly. */
    const ci=isClockish(f[3])?3:(isClockish(f[4])?4:3);   /* D or E -> F  */
    const mi=ci===3?4:3;                                  /* the other -> AC */
    rows.push({
      id, type,
      surf:'OD',                                  /* col S  — static */
      method:'Creaform',                          /* col CI — static */
      dist:vbaIsNumeric(f[0])?String(parseFloat(f[0])):'',   /* A -> D / X */
      clock:csvClock(f[ci]),
      len:String(f[6]??'').trim(),                            /* G -> AH     */
      wid:String(f[7]??'').trim(),                            /* H -> AL     */
      depth:String(vbaVal(f[8])*1000),                        /* I -> AQ     */
      awt:vbaIsNumeric(f[5])?String(parseFloat(f[5])*1000):'',/* F -> BE     */
      comments:String(f[mi]??'').trim(),
      decision:'', repair:''
    });
  });
  return {rows,skipped,delim};
}

/* The field binding is one-way: an input writes to D, but changing D does not
   write back. That is fine while a person is typing, and wrong the moment code
   fills fields in — the value lands in D and the box on screen stays empty, so
   it looks like nothing happened. Anything that sets D.<path> programmatically
   has to call this afterwards. */
function syncFields(prefix){
  let n=0;
  $$('[data-p]').forEach(el=>{
    const path=el.dataset.p;
    if(!path||(prefix&&path.indexOf(prefix)!==0))return;
    if(el===document.activeElement)return;          /* never yank the cursor */
    const v=getPath(D,path);
    const nv=v==null?'':String(v);
    if(el.type==='checkbox'){ if(el.checked!==!!v){el.checked=!!v;n++;} return; }
    if(el.value!==nv){ el.value=nv; n++; }
  });
  return n;
}

/* ---- save / load ---- */
/* ============================================================
   LOCAL PERSISTENCE
   Three separate concerns:
     • autosave  — a crash/close safety net for the CURRENT job
     • library   — roster, contacts, zone lists and operators kept
                   across jobs so they're configured once
     • dirty     — warn before leaving with unsaved changes
   Browser storage is per-machine and can be cleared, so none of this
   replaces "Save file" — it's a net, not the record of work.
   ============================================================ */
const LS={auto:'de-digital:autosave', lib:'de-digital:library'};
const LS_OK=(()=>{try{const k='__de_t';localStorage.setItem(k,'1');localStorage.removeItem(k);return true;}catch(e){return false;}})();
let DIRTY=false, AUTOTIMER=null, LIBTIMER=null;

function updateSaveBadge(){
  const b=$('#btn-save'); if(b)b.classList.toggle('unsaved',DIRTY);
  const n=$('#save-note'); if(!n)return;
  if(!LS_OK){n.textContent='autosave unavailable';return;}
  if(DIRTY){n.textContent='unsaved changes';return;}
  const sv=D.meta.saved?new Date(D.meta.saved):null, au=D.meta.autosaved?new Date(D.meta.autosaved):null;
  if(sv&&(!au||sv>=au))n.textContent='saved to file '+sv.toLocaleTimeString();
  else if(au)n.textContent='autosaved '+au.toLocaleTimeString();
  else n.textContent='';
}
function markDirty(){ DIRTY=true; updateSaveBadge(); scheduleAutosave(); }
function scheduleAutosave(){ if(!LS_OK)return; clearTimeout(AUTOTIMER); AUTOTIMER=setTimeout(autosave,1500); }
function collectAll(){ D.roster=TECHS; D.contactsRoster=CONTACTS; D.zoneLists=ZONE_LISTS; D.operators=OPERATORS; return D; }
function autosave(){
  if(!LS_OK)return;
  collectAll(); D.meta.autosaved=new Date().toISOString();
  const wrap=data=>JSON.stringify({t:Date.now(),site:D.master.digSite||'',data});
  try{ localStorage.setItem(LS.auto,wrap(D)); }
  catch(err){
    /* over quota — images (logo / site photo / photo log) are the usual cause.
       Keep the data by autosaving a lean copy rather than losing everything. */
    try{
      const lean=JSON.parse(JSON.stringify(D));
      if(lean.brand)lean.brand.logo='';
      if(lean.brand&&String(lean.brand.lscLogo||'').startsWith('data:'))lean.brand.lscLogo='';
      if(lean.master)lean.master.siteImg='';
      (lean.photoLog||[]).forEach(p=>{if(p.img)p.img='';});
      localStorage.setItem(LS.auto,JSON.stringify({t:Date.now(),site:D.master.digSite||'',data:lean,lean:true}));
    }catch(e2){ try{localStorage.removeItem(LS.auto);}catch(e3){} }
  }
  updateSaveBadge();
}
function clearAutosave(){ if(LS_OK)try{localStorage.removeItem(LS.auto);}catch(e){} }
/* Offer to restore on startup rather than silently overwriting a fresh form */
function checkAutosave(){
  if(!LS_OK)return;
  let p; try{ const raw=localStorage.getItem(LS.auto); if(!raw)return; p=JSON.parse(raw); }catch(e){ return; }
  if(!p||!p.data||!p.data.master)return;
  const when=new Date(p.t||Date.now());
  const msg=`Unsaved work was found from a previous session.\n\n`+
    `Site: ${p.site||'(unnamed)'}\nAutosaved: ${when.toLocaleString()}`+
    (p.lean?`\n\nNote: images were too large to autosave and were not kept.`:'')+
    `\n\nOK = restore it · Cancel = discard and start fresh`;
  if(confirm(msg)){
    try{ applyLoaded(p.data); DIRTY=false; updateSaveBadge();
         alert('Work restored. Remember to use Save file to keep a permanent copy.'); }
    catch(e){ alert('Could not restore the autosave: '+e.message); }
  } else { clearAutosave(); }
}
/* ---- library: roster / contacts / zone lists / operators across jobs ---- */
function scheduleLibrarySave(){ if(!LS_OK)return; clearTimeout(LIBTIMER); LIBTIMER=setTimeout(saveLibrary,800); }
function saveLibrary(){
  if(!LS_OK)return;
  try{ localStorage.setItem(LS.lib,JSON.stringify({techs:TECHS,contacts:CONTACTS,zones:ZONE_LISTS,operators:OPERATORS,phases:PHASES})); }catch(e){}
}
function loadLibrary(){
  if(!LS_OK)return false;
  try{
    const raw=localStorage.getItem(LS.lib); if(!raw)return false;
    const l=JSON.parse(raw);
    if(l.techs&&Object.keys(l.techs).length)TECHS=l.techs;
    if(l.contacts&&Object.keys(l.contacts).length)CONTACTS=l.contacts;

    if(l.operators&&Object.keys(l.operators).length)OPERATORS=l.operators;
    if(Array.isArray(l.phases)&&l.phases.length)PHASES=l.phases.map((p,i)=>({key:p.key||'u'+i,name:String(p.name||''),req:p.req?1:0})).filter(p=>p.name);
    return true;
  }catch(e){ return false; }
}

/* Save filename: Project ID _ Site _ timestamp, e.g.
   EC26-1027-01_EC26-1027-01-A_2026-07-15_1305.hform.json
   Parts that are blank are simply left out, so a half-filled form still saves
   to something sensible rather than "undefined". */
function saveFileName(){
  const m=D.master;
  const clean=v=>String(v||'').trim().replace(/[^\w.\-]+/g,'-').replace(/^-+|-+$/g,'');
  const d=new Date();
  const p=n=>String(n).padStart(2,'0');
  const stamp=`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}`;
  const parts=[clean(m.projectId),clean(m.digSite),stamp].filter(Boolean);
  return parts.join('_')+'.hform.json';
}
function saveFile(){
  D.meta.saved=new Date().toISOString();
  collectAll();
  DIRTY=false; clearAutosave(); saveLibrary(); updateSaveBadge();
  const name=saveFileName();
  const blob=new Blob([JSON.stringify(D,null,1)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
}
function loadFile(file){
  const rd=new FileReader();
  rd.onload=()=>{try{
      const obj=JSON.parse(rd.result);
      applyLoaded(obj);
      DIRTY=false; updateSaveBadge();
    }catch(err){alert('Could not open file: '+err.message);}};
  rd.readAsText(file);
}
/* Hydrate the whole app from a saved/autosaved object. Shared by Open file and
   the autosave restore so both go through exactly the same migrations. */
function applyLoaded(obj){
      if(!obj.master) throw new Error('not a DE Digital file');
      const base=DEFAULT();
      /* migrate pre-multigrid saves */
      if(obj.rstreng&&!obj.rstreng.grids){
        const o=obj.rstreng;
        obj.rstreng={grids:[{anomaly:o.anomaly||'',gridNo:o.gridNo||'',axialDist:o.axialDist||'',clock:o.clock||'',
          gridSpacing:o.gridSpacing||'0.5',awt:o.awt||'',readings:o.readings||'',results:o.results||null}]};
      }
      D=Object.assign(base,obj);
      if(!D.rstreng||!Array.isArray(D.rstreng.grids)||!D.rstreng.grids.length)D.rstreng={grids:[blankGrid()]};
      /* files saved before the ILI tally import existed carry no `iliImport`.
         The tally itself is never saved (it is thousands of rows), so drop any
         still in memory — it belongs to the job being replaced, not this one. */
      D.iliImport=Object.assign(DEFAULT().iliImport,D.iliImport||{});
      /* forms and fields added since this job may have been saved */
      /* contacts and services were keyed objects before titles became editable
         and methods repeatable; carry any saved values across into the arrays
         rather than dropping a filled-in request form on the floor. */
      const nr=D.ndeReq||{};
      if(nr.contacts&&!Array.isArray(nr.contacts)){
        const old=nr.contacts;
        nr.contacts=NDE_CONTACT_ROWS.map(([t,src],i)=>{
          const k=['c1','c2','c3','i1','i2','i3','cm','pm','pe','p1','p2','p3'][i], o=old[k]||{};
          return {title:t,src,name:o.name||'',phone:o.phone||'',email:o.email||''};
        });
      }
      if(nr.services&&!Array.isArray(nr.services)){
        const old=nr.services;
        nr.services=NDE_SERVICES.map(([k])=>({k,sel:(old[k]||{}).sel||'',areas:(old[k]||{}).areas||''}));
      }
      D.ndeReq=Object.assign(blankNdeReq(),nr);
      D.deRanges=D.deRanges||{};
      if(!D.profile.endUS)D.profile.endUS='Dirt wall';
      if(!D.profile.endDS)D.profile.endDS='Dirt wall';
      ILI_TALLY=null;
      /* ---- migrate to the Acuren form schemas -------------------------------
         Indications gained the longseam / section / interactions / repair-detail
         columns, and the free-text "Eng. decision" was replaced by the Engineering
         Decision group — so anything written there is moved into Repair Comments
         rather than being dropped on the floor.
         Correlation rows gained the vendor's Tool Type / Width / surface columns
         and split field depth out into mils + a computed %. The old fieldDepth
         held a PERCENT; the new one holds MILS, so an old value cannot simply be
         carried across — it is converted back through the wall thickness where
         that is possible, and left for the tech where it is not. */
      const blankInd=TABLES.ind?TABLES.ind.blankRow():null;
      if(blankInd)D.indications=(D.indications||[]).map(r=>{
        const o=Object.assign({},blankInd,r);
        if(r.decision&&!o.repComments){ o.repComments=r.decision; }
        if(!o.nwt)o.nwt=String(Math.round(wallIn(D.master.nwt)*1000)||'');
        return o;
      });
      const blankCorr=TABLES.corrtab?TABLES.corrtab.blankRow():null;
      if(blankCorr)D.correlation=(D.correlation||[]).map(r=>{
        const o=Object.assign({},blankCorr,r);
        if(r.__v!=='acuren'&&String(r.fieldDepth??'').trim()!==''){
          const awt=num(o.fieldAwt)||Math.round(wallIn(D.master.nwt)*1000);
          const pct=num(r.fieldDepth);

document.addEventListener('input',e=>{
  const el=e.target;
  /* any edit makes the job dirty and schedules an autosave */
  if(el.dataset&&(el.dataset.p!==undefined||el.dataset.c||el.dataset.o||el.dataset.zl||el.dataset.r))markDirty();
  /* roster equipment, contacts, zone lists and operators are remembered across jobs */
  if(el.dataset&&(el.dataset.c||el.dataset.o||el.dataset.zl||el.dataset.r))scheduleLibrarySave();
  /* fitting maker (no data-p) */
  if(el.id==='fm-type'){FM.type=el.value;FM.p=fmDefaults(FM.type);FM.name='';renderFittingMaker();return;}
  if(el.dataset&&el.dataset.fm){FM.p[el.dataset.fm]=parseFloat(el.value)||0;
    const pv=$('#fm-preview');if(pv)pv.innerHTML=fittingPreviewSVG(FM.type,FM.p);return;}
  if(el.id==='fm-name'){FM.name=el.value;return;}
  if(el.dataset.p==='report.theme'){D.report.theme=el.value;renderReport();return;}
  if(el.dataset.p==='report.photoPer'){D.report.photoPer=+el.value||1;markDirty();renderReport();return;}
  /* internal grid cell */
  if(el.dataset.icell){
    const [gi,r,c]=el.dataset.icell.split(',').map(Number);
    const g=D.intGrids[gi]; if(!g)return;
    g.cells[r][c]=el.value;
    const nwt=wallIn(D.master.nwt), nv=parseFloat(el.value), td=el.parentElement;
    td.className=isFinite(nv)&&isFinite(nwt)&&nwt>0?(nv<nwt*0.8?'deep':(nv<nwt*0.875?'warm':'')):'';
    return;
  }
  /* pit grid cell (rs = H4 external, h5 = internal) */
  /* ---- National Grid Attachment 9 ---- */
  if(el.dataset.ng9pick!==undefined){ D.ng.ut9idx=+el.value; renderNG9(); return; }
  if(el.dataset.ng9dim){
    const g=NG9();
    ng9Resize(g, el.dataset.ng9dim==='r'?+el.value:g.rows, el.dataset.ng9dim==='c'?+el.value:g.cols);
    renderNG9(); return;
  }
  if(el.dataset.ng9clock){
    const [gi,j]=el.dataset.ng9clock.split(',').map(Number);
    D.ng.utGrids[gi].clockVals[j]=el.value; return;
  }
  if(el.dataset.cell){
    const tok=el.dataset.cell.split(',');
    const fam=tok.length===4?tok[0]:'rs';
    const [gi,r,c]=tok.slice(-3).map(Number);
    pitGridsOf(fam)[gi].cells[r][c]=el.value;
    updatePitCell(fam,gi,r,c);
    return;
  }
  /* roster field */
  if(el.dataset.r){
    const [name,key]=el.dataset.r.split('|');
    if(TECHS[name])TECHS[name][key]=el.value;
    return;
  }
  /* contact field */
  if(el.dataset.c){
    const [name,key]=el.dataset.c.split('|');
    if(CONTACTS[name])CONTACTS[name][key]=el.value;
    return;
  }
  /* operator profile field */
  if(el.dataset.o){
    const [name,key]=el.dataset.o.split('|');
    if(OPERATORS[name])OPERATORS[name][key]=el.value;
    return;
  }
  /* zone distribution list recipient field */
  if(el.dataset.zl){
    const [i,key]=el.dataset.zl.split('|');
    const list=ZONE_LISTS[ZONE_EDIT]; if(list&&list[+i]){list[+i][key]=el.value;}
    /* if this zone is the active one, keep the export CC in sync live */
    if(D.master.zone===ZONE_EDIT)applyZoneContacts();
    return;
  }
  if(el.dataset.p!==undefined&&el.dataset.p){
    setPath(D,el.dataset.p,el.value);
    /* anything the site overview map is built from — redraw it live (debounced) */
    if(/^siteMap\.|^gps\.rows\[\d+\]\.(lat|lon|label|desc|refFt)$/.test(el.dataset.p))refreshSiteMap();
    /* ILI window — recount what would import, without touching the inputs */
    if(/^iliImport\./.test(el.dataset.p))renderIliSummary();
    /* the derived columns of whichever table row this cell belongs to */
    recalcRow(el.dataset.p);
    /* a name on the request form brings its phone and email with it */
    if(el.dataset.ndename!==undefined){
      if(ndeLookup(+el.dataset.ndename,false))renderNdeReq();
    }
    /* Correlating Feature ID → pull that indication's field measurements across.
       Only ever fills blanks: a number already typed on the correlation row was
       put there deliberately and is not ours to overwrite. */
    const fm=String(el.dataset.p).match(/^correlation\[(\d+)\]\.fieldId$/);
    if(fm){ const n=corrPullField(+fm[1]); if(n)renderTable('corrtab'); refresh('corr'); }
    /* the greyed repair columns unlock the moment a Repair Type is chosen */
    if(/^indications\[\d+\]\.repair$/.test(el.dataset.p))renderTable('ind');
    /* NWT, diameter and the ref log distance feed every computed column */
    if(/^master\.(nwt|diameter|measuredCirc|refLogDist)$/.test(el.dataset.p)){
      renderTable('ind'); renderTable('corrtab');
    }
    /* personnel field: light up the + when this name isn't in Contacts yet */
    if(el.dataset.contact){
      const b=el.parentElement&&el.parentElement.querySelector('.cadd');
      if(b){const v=el.value.trim();
        const known=!v||allContactNames().includes(v);
        b.classList.toggle('known',known); b.classList.toggle('on',!known);}
    }
    /* DE technician chosen → their GPS receiver, if the page is still blank.
       Only ever fills blanks; a receiver typed by hand stays put. */
    if(/^master\.(techs|repairTech)$|^lsc\.tech$/.test(el.dataset.p))renderLscTechNote();
    if(/^master\.(testProgram|pfl|lineNumber|milePoint|stationing|diameter|nwt|seamTypeDoc|grade|smys|installYear|coatingType)$/.test(el.dataset.p))renderDeRanges();
    if(/^master\.(stationing|assessStart|assessEnd|iliDig|refLogDist|refGirthWeld)$|^profile\.(endUS|endDS)$/.test(el.dataset.p)){
      renderStationNote(); redrawH3();
    }
    if(el.dataset.p==='lsc.tech')
      $$(`[data-p="lsc.tech"]`).forEach(o=>{ if(o!==el)o.value=el.value; });
    if(el.dataset.p==='master.techs'){
      pullGpsFromRoster(false);
      const u=$('input[data-p="gps.unit"]'), sn=$('input[data-p="gps.serial"]');
      if(u)u.value=D.gps.unit; if(sn)sn.value=D.gps.serial;
    }
    /* Grade → SMYS auto-fill (workbook lookup) */
    if(el.dataset.grade){const s=SMYS_MAP[el.value]; if(s){D.master.smys=String(s); const f=$('input[data-p="master.smys"]'); if(f)f.value=s;}}
    /* Measured circumference → calculated diameter */
    if(el.dataset.circ){const c=num(el.value); const dcalc=isFinite(c)?(c/Math.PI).toFixed(3):'';
      D.master.calcDiameter=dcalc; const f=$('input[data-p="master.calcDiameter"]'); if(f)f.value=dcalc;}
    /* live bits that don't rebuild inputs */
    progress();
    if(['ind','map'].includes(CUR)) {indCounts(); if(CUR==='map')renderMaps();}
    if(CUR==='h7') renderMaps();
    if(CUR==='h3') renderProfile();
    if(CUR==='h4'&&/^rstreng\.grids\[(\d+)\]\.(readings|awt)$/.test(el.dataset.p)){
      const gi=+el.dataset.p.match(/\[(\d+)\]/)[1];
      const pv=$('#h4-prof-'+gi); if(pv)pv.innerHTML=gridProfileSVG(D.rstreng.grids[gi]);
    }
    if((CUR==='samples'||CUR==='h1')&&el.dataset.res!==undefined)computeResistivity();
    if(el.dataset.p==='master.operator'){
      D.master.operator=normalizeOperator(el.value);
      /* Selecting National Grid turns its two sheets on, once. It does NOT turn the
         H-Form off — shops that run the H-Form for internal QC keep both. Unticking
         a sheet by hand sticks: we only auto-tick when neither has been touched. */
      if(D.master.operator==='National Grid'&&!D.report.include.ng8&&!D.report.include.ng9&&!D.report._ngTouched){
        D.report.include.ng8=1; D.report.include.ng9=1; D.report._ngTouched=1;
      }
      /* labels across the whole UI resolve through OP() — rebuild so they refresh */
      rebuildAfterRoster(); nav(CUR); return;}
    if(el.dataset.p==='master.zone'){applyZoneContacts(true);nav(CUR);return;}
    /* editing a personnel name: refresh the PM "To" address only.
       ccEmails belongs to the zone distribution list — never rebuild it from
       the four role-holders or a 20-person zone list collapses to 4. */
    if(CONTACT_FIELD_PATHS.includes(el.dataset.p)){
      if(el.dataset.p==='master.pm')D.master.pmEmail=lookupEmail(D.master.pm)||'';
      if(!ZONE_NAMES.includes(D.master.zone))
        D.master.ccEmails=[D.master.pe,D.master.pleName,D.master.cm].map(lookupEmail).filter(Boolean).join('; ');
    }
    if(el.dataset.p==='gridColor.h4'){renderH4Grids();return;}
    if(el.dataset.p==='gridColor.h5'){renderH5Grids();return;}
    if(CUR==='h3'&&/^(profile\.|h1\.doc)/.test(el.dataset.p||'')){
      if(el.dataset.p==='profile.layoutMode')toggleH3Manual();
      if(el.dataset.p==='gps.view')renderGPSDiagram();
      renderH3Views();
    }
    if(CUR==='gps') gpsStats();
    if(CUR==='corr') corrCheck();
    if(CUR==='h8') corrlogStats();
    if(CUR==='dents'&&el.dataset.p.startsWith('dents')) refreshDentPct();
    if(CUR==='details') renderDetails();
    if(el.dataset.p.startsWith('sections')&&el.dataset.p.includes('utt')) uttStats();
  }

document.addEventListener('paste',e=>{
  const el=e.target;
  if(el.dataset&&el.dataset.icell){
    const text=(e.clipboardData||window.clipboardData).getData('text');
    if(!/[\t\n]/.test(text))return;
    e.preventDefault();
    const [gi,r0,c0]=el.dataset.icell.split(',').map(Number);
    const g=D.intGrids[gi];
    const rows=text.replace(/\r/g,'').split('\n').filter(x=>x.trim()!=='');
    const block=rows.map(row=>row.split(/\t|,(?=\s*\d)/));
    block.forEach((row,ri)=>row.forEach((v,ci)=>{
      if(r0+ri<g.rows&&c0+ci<g.cols)g.cells[r0+ri][c0+ci]=v.trim();
    }));
    renderIntGrids();
    const back=$(`[data-icell="${gi},${r0},${c0}"]`); if(back)back.focus();
    return;
  }
  if(!el.dataset||!el.dataset.cell)return;
  const text=(e.clipboardData||window.clipboardData).getData('text');
  if(!/[\t\n]/.test(text))return; /* single value → default paste */
  e.preventDefault();
  const tok=el.dataset.cell.split(',');
  const fam=tok.length===4?tok[0]:'rs';
  const [gi,r0,c0]=tok.slice(-3).map(Number);
  const g=pitGridsOf(fam)[gi];
  const rows=text.replace(/\r/g,'').split('\n').filter(x=>x.trim()!=='');
  const block=rows.map(row=>row.split(/\t|,(?=\s*\d)/));
  const needR=r0+block.length, needC=c0+Math.max(...block.map(b=>b.length));
  if(needR>g.rows||needC>g.cols)(fam==='ng9'?ng9Resize:resizeGrid)(g,Math.max(g.rows,needR),Math.max(g.cols,needC));
  block.forEach((row,ri)=>row.forEach((v,ci)=>{
    const val=v.trim();
    if(r0+ri<g.rows&&c0+ci<g.cols)g.cells[r0+ri][c0+ci]=val===''?'':String(parseFloat(val)||val);
  }));
  fam==='ng9'?renderNG9():(fam==='h5'?renderH5Grids():renderH4Grids());
  const back=$(`[data-cell="${fam},${gi},${r0},${c0}"]`); if(back)back.focus();
});

function toggleH3Manual(){const m2=$('#h3-manual');if(m2)m2.style.display=D.profile.layoutMode==='manual'?'block':'none';}
/* Preview mirrors the tri-state so it's always obvious which of the three the

function renderLSCLogoPreview(){
