/* drag components on the H3 drawing (manual mode) */
let H3DRAG=null;
/* Drag a GPS callout. Unlike an H3 element (which moves in feet along the pipe)
   a callout is pure annotation, so the nudge is stored in SVG px on the row. */
let GPSDRAG=null;
document.addEventListener('pointerdown',e=>{
  const gt=e.target.closest('[data-gpsdrag]');
  if(gt){
    const svg=gt.closest('svg'); if(!svg)return;
    const r=D.gps.rows[+gt.dataset.gpsdrag]; if(!r)return;
    const bb=svg.getBoundingClientRect();
    const vw=(svg.viewBox&&svg.viewBox.baseVal&&svg.viewBox.baseVal.width)||bb.width;
    GPSDRAG={i:+gt.dataset.gpsdrag,x0:e.clientX,y0:e.clientY,
             dx0:num(r.ldx)||0,dy0:num(r.ldy)||0,k:vw/(bb.width||vw)};
    e.preventDefault(); return;
  }
  const t=e.target.closest('[data-drag]'); if(!t)return;
  const svg=t.closest('svg'); if(!svg)return;
  const i=+t.dataset.drag, g2=D.profile.elems[i]; if(!g2)return;
  const scale=parseFloat(svg.dataset.h3scale)||0.01;
  const vscale=parseFloat(svg.dataset.h3vscale)||0;
  const pxScale=svg.getBoundingClientRect().width/ (svg.viewBox&&svg.viewBox.baseVal&&svg.viewBox.baseVal.width||svg.getBoundingClientRect().width);
  H3DRAG={i,x0:e.clientX,y0:e.clientY,s0:num(g2.start)||0,e0:num(g2.end),v0:num(g2.voff)||0,
          ftPerPx:scale/(pxScale||1), vftPerPx:vscale/(pxScale||1)};
  e.preventDefault();
});
document.addEventListener('pointermove',e=>{
  if(GPSDRAG){
    const r=D.gps.rows[GPSDRAG.i]; if(!r){GPSDRAG=null;return;}
    r.ldx=String(Math.round((GPSDRAG.dx0+(e.clientX-GPSDRAG.x0)*GPSDRAG.k)*10)/10);
    r.ldy=String(Math.round((GPSDRAG.dy0+(e.clientY-GPSDRAG.y0)*GPSDRAG.k)*10)/10);
    renderGPSDiagram();
    return;
  }
  if(!H3DRAG)return;
  const g2=D.profile.elems[H3DRAG.i]; if(!g2){H3DRAG=null;return;}
  /* hold Shift to lock to one axis (whichever the pointer moved most) */
  const rawX=e.clientX-H3DRAG.x0, rawY=e.clientY-H3DRAG.y0;
  let doX=true, doY=H3DRAG.vftPerPx>0;
  if(e.shiftKey){ if(Math.abs(rawX)>=Math.abs(rawY))doY=false; else doX=false; }
  if(doX){
    const dft=rawX*H3DRAG.ftPerPx;
    g2.start=String(Math.round((H3DRAG.s0+dft)*100)/100);
    if(isFinite(H3DRAG.e0))g2.end=String(Math.round((H3DRAG.e0+dft)*100)/100);
  }
  if(doY){
    const dv=rawY*H3DRAG.vftPerPx;                       // + = dragged down = deeper
    g2.voff=String(Math.round((H3DRAG.v0+dv)*100)/100);
  }
  redrawH3();
});
document.addEventListener('pointerup',()=>{
  if(GPSDRAG){ GPSDRAG=null; markDirty(); }
  if(H3DRAG){renderTable('h3elems');H3DRAG=null;}
});

/* ============================================================
   PHOTO LOG — phases, labels, auto-annotation
   ============================================================ */
/* Phases live in the LIBRARY, not the job file — the same call as ZONE_LISTS.
   A shop's phase breakdown is a standing convention, so customising it once
   should carry to every job afterwards, not just the open one.

   Each phase keeps a stable `key`. genPhotoLog() tags its shots by key, so
   renaming "Backfill" re-tags the generated shots rather than silently
   orphaning them against a hard-coded string. */
const PHASE_DEFAULTS=[
  {key:'exc',   name:'Excavation overview',    req:1},
  {key:'coat',  name:'Coating overview',       req:1},
  {key:'under', name:'Under-coating overview', req:0},
  {key:'bare',  name:'Bare pipe assessment',   req:1},
  {key:'mt',    name:'MT assessment',          req:0},
  {key:'supp',  name:'Supplemental',           req:0},
  {key:'rep',   name:'Repair',                 req:0},
  {key:'recoat',name:'Recoat',                 req:0},
  {key:'back',  name:'Backfill',               req:1}
];
let PHASES=JSON.parse(JSON.stringify(PHASE_DEFAULTS));
const phaseNames=()=>PHASES.map(p=>p.name);
const phaseReq=()=>PHASES.filter(p=>p.req).map(p=>p.name);
const PH=k=>{ const p=PHASES.find(x=>x.key===k); return p?p.name:''; };
/* A job may carry a phase this browser has never heard of — someone else's
   custom list, or one since renamed. Offer it anyway rather than blanking the
   cell the moment the row re-renders. */
function phaseOrphans(){
  const known=phaseNames();
  return [...new Set((D.photoLog||[]).map(r=>r.phase).filter(p=>p&&!known.includes(p)))];
}
const phaseOpts=()=>[...phaseNames(),...phaseOrphans()].map(n=>[n,n]);

/* Fold state is deliberately NOT part of D: it is a view preference, so it
   neither dirties the job nor travels in the saved file nor touches print. */
const PHASE_FOLD=new Set();

/* ---- labels & dimension strings ----
   genPhotoLog() already had this format baked into its template literals. It is
   lifted out here so the generator, the annotator and the missing-photo audit
   all read one definition and cannot drift apart. */
const indLabel=(r,i)=>`${r.type||'IND'}-${String(r.id||i+1).padStart(3,'0')}`;
const cdLabel =(r,i)=>`${r.type||'CD'}-${String(r.no||i+1).padStart(3,'0')}`;
const indDims =r=>`Axd: ${r.dist||'—'}' | ${r.clock||'—'} | L: ${r.len||'—'}" | W: ${r.wid||'—'}" | D: ${r.depth||'—'} mils${r.awt?' | AWT: '+r.awt+' mils':''}`;
const cdDims  =r=>`Axd: ${r.dist||'—'}' | ${r.clock||'—'} | L: ${r.len||'—'}" | C: ${r.circ||'—'}"`;

function damageItems(){
  return [
    ...D.coatDamage.map((r,i)=>({label:cdLabel(r,i), dims:cdDims(r), kind:'Coating damage', row:r})),
    ...D.indications.map((r,i)=>({label:indLabel(r,i), dims:indDims(r), kind:'Indication', row:r}))
  ].filter(it=>/^[A-Za-z]/.test(it.label));
}
const reEsc=s=>String(s).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
/* EC-1, EC-01 and EC-001 all mean the same defect, so match the number, not the
   padding. \b stops "EC-001" matching inside "CEC-001". */
function labelRe(label){
  const m=String(label).match(/^(.*?)-0*(\d+)$/);
  if(!m)return new RegExp('\\b'+reEsc(label)+'\\b','i');
  return new RegExp('\\b'+reEsc(m[1])+'[\\s_-]?0*'+m[2]+'\\b','i');
}
/* Every generated dimension string starts at "Axd:", so one rule strips whatever
   a previous run appended — that is what makes re-running idempotent instead of
   stacking the dimensions up again. */
const DIM_RE=/\s*\|\s*(?:[A-Za-z]{1,8}-\d+\s*:\s*)?Axd:[\s\S]*$/;
const stripDims=s=>String(s||'').replace(DIM_RE,'').replace(/\s+$/,'');

function annotatePhotoLog(){
  const items=damageItems();
  if(!items.length){
    importNote('#photo-annotate-note','Nothing to annotate — the indication table and coating damage log are both empty.',true);
    return;
  }
  let changed=0, touched=0;
  const seen=new Set();
  D.photoLog.forEach(p=>{
    const base=stripDims(p.comments);
    const hits=items.filter(it=>labelRe(it.label).test(base));
    hits.forEach(h=>seen.add(h.label));
    /* one label reads as the generator writes it; several get labelled blocks
       so it stays clear which dimensions belong to which defect */
    const next=hits.length
      ? base+(hits.length===1?' | '+hits[0].dims:hits.map(h=>` | ${h.label}: ${h.dims}`).join(''))
      : base;
    if(hits.length)touched++;
    if(next!==p.comments){ p.comments=next; changed++; }
  });
  const missing=items.filter(it=>!seen.has(it.label));
  markDirty(); renderTable('photo'); refresh('h9');
  const bits=[`<b>${changed}</b> caption${changed!==1?'s':''} updated across <b>${touched}</b> photo${touched!==1?'s':''}`];
  if(missing.length)bits.push(`<b>${missing.length}</b> with no photo: ${missing.map(m=>esc(m.label)).join(', ')}`);
  else bits.push(`every logged defect has at least one photo`);
  importNote('#photo-annotate-note',bits.join(' · '),missing.length>0);
}

/* which defects nobody photographed — the audit half of the macro */
function missingPhotoLabels(){
  if(!D.photoLog.length)return [];
  return damageItems().filter(it=>!D.photoLog.some(p=>labelRe(it.label).test(p.comments||'')));
}
function sortByPhase(){
  const names=phaseNames();
  const rank=p=>{const i=names.indexOf(p);return i<0?names.length:i;};
  /* stable: photos keep their relative order inside a phase */
  D.photoLog=D.photoLog.map((r,i)=>({r,i}))
    .sort((a,b)=>rank(a.r.phase)-rank(b.r.phase)||a.i-b.i)
    .map(x=>x.r);
}
function phaseCounts(){
  const el=$('#photo-phases'); if(!el)return;
  const n=name=>D.photoLog.filter(r=>r.phase===name).length;
  const un=D.photoLog.filter(r=>!r.phase).length;
  el.innerHTML=PHASES.map(p=>{
    const c=n(p.name);
    return `<span class="pill${c?'':(p.req?' bad':'')}" title="${p.req?'expected in a complete package':'include when applicable'}">${esc(p.name)}${p.req?' *':''} <b>${c}</b></span>`;
  }).join('')
   +phaseOrphans().map(o=>`<span class="pill mid" title="not in your phase list — from another list, or since renamed">${esc(o)} <b>${n(o)}</b></span>`).join('')
   +(un?`<span class="pill mid">unassigned <b>${un}</b></span>`:'');
}

/* ---- the phase editor ---- */
function renderPhaseEditor(){
  const el=$('#phase-editor'); if(!el)return;
  el.innerHTML=`<div class="twrap"><table class="dt"><thead><tr>
      <th style="width:34px"></th><th>Phase name</th><th style="width:88px" title="Validation flags a complete package that has no photo in this phase">Expected</th><th style="width:96px"></th></tr></thead><tbody>${
    PHASES.map((p,i)=>`<tr>
      <td class="rowno">${i+1}</td>
      <td><input data-phname="${i}" value="${esc(p.name)}" style="min-width:220px"></td>
      <td style="text-align:center"><input type="checkbox" data-phreq="${i}"${p.req?' checked':''} style="width:auto"></td>
      <td style="white-space:nowrap">
        <button class="tb-btn" data-phmove="${i},-1"${i===0?' disabled':''} title="Move up">↑</button>
        <button class="tb-btn" data-phmove="${i},1"${i===PHASES.length-1?' disabled':''} title="Move down">↓</button>
        <button class="del" data-phdel="${i}" title="Remove">✕</button>
      </td></tr>`).join('')
  }</tbody></table></div>
  <div class="noprint" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:8px">
    <button class="tb-btn pri" id="ph-add">+ Add phase</button>
    <button class="tb-btn" id="ph-reset">Reset to standard</button>
    <span class="hint" style="padding:0">Kept in this browser and reused on every job · order here is dig order · <b>*</b> = expected</span>
  </div>`;
}
/* renaming a phase has to carry the photos already filed under it, or they all
   drop to "unassigned" the moment you fix a typo */
function renamePhase(i,next){
  const from=PHASES[i].name, to=String(next).trim();
  if(!to||to===from)return false;
  if(PHASES.some((p,j)=>j!==i&&p.name===to)){ alert(`There is already a phase called “${to}”.`); return false; }
  PHASES[i].name=to;
  let moved=0;
  (D.photoLog||[]).forEach(r=>{ if(r.phase===from){ r.phase=to; moved++; } });
  if(PHASE_FOLD.delete(from))PHASE_FOLD.add(to);
  if(moved)markDirty();
  return true;
}
function phasesChanged(){ saveLibrary(); renderPhaseEditor(); renderTable('photo'); phaseCounts(); }

/* ============================================================
   FOLDER IMPORT
   ============================================================ */
/* IMG_2 must sort before IMG_10 — plain lexicographic ordering puts a folder
   of camera shots in the wrong sequence, which is the whole point of importing
   a folder rather than picking files by hand. */
const natCmp=(a,b)=>String(a).localeCompare(String(b),undefined,{numeric:true,sensitivity:'base'});

/* DSC_0042 / IMG_1234 / P1010101 carry no meaning, so they stay out of the
   caption. A file someone deliberately named ("6 oclock disbondment.jpg")
   is worth keeping — it is usually the only caption anyone wrote on site. */
const CAMERA_DEFAULT=/^(dsc|dscn|img|imag|image|p|pict|photo|gopr|dji|_mg|mvimg|pxl|screenshot)[\s_-]*\d[\d\s_.-]*$/i;
function captionFromName(name){
  const base=String(name).replace(/\.[^.]+$/,'').trim();
  if(!base||CAMERA_DEFAULT.test(base)||/^\d+$/.test(base))return '';
  return base.replace(/[_]+/g,' ').replace(/\s{2,}/g,' ').trim();
}
async function folderImport(files,mode){
  const imgs=[...files]
    .filter(f=>/^image\//.test(f.type)||/\.(jpe?g|png|gif|bmp|webp|tiff?)$/i.test(f.name))
    .sort((a,b)=>natCmp(a.webkitRelativePath||a.name,b.webkitRelativePath||b.name));
  if(!imgs.length){
    importNote('#photo-import-note','No images in that folder. Sub-folders are included, but only image files are taken.',true);
    return 0;
  }
  if(mode==='replace'&&D.photoLog.length&&!confirm(`Replace the ${D.photoLog.length} existing photo log entrie(s) with ${imgs.length} photo(s)?`))return 0;
  if(mode==='replace')D.photoLog=[];
  const start=D.photoLog.length;
  let named=0;
  for(let i=0;i<imgs.length;i++){
    importNote('#photo-import-note',`Importing ${i+1} of ${imgs.length} — ${esc(imgs[i].name)}…`);
    /* yield so the note actually paints between photos */
    await new Promise(r=>setTimeout(r,0));
    const cap=captionFromName(imgs[i].name);
    if(cap)named++;
    D.photoLog.push({no:String(start+i+1),comments:cap,img:await ingestPhoto(imgs[i])});
  }
  markDirty(); renderTable('photo'); renderPhotoWeight(); refresh('h9');
  const w=photoWeight();
  importNote('#photo-import-note',
    `Imported <b>${imgs.length}</b> photo${imgs.length!==1?'s':''} in filename order`
    +(named?` · ${named} caption${named!==1?'s':''} taken from the filenames`:'')
    +` · ${fmt(w.b/1048576,1)} MB after downscaling. Photo numbers were assigned in order — edit any that should differ.`);
  return imgs.length;
}

/* ============================================================
   PHOTO REPORT
   One photo per page, caption underneath, appended after everything else so it
   cannot disturb the pagination of any data sheet. The H-Form photo log stays
   a plain register; this is the evidence.
   ============================================================ */
const PHOTOREP_LAYOUT={1:{cols:1,rows:1,h:788},2:{cols:1,rows:2,h:376},4:{cols:2,rows:2,h:376}};
function rPhotoReport(){
  const shots=D.photoLog.filter(p=>p.img);
  if(!shots.length)return '';
  /* the <select> hands back a string; without coercing, `i+=nPer` would
     concatenate ("0"+"2"="02") instead of adding and the loop would never end */
  const nPer=PHOTOREP_LAYOUT[+D.report.photoPer]?+D.report.photoPer:1;
  const L=PHOTOREP_LAYOUT[nPer];
  const pages=Math.ceil(shots.length/nPer);
  const site=[D.master.digSite,D.master.lineNumber].filter(Boolean).join(' · ');
  let out='';
  for(let i=0;i<shots.length;i+=nPer){
    const ch=shots.slice(i,i+nPer);
    out+=`<div class="rpage portrait">
      <div style="display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1.5px solid #000;padding-bottom:3px;margin-bottom:9px">
        <div style="font-weight:700;font-size:12.5px">PHOTO REPORT</div>
        <div style="font-size:9px">${(()=>{const ph=[...new Set(ch.map(x=>x.phase).filter(Boolean))];
          return ph.length===1?rEsc(ph[0])+' · ':'';})()}${rEsc(site)}${site?' · ':''}Page ${Math.floor(i/nPer)+1} of ${pages}</div>
      </div>
      <div class="prep" style="grid-template-columns:repeat(${L.cols},1fr)">
        ${ch.map((p,j)=>`<figure class="prshot">
            <div class="pri" style="height:${L.h}px"><img src="${p.img}" alt="Photo ${rEsc(p.no)}"></div>
            <figcaption class="prc"><b>Photo ${rEsc(p.no)}.</b>${p.comments?' '+rEsc(p.comments):''}</figcaption>
          </figure>`).join('')}
      </div>
    </div>`;
  }
  return out;
}

/* ============================================================
   IMPORT DRIVERS
   ============================================================ */
function importNote(sel,msg,bad){
  const n=$(sel); if(n)n.innerHTML=`<div class="banner${bad?' crit':''}" style="margin-top:10px">${msg}</div>`;
}

/* --- PowerPoint -> photo log ------------------------------------------------
   Three deliberate departures from the macro:
     1. It also lifts the PICTURE off each slide. The COM version could only
        read text, so photos were pasted in by hand afterwards.
     2. Placeholder lookups reset per slide. The macro's On Error Resume Next
        left the previous slide's text in the object when a placeholder was
        missing, silently duplicating captions.
     3. It appends or replaces on request instead of always appending to the
        first empty row, which is what produced double imports.                */
async function pptxImport(file,mode){
  const btn=$('#ppt-import'); if(btn)btn.disabled=true;
  importNote('#photo-import-note','Reading '+esc(file.name)+'…');
  try{
    const buf=await file.arrayBuffer();
    const opts={numName:($('#ppt-numname')||{}).value||PPT_DEFAULTS.numName,
                txtName:($('#ppt-txtname')||{}).value||PPT_DEFAULTS.txtName};
    const slides=await parsePptx(buf,opts);
    const rows=[];
    for(const s of slides){
      rows.push({no:s.no,comments:s.comments,img:s.img?await ingestPhoto(s.img):''});
    }
    if(mode==='replace')D.photoLog=rows; else D.photoLog=D.photoLog.concat(rows);
    const withImg=rows.filter(r=>r.img).length;
    const guessed=slides.filter(s=>s.guessed).length;
    markDirty(); renderTable('photo'); renderPhotoWeight(); refresh('h9');
    importNote('#photo-import-note',
      `Imported <b>${rows.length}</b> slide${rows.length!==1?'s':''} — ${withImg} with a photo`
      +(guessed?` · <b>${guessed}</b> slide${guessed!==1?'s':''} had no “${esc(opts.txtName)}” placeholder, so the largest text box was used — check those captions`:'')
      +`.`, guessed>0);
  }catch(err){
    importNote('#photo-import-note','Could not read that deck: '+esc(err.message),true);
  }finally{ if(btn)btn.disabled=false; }
}

/* ============================================================
   ILI PIPE TALLY  —  parse + windowed import into the correlation table
   A tally covers the whole line: the file at hand is 5,635 rows over 10.5
   miles, and a dig is forty feet of it. So nothing is imported until a start
   and end log distance are set, and the window is applied before any row
   becomes a correlation entry.
   Nothing here is positional. Every vendor ships a different sheet — the
   header is found by scoring rows against the labels below, then columns are
   matched by name, so a Rosen tally and a Baker tally both land correctly.
   ============================================================ */
const tnorm=s=>String(s??'').toLowerCase().replace(/[^a-z0-9]+/g,'');
/* first pattern to match a cell claims that column; order matters where two
   headers normalise close together (Comment vs ILI Vendor Comments) */
const TALLY_FIELDS=[
  ['dist',   [/^ilisurveydistance/,/^logdistance/,/^odometer/,/^absolutedistance/,/^ilidistance/,/^surveydistance/,/^distanceft$/,/^distance$/,/^wheelcount/]],
  ['ident',  [/^identification$/,/^featuretype/,/^anomalytype/,/^featureidentification/,/^eventtype/,/^feature$/,/^type$/,/^description$/]],
  ['fid',    [/^anomalyid/,/^featureid/,/^featurenumber/,/^featureno/,/^anomalyno/]],
  ['depth',  [/^depth$/,/^depthpercent/,/^depthpct/,/^peakdepth/,/^maxdepth/,/^depthofwallloss/]],
  ['len',    [/^length/,/^axiallength/]],
  ['wid',    [/^width/,/^circumferentialwidth/,/^circwidth/]],
  ['clock',  [/^oclock$/,/^clock/,/^orientation/,/^circumferentialposition/,/^clockposition/]],
  ['surf',   [/^externalinternal$/,/^internalexternal$/,/^extint$/,/^intext$/,/^surface$/,/^anomalysurface/]],
  ['tol',    [/^associatedtooltolerance/,/^tooltolerance/,/^tolerance/]],
  ['comment',[/^comment$/,/^comments$/,/^ilivendorcomments/,/^vendorcomments/]],
  ['wt',     [/^wtin$/,/^wt$/,/^wallthickness/,/^nominalwallthickness/]],
  ['cluster',[/^clusterid/]],
  ['joint',  [/^jointusgwnumber/,/^jointnumber/,/^joint$/]]
];
function tallyHeader(row){
  const map={}; let score=0; const taken=new Set();
  (row||[]).forEach((cell,i)=>{
    const t=tnorm(cell); if(!t||taken.has(i))return;
    for(const [key,pats] of TALLY_FIELDS){
      if(map[key]!=null)continue;
      if(pats.some(p=>p.test(t))){ map[key]=i; taken.add(i); score++; break; }
    }
  });
  return {map,score};
}
/* Reference features: pipe furniture and joint boundaries, not anomalies.
   Tested before the anomaly list so "Area Start Sleeve" never reads as a flaw. */
const ILI_REF=/girth ?weld|^weld$|bend|^tap|tee\b|valve|flange|magnet|agm|marker|casing|launcher|receiver|sleeve|patch|clamp|anode|support|close metal|area (start|end)|installation|attachment|reference|^station|elbow|skew/i;
/* Identification -> this app's indication code. First match wins, so compound
   calls ("dent detected w/ metal loss") must precede the simple ones.
   'ML' is a placeholder resolved to EC or IC by the External/Internal column. */
const ILI_TYPE=[
  [/dent|deformation/,'DNT'],
  [/cluster/,'ML'],
  [/manufactur|mill anomal/,'MFR'],
  [/metal ?loss|corros/,'ML'],
  [/lamination|blister|hydrogen/,'LAM'],
  [/crack|scc|stress corros/,'SCC'],
  [/gouge|mechanical|grind|groove/,'MD'],
  [/wrinkle/,'WRNK'],[/buckle/,'BCKL'],[/hard ?spot/,'HS'],
  [/arc ?burn/,'ArcB'],[/weld repair/,'WR'],[/lack of fusion/,'LOF'],
  [/extra metal/,'MILL']
];
function iliDefect(ident,surf){
  const s=String(ident||'').toLowerCase().trim();
  if(!s)return {ref:false,code:''};
  if(ILI_REF.test(s))return {ref:true,code:''};
  for(const [re,code] of ILI_TYPE){
    if(!re.test(s))continue;
    if(code!=='ML')return {ref:false,code};
    return {ref:false, code: /^int/.test(String(surf||'').toLowerCase().trim())?'IC':'EC'};
  }
  return {ref:false,code:''};
}
/* Excel keeps o'clock as a time serial — 0.25 is 06:00, and a full datetime
   serial carries the same fraction — so only the fractional day matters.
   Text clocks ("06:00:00", "6:00") come through the same normaliser. */
function tallyClock(v){
  if(v==null||v==='')return '';
  if(typeof v==='number'){
    if(!isFinite(v))return '';
    const f=v-Math.floor(v);
    return clockLabel((f*24)%12);
  }
  const m=String(v).trim().match(/^(\d{1,2}):(\d{2})/);
  if(m)return clockLabel((+m[1]%12)+(+m[2])/60);
  return String(v).trim();
}
const tnum=v=>{ if(typeof v==='number')return isFinite(v)?v:NaN;
  const s=String(v??'').replace(/[, ]/g,''); return s===''?NaN:Number(s); };
const tstr=v=>String(v??'').replace(/\s+/g,' ').trim();

/* rows (array of arrays) -> {features, header, map, extent} */
function parseTally(rows){
  let hi=-1, best=0, map=null;
  for(let i=0;i<Math.min(rows.length,60);i++){
    const h=tallyHeader(rows[i]);
    if(h.score>best){ best=h.score; hi=i; map=h.map; }
  }
  if(hi<0||best<3||map.dist==null||map.ident==null)
    throw new Error('could not find a header row — need a distance column (ILI Survey Distance / Log Distance / Odometer) and a feature column (Identification / Feature Type)');
  const at=(r,k)=>map[k]==null?null:r[map[k]];
  const feats=[];
  for(let i=hi+1;i<rows.length;i++){
    const r=rows[i]; if(!r||!r.length)continue;
    const dist=tnum(at(r,'dist')); if(!isFinite(dist))continue;
    const ident=tstr(at(r,'ident'));
    const surf=tstr(at(r,'surf'));
    const {ref,code}=iliDefect(ident,surf);
    if(!ident&&!isFinite(tnum(at(r,'depth'))))continue;   /* spacer row */
    feats.push({row:i+1, dist, ident, ref, code, surf,
      fid:tstr(at(r,'fid')), clock:tallyClock(at(r,'clock')),
      len:tnum(at(r,'len')), wid:tnum(at(r,'wid')), depth:tnum(at(r,'depth')),
      tol:tnum(at(r,'tol')), wt:tnum(at(r,'wt')),
      comment:tstr(at(r,'comment')), cluster:tstr(at(r,'cluster')), joint:tstr(at(r,'joint'))});
  }
  if(!feats.length)throw new Error('header found, but no rows under it had a numeric distance');
  const ds=feats.map(f=>f.dist);
  return {features:feats, headerRow:hi+1, map, extent:[Math.min(...ds),Math.max(...ds)]};
}
/* one tally feature -> one correlation row; the field side stays blank for the
   tech to fill in — or for corrPullField to fetch off the Indication Table */
function tallyToCorr(f){
  const notes=[f.cluster?'cluster '+f.cluster:'', f.comment].filter(Boolean).join(' · ');
  const r=refLog(), dist=isFinite(r)&&isFinite(f.dist)?(f.dist-r).toFixed(3):'';
  return {iliId:f.fid, defect:f.code, tool:D.master.iliTool||'',
    logDist:isFinite(f.dist)?String(f.dist):'', iliDist:dist,
    iliClock:f.clock, iliLen:isFinite(f.len)?String(f.len):'',
    iliWid:isFinite(f.wid)?String(f.wid):'',
    iliDepth:isFinite(f.depth)?String(f.depth):'', tol:isFinite(f.tol)?String(f.tol):'',
    iliSurf:/^ext/i.test(f.surf)?'OD':(/^int/i.test(f.surf)?'ID':(f.surf?'N/A':'')),
    fieldId:'', fieldDist:'', fieldClock:'', fieldLen:'', fieldWid:'',
    fieldDepth:'', fieldAwt:'', fieldSurf:'',
    notes:notes||f.ident, decision:''};
}

/* ============================================================
   CORR. TABLE workbook  —  import an already-built correlation sheet
   The GridOverlay export carries a "Corr. Table" laid out exactly like the
   printed form, both sides already populated. Read it by header name like the
   pipe tally, so a sheet whose columns have shifted still lands correctly.
   ============================================================ */
/* The sheet repeats its header text across the two halves — "Dist. From Ref",
   "Orient. (Clock)" and "Length (in)" each appear once for the vendor's call and
   again for the field measurement. Position is the only thing telling them
   apart, so the split is located first (the Correlating Feature ID column) and
   each half is then matched against its own vocabulary over its own columns. */
const CORR_ILI=[
  ['iliId',    [/^ilifeatid$/,/^ilifeatureid$/,/^featid$/,/^featureid$/]],
  ['defect',   [/^defecttype$/,/^type$/]],
  ['tool',     [/^tooltype$/,/^tool$/]],
  ['logDist',  [/^logdistanceft$/,/^logdistance$/,/^logdist/]],
  ['iliDist',  [/^distfromrefft$/,/^distfromref$/]],
  ['iliClock', [/^orientclock$/,/^orientationclock$/]],
  ['iliLen',   [/^lengthin$/,/^length$/]],
  ['iliWid',   [/^widthin$/,/^width$/]],
  ['iliDepth', [/^depth$/,/^depthpercent$/]],
  ['tol',      [/^associatedtolerance/,/^tolerance/]],
  ['iliSurf',  [/^idodmidna$/,/^idodmid$/,/^idod$/]]
];
const CORR_FLD=[
  ['fieldId',   [/^correlatingfeatureid$/,/^fieldid$/,/^correlatingfeature$/]],
  ['fieldDist', [/^distfromrefft$/,/^distfromref$/]],
  ['fieldClock',[/^orientclock$/,/^orientationclock$/]],
  ['fieldLen',  [/^lengthin$/,/^length$/]],
  ['fieldWid',  [/^widthin$/,/^width$/]],
  /* mils only — never a bare /^depth$/, or a "Depth (%)" sitting to the left of
     "Depth (mils)" would be picked up as the depth and quietly be 5x wrong */
  ['fieldDepth',[/^depthmils$/]],
  ['fieldAwt',  [/^actwallthicknessmils$/,/^actualwallthickness/,/^actwallthickness/]],
  ['fieldSurf', [/^idodmid$/,/^idod$/]],
  ['notes',     [/^correlationnotes$/,/^notes$/]],
  ['decision',  [/^engineeringrepairdecision$/,/^engrepairdecision$/,/^engineeringdecision$/,/^repairdecision$/]]
];
const CORR_FIELDS=[...CORR_ILI,...CORR_FLD];
function corrHeaderMap(row){
  const N=(row||[]).map(c=>tnorm(c));
  let split=N.findIndex(t=>/^correlatingfeatureid$|^fieldid$|^correlatingfeature$/.test(t));
  if(split<0)split=N.length;
  const map={}, taken=new Set();
  const claim=(defs,lo,hi)=>defs.forEach(([key,pats])=>{
    if(map[key]!=null)return;
    for(let i=lo;i<hi;i++){
      if(!N[i]||taken.has(i))continue;
      if(pats.some(p=>p.test(N[i]))){ map[key]=i; taken.add(i); return; }
    }
  });
  claim(CORR_ILI,0,split);
  claim(CORR_FLD,split,N.length);
  return {map,split,score:Object.keys(map).length};
}
function parseCorrSheet(rows){
  let hi=-1,best=0,map=null;
  for(let i=0;i<Math.min(rows.length,40);i++){
    const h=corrHeaderMap(rows[i]);
    if(h.score>best&&h.map.iliId!=null){ best=h.score; hi=i; map=h.map; }
  }
  if(hi<0||best<6||map.iliId==null)
    throw new Error('no correlation header found — expected a row with “ILI Feat. ID”, “Log Distance (ft.)” and “Correlating Feature ID”');
  const at=(r,k)=>map[k]==null?null:r[map[k]];
  const out=[];
  for(let i=hi+1;i<rows.length;i++){
    const r=rows[i]; if(!r||!r.length)continue;
    const id=tstr(at(r,'iliId'));
    if(!id&&!isFinite(tnum(at(r,'logDist'))))continue;
    if(!id)continue;
    const row={};
    CORR_FIELDS.forEach(([k])=>{
      let v=at(r,k);
      if(k==='iliClock'||k==='fieldClock')row[k]=tallyClock(v);
      else row[k]=tstr(v);
    });
    if(!row.tool)row.tool=D.master.iliTool||'';
    ['iliSurf','fieldSurf'].forEach(k=>{
      const s=row[k]; if(!s)return;
      row[k]=/^ext/i.test(s)?'OD':(/^int/i.test(s)?'ID':s.toUpperCase());
    });
    out.push(row);
  }
  if(!out.length)throw new Error('correlation header found, but no rows with an ILI Feat. ID under it');
  return {rows:out, headerRow:hi+1, map};
}

/* --- Correlating Feature ID -> field measurements ----------------------------
   The field side of the correlation sheet is the Indication Table restated, so
   typing an indication's ID should fetch it rather than have it keyed twice.
   Blanks only: anything already entered on the correlation row was measured or
   overridden on purpose, and silently replacing it would be the worst kind of
   bug — invisible, and wrong on a deliverable. */
function corrPullField(i,force){
  const row=D.correlation[i]; if(!row)return 0;
  const ind=findIndication(row.fieldId); if(!ind)return 0;
  const nwtMils=Math.round(wallIn(D.master.nwt)*1000);
  const map={fieldDist:ind.dist, fieldClock:ind.clock, fieldLen:ind.len, fieldWid:ind.wid,
             fieldDepth:ind.depth, fieldAwt:ind.awt||(nwtMils||''), fieldSurf:ind.surf};
  let n=0;
  Object.entries(map).forEach(([k,v])=>{
    v=String(v??'').trim(); if(!v)return;
    if(!force&&String(row[k]??'').trim())return;
    if(row[k]!==v){ row[k]=v; n++; }
  });
  if(n)markDirty();
  return n;
}
/* re-pull every row: for after the Indication Table has been filled in, which
   is the usual order of work — correlate first, measure later */
function corrPullAll(force){
  let rows=0, cells=0, missing=[];
  D.correlation.forEach((r,i)=>{
    if(!String(r.fieldId||'').trim())return;
    if(!findIndication(r.fieldId)){ missing.push(r.fieldId); return; }
    const n=corrPullField(i,force); if(n){rows++; cells+=n;}
  });
  renderTable('corrtab'); refresh('corr');
  importNote('#corr-pull-note',
    cells?`Filled <b>${cells}</b> cell${cells!==1?'s':''} across <b>${rows}</b> row${rows!==1?'s':''} from the Indication Table.`
        :`Nothing to fill — every correlated row already has its field measurements.`
    +(missing.length?` · <b>${missing.length}</b> Feature ID${missing.length!==1?'s':''} not on the Indication Table: ${[...new Set(missing)].map(esc).join(', ')}`:''),
    missing.length>0);
  return {rows,cells,missing};
}

/* --- ILI tally -> correlation table ------------------------------------------
   The parsed tally is deliberately kept out of D: it is thousands of rows and
   D goes to localStorage on every edit. Only the window settings persist. */
let ILI_TALLY=null;

function iliWindow(){
  const a=num(D.iliImport.start), b=num(D.iliImport.end);
  return {a:isFinite(a)?a:null, b:isFinite(b)?b:null};
}
/* everything = ignore the Include setting, which is what the summary needs:
   girth welds are worth telling the user about even when they won't import */
function iliInWindow(everything){
  if(!ILI_TALLY)return [];
  const {a,b}=iliWindow(); if(a==null||b==null)return [];
  const lo=Math.min(a,b), hi=Math.max(a,b);
  const anomOnly=!everything&&D.iliImport.scope!=='All features';
  return ILI_TALLY.features.filter(f=>f.dist>=lo&&f.dist<=hi&&(!anomOnly||!f.ref));
}
function renderIliPanel(){
  const el=$('#ili-panel'); if(!el)return;
  const fn=$('#ili-file');
  if(!ILI_TALLY){
    el.innerHTML='';
    if(fn)fn.textContent=D.iliImport.file?`${esc(D.iliImport.file)} — reload the file to import again`:'no tally loaded';
    return;
  }
  const T=ILI_TALLY;
  if(fn)fn.textContent=`${T.file} · sheet “${T.sheet}” · ${fmt(T.features.length,0)} features · header row ${T.headerRow}`;
  /* controls are drawn once; only #ili-summary is redrawn as the window
     changes, so the field under the cursor keeps focus while you type */
  el.innerHTML=`
    <div class="fgrid" style="margin:4px 0 10px">
      <div class="fld"><label>Start log distance <span class="un">ft</span></label>
        <input type="number" step="any" data-p="iliImport.start" value="${esc(D.iliImport.start)}"></div>
      <div class="fld"><label>End log distance <span class="un">ft</span></label>
        <input type="number" step="any" data-p="iliImport.end" value="${esc(D.iliImport.end)}"></div>
      <div class="fld"><label>Include</label>
        <select data-p="iliImport.scope">${['Anomalies only','All features']
          .map(v=>`<option${D.iliImport.scope===v?' selected':''}>${v}</option>`).join('')}</select></div>
      <div class="fld"><label>&nbsp;</label>
        <button class="tb-btn" data-iliwin="dig" title="Centre the window on the ILI log distance from Master Data (M5)">Use dig ± 25 ft</button></div>
      <div class="fld"><label>&nbsp;</label>
        <button class="tb-btn" data-iliwin="all">Whole tally</button></div>
    </div>
    <div id="ili-summary"></div>`;
  renderIliSummary();
}
function renderIliSummary(){
  const el=$('#ili-summary'); if(!el||!ILI_TALLY)return;
  const T=ILI_TALLY, {a,b}=iliWindow();
  const set=a!=null&&b!=null;
  const win=iliInWindow();                       /* what will actually import */
  const all=iliInWindow(true);                   /* everything in the window  */
  const anom=all.filter(f=>!f.ref), refs=all.filter(f=>f.ref);
  const nAnom=T.features.filter(f=>!f.ref).length;
  const tally=l=>{const c={};l.forEach(f=>{const k=f.ident||'(blank)';c[k]=(c[k]||0)+1;});
    return Object.entries(c).sort((x,y)=>y[1]-x[1]).map(([k,v])=>`${v}× ${esc(k)}`).join(' · ')||'—';};
  const unmapped=[...new Set(anom.filter(f=>!f.code).map(f=>f.ident))].filter(Boolean);
  /* a window whose depths are all fractions is a % vs decimal mix-up, and it
     would silently import 22% as 0.22 — worth saying out loud */
  const dep=anom.map(f=>f.depth).filter(v=>isFinite(v));
  const fracDepth=dep.length>0&&Math.max(...dep)<=1&&Math.max(...dep)>0;
  el.innerHTML=`
    <div class="banner" style="margin:0 0 10px">
      Tally covers <b>${fmt(T.extent[0],2)}</b> to <b>${fmt(T.extent[1],2)}</b> ft
      (${fmt((T.extent[1]-T.extent[0])/5280,2)} mi) · ${fmt(nAnom,0)} anomalies,
      ${fmt(T.features.length-nAnom,0)} reference features.
      ${set?`<br>Window <b>${fmt(Math.min(a,b),2)}</b>–<b>${fmt(Math.max(a,b),2)}</b> ft
        (${fmt(Math.abs(b-a),2)} ft) holds <b>${anom.length}</b> anomal${anom.length===1?'y':'ies'}: ${tally(anom)}.
        ${refs.length?`<br>Reference features in window: ${tally(refs)} — ${D.iliImport.scope==='All features'?'these <b>will</b> import too':'<b>not</b> imported, switch Include to “All features” to bring them in'}.`
          :'<br>No girth welds or other reference features in the window.'}`
        :'<br><b>Set a start and end log distance to see what would import.</b>'}
    </div>
    ${set&&unmapped.length?`<div class="banner crit" style="margin:0 0 10px">${unmapped.length} feature type${unmapped.length!==1?'s':''} in the window
      did not match an indication code and will import with a blank <b>Defect type</b>: ${unmapped.map(esc).join(', ')} — set it by hand after importing.</div>`:''}
    ${set&&fracDepth?`<div class="banner crit" style="margin:0 0 10px">Every depth in this window is ≤ 1 (max ${Math.max(...dep)}).
      This tally may report depth as a decimal fraction rather than a percent — 0.22 meaning 22%. Values import exactly as written, so check the
      <b>ILI depth (%)</b> column afterwards.</div>`:''}
    <div class="noprint" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <button class="tb-btn pri" data-iliimp="append"${set&&win.length?'':' disabled'}>⇩ Append ${set&&win.length?win.length+' ':''}to correlation table</button>
      <button class="tb-btn" data-iliimp="replace"${set&&win.length?'':' disabled'}>⇩ Replace table with ${set&&win.length?win.length:''}</button>
    </div>`;
}
async function iliLoadFile(file){
  const note=m=>importNote('#ili-import-note',m,true);
  try{
    importNote('#ili-import-note',`Reading <b>${esc(file.name)}</b>…`);
    let sheets=[];
    if(/\.(csv|txt|tsv)$/i.test(file.name)){
      sheets=[{name:'(csv)',rows:parseCSV(await file.text())}];
    }else{
      const wb=await readXlsx(await file.arrayBuffer());
      for(const s of wb.sheets) sheets.push({name:s.name, rows:await wb.read(s.path)});
    }
    /* Two very different workbooks arrive here. A GridOverlay export carries a
       "Corr. Table" — both sides already correlated, already scoped to the dig,
       so it imports whole. A vendor pipe tally is the whole line and needs the
       window. Tell them apart by what the sheets actually contain. */
    for(const s of sheets){
      let C=null; try{ C=parseCorrSheet(s.rows); }catch(e){ continue; }
      ILI_TALLY=null; renderIliPanel();
      return corrSheetImport(C,file.name,s.name);
    }
    let rows=null, sheet='', last=null;
    const order=[...sheets].sort((x,y)=>
      (/tally|anomal|feature|ili|pipe|listing/i.test(y.name)?1:0)-(/tally|anomal|feature|ili|pipe|listing/i.test(x.name)?1:0));
    for(const s of order){
      try{ parseTally(s.rows); rows=s.rows; sheet=s.name; break; }catch(e){ last=e; }
    }
    if(!rows)throw last||new Error('no sheet in that file looked like a pipe tally or a correlation table');
    const T=parseTally(rows);
    T.file=file.name; T.sheet=sheet;
    ILI_TALLY=T;
    D.iliImport.file=file.name; D.iliImport.sheet=sheet;
    if(!String(D.iliImport.start).trim()&&!String(D.iliImport.end).trim()){
      const d=num(D.master.iliLogDist);
      if(isFinite(d)){ D.iliImport.start=String(d-25); D.iliImport.end=String(d+25); }
    }
    markDirty(); renderIliPanel();
    importNote('#ili-import-note',
      `Read <b>${esc(file.name)}</b> — pipe tally on sheet “${esc(sheet)}”, header on row ${T.headerRow}, `
      +`<b>${fmt(T.features.length,0)}</b> features across ${fmt((T.extent[1]-T.extent[0])/5280,2)} miles. `
      +`Matched columns: ${Object.keys(T.map).map(esc).join(', ')}. Set the window, then import.`);
  }catch(err){
    ILI_TALLY=null; renderIliPanel();
    note('Could not read that file: '+esc(err.message));
  }
}
/* A correlation sheet is already the dig's own scope — no window applies. */
function corrSheetImport(C,fileName,sheetName){
  const rows=C.rows;
  /* the sheet carries Log Distance and Dist. From Ref on every row, so the log
     distance at the reference point falls straight out of the difference — and
     that one number is what ties field ref-ft to the vendor's odometer */
  const refs=rows.map(r=>num(r.logDist)-num(r.iliDist)).filter(isFinite);
  let derived='';
  if(refs.length){
    const mn=Math.min(...refs), mx=Math.max(...refs);
    if(mx-mn<1){
      const rl=((mn+mx)/2).toFixed(2);
      if(!String(D.master.refLogDist||'').trim()){
        D.master.refLogDist=rl; syncFields('master.refLogDist');
        derived=` Ref log distance ${fmt(rl,2)} ft was derived from the sheet and set on Master M5 — that is what the Log Dist. column on the Indication Table needs.`;
      }else if(Math.abs(num(D.master.refLogDist)-num(rl))>1){
        derived=` <b>Note:</b> this sheet implies a ref log distance of ${fmt(rl,2)} ft, but Master M5 says ${fmt(D.master.refLogDist,2)} ft — one of them is wrong.`;
      }
    }
  }
  const mode=D.correlation.length
    ? (confirm(`Replace the ${D.correlation.length} existing correlation row(s) with ${rows.length} from this sheet?\n\nOK = replace · Cancel = append`)?'replace':'append')
    : 'replace';
  D.correlation = mode==='replace'?rows:D.correlation.concat(rows);
  /* the sheet's field side may already be filled; anything blank we can still
     fetch off the Indication Table */
  let pulled=0;
  D.correlation.forEach((r,i)=>{ pulled+=corrPullField(i)?1:0; });
  D.iliImport.file=fileName; D.iliImport.sheet=sheetName;
  markDirty(); renderTable('corrtab'); refresh('corr');
  const withField=rows.filter(r=>String(r.fieldId||'').trim()).length;
  importNote('#ili-import-note',
    `Read <b>${esc(fileName)}</b> — correlation sheet “${esc(sheetName)}”, header on row ${C.headerRow}. `
    +`${mode==='replace'?'Replaced the table with':'Appended'} <b>${rows.length}</b> row${rows.length!==1?'s':''}, `
    +`<b>${withField}</b> already carrying a Correlating Feature ID.`
    +(pulled?` ${pulled} row${pulled!==1?'s':''} had blanks filled from the Indication Table.`:'')
    +derived
    +` Matched ${Object.keys(C.map).length} columns.`, /note/i.test(derived));
}
function iliImport(mode){
  const win=iliInWindow();
  if(!win.length){ importNote('#ili-import-note','Nothing in that window to import.',true); return; }
  const rows=win.map(tallyToCorr);
  if(mode==='replace'){
    if(D.correlation.length&&!confirm(`Replace the ${D.correlation.length} existing correlation row(s) with ${rows.length} imported feature(s)?`))return;
    D.correlation=rows;
  }else D.correlation=D.correlation.concat(rows);
  const {a,b}=iliWindow();
  const blank=rows.filter(r=>!r.defect).length;
  markDirty(); renderTable('corrtab'); refresh('corr');
  importNote('#ili-import-note',
    `${mode==='replace'?'Replaced the correlation table with':'Appended'} <b>${rows.length}</b> feature${rows.length!==1?'s':''} `
    +`from ${fmt(Math.min(a,b),2)}–${fmt(Math.max(a,b),2)} ft. ILI side filled in; field columns left blank for you to correlate.`
    +(blank?` · <b>${blank}</b> row${blank!==1?'s':''} need a Defect type set by hand.`:''), blank>0);
}

/* --- Creaform CSV -> indication table --------------------------------------- */
async function creaformImport(files,mode){
  let all=[], skipped=0, delims=new Set();
  for(const f of files){
    const txt=await f.text();
    const r=parseCreaformCSV(txt);
    all=all.concat(r.rows); skipped+=r.skipped.length; if(r.delim)delims.add(r.delim);
  }
  if(!all.length){
    importNote('#ind-import-note','No data rows found. The macro only takes lines with at least 9 columns whose first column is a number — that is what skips the header. Check the file really is a Creaform/Pipecheck export.',true);
    return;
  }
  if(mode==='replace'){
    if(D.indications.length&&!confirm(`Replace the ${D.indications.length} existing indication(s) with ${all.length} imported row(s)?`))return;
    D.indications=all;
  }else{
    D.indications=D.indications.concat(all);
  }
  markDirty(); renderTable('ind'); refresh('ind');
  const dl={';':'semicolon',',':'comma','\t':'tab'};
  const unknown=[...new Set(all.map(r=>r.type).filter(t=>t&&!IND_TYPES.some(x=>x[0]===t)))];
  importNote('#ind-import-note',
    `Imported <b>${all.length}</b> indication${all.length!==1?'s':''} from ${files.length} file${files.length!==1?'s':''}`
    +` · delimiter: ${[...delims].map(d=>dl[d]||d).join(', ')||'—'}`
    +` · ${skipped} non-data line${skipped!==1?'s':''} skipped (headers/blanks)`
    +(unknown.length?` · <b>unrecognised type${unknown.length!==1?'s':''}: ${unknown.map(esc).join(', ')}</b> — not in the indication type list, so the map and TCAT export will ignore them`:'')
    +`.`, unknown.length>0);
}

/* ---- per-row photo drop ----------------------------------------------------
   Each photo cell is its own drop target, so a shot can be dragged straight
   onto the row it belongs to. Dropping several at once fills that row and the
   ones below it, adding rows if it runs off the end — which is what you want
   when a folder of photos is selected in order. */
async function dropPhotosAt(path,files){
  const m=path.match(/^photoLog\[(\d+)\]\.img$/);
  if(!m){ setPath(D,path,await ingestPhoto(files[0])); markDirty(); renderTable('photo'); renderPhotoWeight(); return 1; }
  let i=+m[1];
  for(const f of files){
    while(D.photoLog.length<=i)D.photoLog.push({no:String(D.photoLog.length+1),comments:'',img:''});
    D.photoLog[i].img=await ingestPhoto(f);
    i++;

  markDirty(); renderTable('photo'); renderPhotoWeight();
  return files.length;
}

/* ============================================================
   ROW REORDER
   Drag the grip (or the thumbnail) to MOVE a row: dropping photo 2 at 14 shifts
   3-14 up one and leaves the sequence intact, which is what ordering a log
   means. Shift+drop instead SWAPS the two rows outright, for when an exchange
   really is the intent. Only tables registered with {reorder:true} get this.
   ============================================================ */
let DRAG_ROW=null;
const ROW_MIME='application/x-de-row';
/* An internal row drag carries ROW_MIME; a photo dragged in from the desktop
   carries 'Files'. Both land on the same elements, so every handler has to say
   which kind it wants or the two fight over the drop. */
const isFileDrag=dt=>!!dt&&[...(dt.types||[])].includes('Files');

function tableArr(id){ const t=TABLES[id]; return t?(getPath(D,t.arrPath)||[]):[]; }

/* Photo numbers are only rewritten when they were a plain 1..N sequence to
   begin with — i.e. when they are positional. If they came off a PowerPoint
   deck or were typed to match a field log, they mean something, and silently
   renumbering them would break the link to the original record. */
const isSequential=arr=>arr.length>0&&arr.every((r,i)=>String(r.no??'').trim()===String(i+1));
function renumberIfPositional(arr,was){ if(was)arr.forEach((r,i)=>r.no=String(i+1)); }

function moveRow(id,from,insertAt){
  const arr=tableArr(id);
  if(from<0||from>=arr.length)return false;
  if(insertAt===from||insertAt===from+1)return false;      /* dropped where it already is */
  const was=id==='photo'&&isSequential(arr);
  const [row]=arr.splice(from,1);
  /* removing the row shifts everything after it down one */
  arr.splice(insertAt>from?insertAt-1:insertAt,0,row);
  renumberIfPositional(arr,was);
  return true;
}
function swapRows(id,a,b){
  const arr=tableArr(id);
  if(a===b||a<0||b<0||a>=arr.length||b>=arr.length)return false;
  const was=id==='photo'&&isSequential(arr);
  [arr[a],arr[b]]=[arr[b],arr[a]];
  renumberIfPositional(arr,was);
  return true;
}
function clearDropMarks(){ $$('.drop-above,.drop-below').forEach(el=>el.classList.remove('drop-above','drop-below')); }

document.addEventListener('dragstart',e=>{
  const h=e.target.closest('[data-rowdrag]'); if(!h)return;
  const [id,i]=h.dataset.rowdrag.split(',');
  DRAG_ROW={id,i:+i};
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData(ROW_MIME,String(i));
  e.dataTransfer.setData('text/plain','');   /* Firefox needs *something* set */
  const tr=h.closest('tr'); if(tr)tr.classList.add('dragging');
});
document.addEventListener('dragend',()=>{
  DRAG_ROW=null; clearDropMarks();
  $$('tr.dragging').forEach(el=>el.classList.remove('dragging'));
});
document.addEventListener('dragover',e=>{
  const tr=e.target.closest('[data-rowdrop]'); if(!tr)return;
  if(isFileDrag(e.dataTransfer))return;                     /* that is a photo drop */
  if(!DRAG_ROW||DRAG_ROW.id!==tr.dataset.rowdrop.split(',')[0])return;
  e.preventDefault();
  e.dataTransfer.dropEffect=e.shiftKey?'link':'move';
  clearDropMarks();
  if(e.shiftKey){ tr.classList.add('drop-above','drop-below'); return; }  /* swap: mark whole row */
  const r=tr.getBoundingClientRect();
  tr.classList.add((e.clientY-r.top)>r.height/2?'drop-below':'drop-above');
});
document.addEventListener('drop',e=>{
  const tr=e.target.closest('[data-rowdrop]'); if(!tr)return;
  if(isFileDrag(e.dataTransfer))return;
  const [id,toS]=tr.dataset.rowdrop.split(',');
  const raw=e.dataTransfer.getData(ROW_MIME);
  const from=raw!==''?+raw:(DRAG_ROW?DRAG_ROW.i:-1);
  if(from<0||!DRAG_ROW||DRAG_ROW.id!==id)return;
  e.preventDefault(); e.stopPropagation();
  clearDropMarks();
  const to=+toS;
  let changed;
  if(e.shiftKey){ changed=swapRows(id,from,to); }
  else{
    const r=tr.getBoundingClientRect();
    changed=moveRow(id,from,(e.clientY-r.top)>r.height/2?to+1:to);
  }
  DRAG_ROW=null;
  if(!changed)return;
  markDirty(); renderTable(id);
  if(id==='photo'){ renderPhotoWeight(); refresh('h9'); }
  const n=$('#tn-'+id);
  if(n)n.textContent=e.shiftKey?`Swapped rows ${from+1} and ${to+1}`:`Moved row ${from+1} \u2192 ${to+1}`;
},true);

  }
  if(e.target.id==='photo-unfold-all'){ PHASE_FOLD.clear(); renderTable('photo'); return; }

  /* a group header folds its own rows — view only, nothing is saved */
  const fold=e.target.closest('[data-groupfold]');
  if(fold){
    const g=fold.dataset.groupfold;
    PHASE_FOLD.has(g)?PHASE_FOLD.delete(g):PHASE_FOLD.add(g);
    renderTable('photo'); return;
  }

  /* ---- phase editor ---- */
  if(e.target.id==='ph-edit'){
    const ed=$('#phase-editor'); if(!ed)return;
    ed.hidden=!ed.hidden;
    e.target.classList.toggle('pri',!ed.hidden);
    if(!ed.hidden)renderPhaseEditor();
    return;
  }
  if(e.target.id==='ph-add'){
    let n=1, name;
    do{ name='New phase'+(n>1?' '+n:''); n++; }while(PHASES.some(p=>p.name===name));
    PHASES.push({key:'u'+Date.now().toString(36),name,req:0});
    phasesChanged(); return;
  }
  if(e.target.id==='ph-reset'){
    if(!confirm('Restore the standard nine phases?\n\nPhases already assigned to photos are kept on those rows.'))return;
    PHASES=JSON.parse(JSON.stringify(PHASE_DEFAULTS));
    phasesChanged(); return;
  }
  const mv=e.target.closest('[data-phmove]');
  if(mv){
    const [i,d]=mv.dataset.phmove.split(',').map(Number);
    const j=i+d; if(j<0||j>=PHASES.length)return;
    [PHASES[i],PHASES[j]]=[PHASES[j],PHASES[i]];
    phasesChanged(); return;
  }
  const del=e.target.closest('[data-phdel]');
  if(del){
    const i=+del.dataset.phdel, p=PHASES[i];
    const used=(D.photoLog||[]).filter(r=>r.phase===p.name).length;
    if(!confirm(`Remove the “${p.name}” phase?`+(used?`\n\n${used} photo${used!==1?'s are':' is'} filed under it. They keep the label, but it will show as unrecognised until you re-file or re-add it.`:'')))return;
    PHASES.splice(i,1);
    phasesChanged(); return;
  }
});
document.addEventListener('input',e=>{
  const nm=e.target.closest('[data-phname]');
  if(nm){ nm.dataset.pending=nm.value; return; }   /* commit on blur, not per keystroke */
});
document.addEventListener('change',e=>{
  const nm=e.target.closest('[data-phname]');
  if(nm){ if(renamePhase(+nm.dataset.phname,nm.value))phasesChanged(); else renderPhaseEditor(); return; }
  const rq=e.target.closest('[data-phreq]');
  if(rq){ PHASES[+rq.dataset.phreq].req=rq.checked?1:0; saveLibrary(); phaseCounts(); refresh('h9'); return; }
});

/* ---- boot ---- */
loadLibrary();          /* roster / contacts / zones / operators from last session */
buildNav();
buildPages();
renderAllTables();
refresh();
nav('dash');
updateSaveBadge();
checkAutosave();        /* offer to restore unsaved work from a crash or close */
</script>
<input type="file" id="photo-cell-in" accept="image/*" hidden>
<input type="file" id="photo-bulk-in" accept="image/*" multiple hidden>
<input type="file" id="photo-folder-in" webkitdirectory directory multiple hidden>
<input type="file" id="ppt-in" accept=".pptx,.pptm,application/vnd.openxmlformats-officedocument.presentationml.presentation" hidden>
<input type="file" id="creaform-in" accept=".csv,text/csv" multiple hidden>
<input type="file" id="ili-in" accept=".xlsx,.xlsm,.csv,.txt,.tsv" hidden>
</body>
