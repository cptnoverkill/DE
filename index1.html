/* ---------- grid map (matches Indication Overview / Coating Damage Map) ---------- */
/* ---------- callout placement (indication map + coating damage map) ----------
   The old port of placeHeatmapLabel placed one label at a time: first clear
   anchor wins, then nudge straight up until something fits. With a Creaform run
   — 25-odd CECs inside a few feet — that walks the callouts into tall towers and
   braids the leaders together, because a label never knows what the next one is
   about to do and nothing ever scores a crossing.
   This lays the whole set out at once instead: ring-search seed, then simulated
   annealing on an energy of leader length + label/label overlap + label/box
   overlap + leader crossings + leaders cutting through other labels. The swap
   move is what unbraids a fan of leaders — two labels trade slots when that
   uncrosses their leaders. Seeded PRNG, so the same data always lays out the
   same way on screen and in print. */
const LBL_H=10, LBL_FS=7.5;
const R2=v=>Math.round(v*100)/100;
const lblW=t=>String(t).length*4.6+6;
const rOver=(a,b)=>{const w=Math.min(a.x+a.w,b.x+b.w)-Math.max(a.x,b.x),
                    h=Math.min(a.y+a.h,b.y+b.h)-Math.max(a.y,b.y);
                    return w>0&&h>0?w*h:0;};
function segsCross(a,b,c,d){
  const o=(p,q,r)=>Math.sign((q.x-p.x)*(r.y-p.y)-(q.y-p.y)*(r.x-p.x));
  return o(a,b,c)!==o(a,b,d)&&o(c,d,a)!==o(c,d,b);
}
function segHitsRect(p,q,r){
  if(p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h)return true;
  const c=[{x:r.x,y:r.y},{x:r.x+r.w,y:r.y},{x:r.x+r.w,y:r.y+r.h},{x:r.x,y:r.y+r.h}];
  for(let i=0;i<4;i++) if(segsCross(p,q,c[i],c[(i+1)%4]))return true;
  return false;
}
/* leader lands on the point of the box nearest the label, not a fixed corner */
const boxAnchor=(bx,L)=>{const cx=L.x+L.w/2,cy=L.y+L.h/2;
  return {x:Math.max(bx.x,Math.min(bx.x+bx.w,cx)),
          y:Math.max(bx.y,Math.min(bx.y+bx.h,cy))};};
/* and stops at the label's edge rather than running under it */
function labelEdge(L,px,py){
  const cx=L.x+L.w/2,cy=L.y+L.h/2,dx=px-cx,dy=py-cy;
  if(!dx&&!dy)return{x:cx,y:cy};
  const t=Math.min(dx?(L.w/2)/Math.abs(dx):1e9, dy?(L.h/2)/Math.abs(dy):1e9);
  return {x:cx+dx*t,y:cy+dy*t};
}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

/* The anneal is ~100ms on a 26-CEC run and the map re-renders on every edit,
   so cache on the geometry that actually feeds it — typing in an unrelated
   field then costs nothing. */
const _lblCache=new Map();
function layoutMapLabels(nodes,obstacles,bnd){
  const n=nodes.length; if(!n)return [];
  const key=JSON.stringify([nodes.map(nd=>[nd.text,R2(nd.box.x),R2(nd.box.y),R2(nd.box.w),R2(nd.box.h)]),
                            obstacles.map(o=>[R2(o.x),R2(o.y),R2(o.w),R2(o.h)]),
                            [R2(bnd.x),R2(bnd.y),R2(bnd.w),R2(bnd.h)]]);
  const hit=_lblCache.get(key);
  if(hit) return hit.map(l=>({...l}));
  const L=nodes.map(nd=>({x:0,y:0,w:lblW(nd.text),h:LBL_H}));
  const clamp=l=>{ l.x=Math.max(bnd.x,Math.min(bnd.x+bnd.w-l.w,l.x));
                   l.y=Math.max(bnd.y,Math.min(bnd.y+bnd.h-l.h,l.y)); };
  let seed=n*2654435761;
  nodes.forEach(nd=>{seed=(seed^Math.round(nd.box.x*7+nd.box.y*13+nd.box.w*3))*16777619|0;});
  const rnd=mulberry32(seed||1);

  /* seed: ring outward from each box, first slot that clears everything placed so far */
  const done=[];
  nodes.map((nd,i)=>i).sort((a,b)=>nodes[a].box.x-nodes[b].box.x).forEach(i=>{
    const b=nodes[i].box, l=L[i], cx=b.x+b.w/2, cy=b.y+b.h/2;
    let best=null;
    for(let r=Math.max(b.h,LBL_H)/2+8; r<=Math.max(bnd.h,bnd.w)&&!best; r+=LBL_H+2){
      for(let k=0;k<28;k++){
        const th=-Math.PI/2+(k%2?1:-1)*Math.ceil(k/2)*(Math.PI*2/28);
        const cand={x:cx+Math.cos(th)*(r+l.w/2)*0.85-l.w/2, y:cy+Math.sin(th)*r-l.h/2, w:l.w, h:l.h};
        clamp(cand);
        let ov=0;
        for(const o of obstacles){ ov+=rOver(cand,o); if(ov)break; }
        if(!ov) for(const j of done){ ov+=rOver(cand,L[j]); if(ov)break; }
        if(!ov){ best=cand; break; }
      }
    }
    if(!best){ best={x:cx-l.w/2,y:cy-l.h-6,w:l.w,h:l.h}; clamp(best); }
    l.x=best.x; l.y=best.y; done.push(i);
  });

  /* polish */
  const W_LEN=0.55, W_LAB=7, W_OBS=5, W_CROSS=110, W_HIT=55;
  const anc=i=>boxAnchor(nodes[i].box,L[i]);
  const energy=i=>{
    const l=L[i], a=anc(i), ci={x:l.x+l.w/2,y:l.y+l.h/2};
    let e=Math.hypot(ci.x-a.x,ci.y-a.y)*W_LEN;
    for(const o of obstacles) e+=rOver(l,o)*W_OBS;
    for(let j=0;j<n;j++){
      if(j===i)continue;
      const lj=L[j];
      e+=rOver(l,lj)*W_LAB;
      const aj=anc(j), cj={x:lj.x+lj.w/2,y:lj.y+lj.h/2};
      if(segsCross(ci,a,cj,aj)) e+=W_CROSS;
      if(segHitsRect(ci,a,lj)) e+=W_HIT;
      if(segHitsRect(cj,aj,l)) e+=W_HIT;
    }
    return e;
  };
  const sweeps=Math.max(35,Math.min(110,Math.round(2600/n)));
  let T=Math.max(18,LBL_H*3.5);
  for(let sw=0;sw<sweeps;sw++){
    T*=0.94;
    for(let k=0;k<n;k++){
      const i=(rnd()*n)|0;
      if(rnd()<0.28&&n>1){                       /* swap two slots — unbraids leaders */
        const j=(rnd()*n)|0; if(j===i)continue;
        const e0=energy(i)+energy(j);
        const pi={x:L[i].x,y:L[i].y}, pj={x:L[j].x,y:L[j].y};
        L[i].x=pj.x+(L[j].w-L[i].w)/2; L[i].y=pj.y;
        L[j].x=pi.x+(L[i].w-L[j].w)/2; L[j].y=pi.y;
        clamp(L[i]); clamp(L[j]);
        const e1=energy(i)+energy(j);
        if(!(e1<e0||rnd()<Math.exp((e0-e1)/T))){ L[i].x=pi.x;L[i].y=pi.y;L[j].x=pj.x;L[j].y=pj.y; }
      }else{                                     /* jiggle */
        const e0=energy(i), p={x:L[i].x,y:L[i].y};
        L[i].x+=(rnd()*2-1)*T; L[i].y+=(rnd()*2-1)*T*0.85; clamp(L[i]);
        const e1=energy(i);
        if(!(e1<e0||rnd()<Math.exp((e0-e1)/T))){ L[i].x=p.x;L[i].y=p.y; }
      }
    }
  }
  if(_lblCache.size>24) _lblCache.delete(_lblCache.keys().next().value);
  _lblCache.set(key,L.map(l=>({...l})));
  return L;
}
function gridMapSVG(kind){
  const m=D.master;
  const rows=kind==='coat'?D.coatDamage:D.indications;
  const colors=kind==='coat'?RMAP_COAT:RMAP_IND;
  const gw=[...new Set(D.sections.flatMap(s2=>[num(s2.start),num(s2.end)]).filter(isFinite))].sort((a,b)=>a-b);
  const xsAll=[...rows.map(r=>num(r.dist)),...gw,num(m.assessStart)||0,num(m.assessEnd)].filter(isFinite);
  let x0=Math.min(0,...xsAll), x1=Math.max(10,...xsAll);
  x1=Math.ceil(x1); x0=Math.floor(x0);
  const circ=siteCirc()||num(m.diameter)*Math.PI||33.8;
  const W=920,LW=40,RW=40,TH=16,BH=16,GLB=56;
  const GH=24*15, H=TH+GH+BH+GLB;
  const X=v=>LW+((v-x0)/((x1-x0)||1))*(W-LW-RW);
  const Yc=c=>TH+((((c%12)+12)%12)/12)*GH;
  let s=svgOpen(W,H);
  s+=`<rect x="${LW}" y="${TH}" width="${W-LW-RW}" height="${GH}" fill="#fff" stroke="#000" stroke-width="1.4"/>`;
  const ftStep=(x1-x0)>20?Math.ceil((x1-x0)/10):1;
  for(let f=x0;f<=x1;f+=ftStep){
    s+=`<text x="${X(f)+2}" y="${TH-4}" font-size="8.5" font-weight="bold">${f.toFixed(2)}'</text>`;
    s+=`<text x="${X(f)+2}" y="${TH+GH+11}" font-size="8.5" font-weight="bold">${f.toFixed(2)}'</text>`;
    if(f>x0)s+=`<line x1="${X(f)}" y1="${TH}" x2="${X(f)}" y2="${TH+GH}" stroke="#eee"/>`;
  }
  s+=`<text x="${LW-4}" y="${TH-4}" font-size="8.5" font-weight="bold" text-anchor="end">Feet</text>`;
  s+=`<text x="${LW-4}" y="${TH+GH+11}" font-size="8.5" font-weight="bold" text-anchor="end">Feet</text>`;
  for(let i=0;i<24;i++){
    const c=i/2, y=Yc(c);
    const lab=clockLabel(c===0?12:c);
    s+=`<line x1="${LW}" y1="${y}" x2="${W-RW}" y2="${y}" stroke="#bbb" stroke-dasharray="3 3" stroke-width="${i%2?0.4:0.7}"/>`;
    s+=`<text x="${LW-4}" y="${y+9}" font-size="8" text-anchor="end">${lab}</text>`;
    s+=`<text x="${W-RW+4}" y="${y+9}" font-size="8">${lab}</text>`;
  }
  gw.forEach(g=>{
    s+=`<line x1="${X(g)}" y1="${TH}" x2="${X(g)}" y2="${TH+GH}" stroke="#2e74b5" stroke-width="1.3" stroke-dasharray="6 4"/>`;
    s+=`<text transform="translate(${X(g)+3},${TH+GH+BH+GLB-6}) rotate(-90)" font-size="8.5" fill="#c00000">GW @ ${g.toFixed(2)}'</text>`;
  });
  const occ=[];
  D.sections.forEach(sec=>{
    const c=clockToNum(sec.seamLoc),a=num(sec.start),b=num(sec.end);
    if(isFinite(c)&&isFinite(a)&&isFinite(b)){
      s+=`<line x1="${X(a)}" y1="${Yc(c)}" x2="${X(b)}" y2="${Yc(c)}" stroke="#2e74b5" stroke-width="1.1" stroke-dasharray="2 3"/>`;
      s+=`<text x="${X(a)+3}" y="${Yc(c)-2}" font-size="6.5" fill="#2e74b5">Seam @ ${rEsc(sec.seamLoc)}</text>`;
      occ.push({x:X(a),y:Yc(c)-9,w:60,h:10});
    }
  });
  /* pass 1: geometry with wrap-splitting + clamping; seed occupancy with every box part */
  const items=[];
  rows.forEach((r,i)=>{
    const x=num(r.dist); if(!isFinite(x))return;
    const t=r.type||''; const [fill,stroke]=colors[t]||['#ccc','#666'];
    const lenFt=Math.max((num(r.len)||1)/12,0.04*(x1-x0)/10);
    const circExt=kind==='coat'?num(r.circ):num(r.wid);
    const hClk=isFinite(circExt)&&circExt>0?Math.max(circExt/circ*12,0.35):0.5;
    const c=clockToNum(r.clock); const cy=isFinite(c)?Yc(c):Yc(6);
    let rx=Math.max(X(x),LW+1);
    let rw=Math.max(X(x+lenFt)-rx,4);
    if(rx+rw>W-RW-1)rw=Math.max(W-RW-1-rx,4);
    const rh=Math.min(Math.max(hClk/12*GH,6),GH);
    const id=(kind==='coat'?(t+'-'+String(r.no||i+1).padStart(3,'0')):(t+'-'+String(r.id||i+1).padStart(3,'0')));
    /* wrap across 12:00 / 11:30 boundary: split into up to 2 parts */
    let yTop=cy-rh/2, parts=[];
    if(yTop<TH){ /* extends above 12:00 → wraps to bottom of map */
      const over=TH-yTop;
      parts.push({y:TH,h:rh-over});
      parts.push({y:TH+GH-over,h:over,wrapped:true});
    } else if(yTop+rh>TH+GH){ /* extends past 11:30 → wraps to top */
      const over=(yTop+rh)-(TH+GH);
      parts.push({y:yTop,h:rh-over});
      parts.push({y:TH,h:over,wrapped:true});
    } else parts.push({y:yTop,h:rh});
    parts.forEach(p=>occ.push({x:rx,y:p.y,w:rw,h:p.h}));
    items.push({rx,rw,parts,fill,stroke,id,x,clock:r.clock});
  });
  /* pass 2: draw boxes */
  items.forEach(it=>{
    it.parts.forEach(p=>{
      s+=`<rect x="${it.rx}" y="${p.y}" width="${it.rw}" height="${p.h}" fill="${it.fill}" fill-opacity=".9" stroke="${it.stroke}" stroke-width="1"${p.wrapped?' stroke-dasharray="3 2"':''}><title>${rEsc(it.id)} · ${it.x} ft · ${rEsc(it.clock||'')}</title></rect>`;
    });
  });
  /* pass 3: callouts — the whole set placed together, leaders drawn box-edge to
     label-edge so the line never runs underneath its own box */
  const R1=v=>Math.round(v*10)/10;
  const nodes=items.map(it=>({box:{x:it.rx,y:it.parts[0].y,w:it.rw,h:it.parts[0].h},text:it.id}));
  const labs=layoutMapLabels(nodes,occ,{x:LW+2,y:TH+1,w:W-LW-RW-4,h:GH-2});
  labs.forEach((l,i)=>{
    const a=boxAnchor(nodes[i].box,l), e=labelEdge(l,a.x,a.y);
    if(Math.hypot(e.x-a.x,e.y-a.y)>2){
      s+=`<line x1="${R1(e.x)}" y1="${R1(e.y)}" x2="${R1(a.x)}" y2="${R1(a.y)}" stroke="#666" stroke-width=".5"/>`;
      s+=`<circle cx="${R1(a.x)}" cy="${R1(a.y)}" r="1.1" fill="#666"/>`;
    }
    s+=`<rect x="${R1(l.x)}" y="${R1(l.y)}" width="${R1(l.w)}" height="${R1(l.h)}" rx="1.5" fill="#fff" fill-opacity=".95" stroke="#999" stroke-width=".5"/>`;
    s+=`<text x="${R1(l.x+l.w/2)}" y="${R1(l.y+7.4)}" font-size="${LBL_FS}" text-anchor="middle">${rEsc(items[i].id)}</text>`;
  });
  s+='</svg>';
  return s;
}

/* Excavation end treatment. Drawn just outside the soil block at each end, so
   it reads as what the bell hole is cut against rather than as pipe. */
function pitEnd(kind,x,yT,yB,right){
  const k=String(kind||'').trim();
  if(!k||k==='None'||k==='Open / continues')return '';
  const h=yB-yT, d=right?1:-1, lab=(t)=>`<text x="${x+d*9}" y="${yT-4}" font-size="7.5" text-anchor="${right?'start':'end'}" fill="#5b3a29">${t}</text>`;
  if(k==='Vault wall')
    return `<rect x="${right?x:x-16}" y="${yT}" width="16" height="${h}" fill="#b8b8b8" stroke="#666" stroke-width="1.2"/>`
      +`<line x1="${right?x+8:x-8}" y1="${yT}" x2="${right?x+8:x-8}" y2="${yB}" stroke="#8a8a8a" stroke-width=".6"/>`+lab('VAULT WALL');
  if(k==='Sheet piling'){
    let o='';
    for(let y=yT;y<yB;y+=9)o+=`<path d="M${right?x:x-10},${y} l${d*10},2 l0,5 l${-d*10},2" fill="none" stroke="#7a7a86" stroke-width="1.2"/>`;
    return o+lab('SHEET PILING');
  }
  if(k==='Shoring / trench box')
    return `<rect x="${right?x:x-12}" y="${yT}" width="12" height="${h}" fill="#e8c47a" stroke="#8a6b3f" stroke-width="1.2"/>`
      +`<line x1="${right?x:x-12}" y1="${yT+h/3}" x2="${right?x+12:x}" y2="${yT+h/3}" stroke="#8a6b3f" stroke-width="1"/>`
      +`<line x1="${right?x:x-12}" y1="${yT+2*h/3}" x2="${right?x+12:x}" y2="${yT+2*h/3}" stroke="#8a6b3f" stroke-width="1"/>`+lab('SHORING');
  if(k==='Casing end')
    return `<rect x="${right?x:x-14}" y="${yT+h*0.34}" width="14" height="${h*0.4}" fill="#9aa" stroke="#556" stroke-width="1.2"/>`+lab('CASING');
  if(k==='Sloped dirt')
    return `<path d="M${x},${yB} L${x+d*34},${yT} L${x+d*34},${yB} Z" fill="#c9b98f" stroke="#8a6b3f" stroke-width="1"/>`+lab('SLOPED');
  /* Dirt wall */
  return `<rect x="${right?x:x-14}" y="${yT}" width="14" height="${h}" fill="#a8905f" stroke="#8a6b3f" stroke-width="1.2"/>`
    +`<path d="M${right?x:x-14},${yT+h*0.3} l14,0 M${right?x:x-14},${yT+h*0.62} l14,0" stroke="#8a6b3f" stroke-width=".5"/>`+lab('DIRT WALL');
}
function h3DiagramSVG(forReport){
  const m=D.master,p=D.profile;
  const secs=D.sections.filter(s=>isFinite(num(s.start)));
  const a0=isFinite(num(m.assessStart))?num(m.assessStart):(secs.length?Math.min(...secs.map(s=>num(s.start))):0);
  const aEnd=[...secs.map(s=>num(s.end)),num(m.assessEnd)].filter(isFinite);
  const a1=aEnd.length?Math.max(...aEnd):a0+10;
  const W=940,H=484,L=90,R=170,T=86,PIPE_Y=250,SOIL_T=140,SOIL_B=400;
  const X=v=>L+((v-a0)/((a1-a0)||1))*(W-L-R);
  /* vertical scale: the depth ruler is 4 divisions of 1.64 ft over (SOIL_B-58-SOIL_T)px */
  const VPXFT=((SOIL_B-58-SOIL_T)/4)/1.64;
  let s=svgOpen(W,H).replace('<svg ',`<svg data-h3scale="${(a1-a0)/(W-L-R)}" data-h3vscale="${1/VPXFT}" `)+FIT_GRAD;
  /* inclination + DoC boxes */
  const box=(x,txt,pre)=>`<rect x="${x-30}" y="${T-70}" width="60" height="20" fill="#fff" stroke="#000"/><text x="${x}" y="${T-56}" font-size="11" text-anchor="middle">${pre}${txt||'—'}</text>`;
  s+=`<text x="${(L+W-R)/2}" y="${T-78}" font-size="10" text-anchor="middle">Inclination Angle (degrees)</text>`;
  const sign=v=>{const n=num(v);return isFinite(n)?((n<0?'-  ':'+  ')+Math.abs(n)):'';};
  const clampT=x=>Math.max(34,Math.min(W-34,x));
  s+=box(clampT(X(a0)),sign(p.inclUS),'')+box((X(a0)+X(a1))/2,sign(p.inclCtr),'')+box(clampT(X(a1)),sign(p.inclDS),'');
  s+=`<text x="${(L+W-R)/2}" y="${T-30}" font-size="10" text-anchor="middle">Depth of Cover</text>`;
  const dbox=(x,v)=>`<rect x="${x-26}" y="${T-24}" width="52" height="20" fill="#fff" stroke="#000"/><text x="${x}" y="${T-10}" font-size="11" text-anchor="middle">${v||'—'}</text>`;
  s+=dbox(clampT(X(a0)),D.h1.docUS)+dbox((X(a0)+X(a1))/2,D.h1.docCtr)+dbox(clampT(X(a1)),D.h1.docDS);
  /* compass */
  s+=`<g transform="translate(${L-52},${T+16})"><text x="0" y="0" font-size="13" font-weight="bold">N</text><path d="M10,22 L16,2 L22,22 L16,15 Z" fill="#000"/></g>`;
  /* soil */
  s+=`<rect x="${L-14}" y="${SOIL_T}" width="${W-L-R+28}" height="${SOIL_B-SOIL_T}" fill="#e8e0c8"/>`;
  s+=`<rect x="${L-14}" y="${SOIL_B-58}" width="${W-L-R+28}" height="58" fill="#7a4a21"/>`;
  s+=`<rect x="${L-14}" y="${SOIL_T}" width="${W-L-R+28}" height="${SOIL_B-SOIL_T}" fill="url(#)" stroke="#8a6b3f" stroke-width="1"/>`;
  for(let gx=0;gx<=8;gx++){const xx=L-14+gx*(W-L-R+28)/8;s+=`<line x1="${xx}" y1="${SOIL_T}" x2="${xx}" y2="${SOIL_B-58}" stroke="#cfc5a5" stroke-width=".6"/>`;}
  for(let gy=0;gy<4;gy++){const yy=SOIL_T+gy*(SOIL_B-58-SOIL_T)/4;s+=`<line x1="${L-14}" y1="${yy}" x2="${W-R+14}" y2="${yy}" stroke="#cfc5a5" stroke-width=".6"/>`;}
  /* depth scale left */
  const dep=[0,1.64,3.28,4.92];
  dep.forEach((dv,i)=>{const yy=SOIL_T+ i*(SOIL_B-58-SOIL_T)/4;
    s+=`<rect x="4" y="${yy-9}" width="46" height="18" fill="#fff" stroke="#000"/><text x="27" y="${yy+4}" font-size="10" text-anchor="middle">${dv}</text>`;});
  s+=`<text x="10" y="${(SOIL_T+SOIL_B)/2}" transform="rotate(-90 10 ${(SOIL_T+SOIL_B)/2})" font-size="10" text-anchor="middle">Depth (ft.)</text>`;
  s+=`<text x="27" y="${SOIL_B-70}" font-size="7.5" text-anchor="middle">Ditch Depth</text><rect x="4" y="${SOIL_B-66}" width="46" height="18" fill="#fff" stroke="#000"/><text x="27" y="${SOIL_B-53}" font-size="10" text-anchor="middle">${p.ditchDepth||'—'}</text>`;
  /* pipe run — auto (from sections) or manual (profile.elems) */
  const smallH=26, bigH=44;
  const manual=D.profile.layoutMode==='manual'&&D.profile.elems.length>0;
  const drawShape=(kind,xa,xb,size,idx)=>{
    const hh=size==='small'?smallH:bigH;
    const drag=manual&&idx!==undefined&&!forReport?` data-drag="${idx}" style="cursor:grab"`:'';
    if(kind==='elbow')
      return `<circle${drag} cx="${(xa+xb)/2}" cy="${PIPE_Y}" r="${Math.max(Math.min((xb-xa)/2,26),9)}" fill="#5b9bd5" stroke="#2f5a86" stroke-width="1.5"/>`;
    if(kind==='reducer')
      return `<polygon${drag} points="${xa},${PIPE_Y-smallH/2} ${xb},${PIPE_Y-bigH/2} ${xb},${PIPE_Y+bigH/2} ${xa},${PIPE_Y+smallH/2}" fill="#c8c8c8" stroke="#555"/>`;
    if(kind==='valve'){const cx=(xa+xb)/2;
      return `<g${drag}><polygon points="${xa},${PIPE_Y-18} ${cx},${PIPE_Y} ${xa},${PIPE_Y+18}" fill="#9aa" stroke="#556"/><polygon points="${xb},${PIPE_Y-18} ${cx},${PIPE_Y} ${xb},${PIPE_Y+18}" fill="#9aa" stroke="#556"/></g>`;}
    if(kind==='coated')
      return `<rect${drag} x="${xa}" y="${PIPE_Y-hh/2}" width="${Math.max(xb-xa,6)}" height="${hh}" fill="#5b3a29"/>`;
    return `<g${drag}><rect x="${xa}" y="${PIPE_Y-hh/2}" width="${Math.max(xb-xa,3)}" height="${hh}" rx="2" fill="#d5d5d5" stroke="#555"/><rect x="${xa}" y="${PIPE_Y-hh/2}" width="${Math.max(xb-xa,3)}" height="${hh/3}" fill="#f0f0f0" opacity=".8"/></g>`;
  };
  const gwMark=(g,i,posPref,lab)=>{
    const up=posPref?posPref==='above':(i%2===0);
    const yl=up?PIPE_Y-70-((i%3)*14):PIPE_Y+70+((i%3)*14);
    let o=`<line x1="${X(g)}" y1="${PIPE_Y+(up?-bigH/2:bigH/2)}" x2="${X(g)}" y2="${yl+(up?10:-10)}" stroke="#000" stroke-width=".8"/>`;
    o+=`<line x1="${X(g)}" y1="${PIPE_Y-bigH/2}" x2="${X(g)}" y2="${PIPE_Y+bigH/2}" stroke="#333" stroke-width="2"/>`;
    o+=`<text x="${X(g)}" y="${yl+(up?6:2)}" font-size="10" text-anchor="middle" style="paint-order:stroke" stroke="#e8e0c8" stroke-width="3" fill="#000">${rEsc(lab||`GW @ ${g.toFixed(2)}'`)}</text>`;
    return o;
  };
  if(manual){
    D.profile.elems.forEach((el2,i)=>{
      const st=num(el2.start); if(!isFinite(st))return;
      const en=isFinite(num(el2.end))?num(el2.end):st+0.5;
      /* vertical offset (ft, + = deeper) — wraps the element so every shape
         type moves without changing its own geometry math */
      const vo=num(el2.voff)||0, dy=vo*VPXFT;
      const gO=dy?`<g transform="translate(0,${dy.toFixed(2)})">`:'', gC=dy?'</g>':'';
      if(el2.kind==='gw'){s+=gO+gwMark(st,i,el2.pos,el2.label)+gC;return;}
      if(el2.kind==='fitting'){
        const f=D.fittings.find(x=>x.name===el2.label);
        if(f){
          const g=fittingGeometry(f.type,f.p,10);
          const enF=isFinite(num(el2.end))?num(el2.end):st+g.w/10/12;
          const targetW=Math.max(X(enF)-X(st),14);
          const targetH=(el2.size==='small'?smallH:bigH)*((f.type==='tee'||f.type==='gate')?2.2:(f.type==='flange'?1.7:(f.type==='elbow'?2.4:1)));
          const sc=Math.min(targetW/g.w,targetH/g.h);
          const drag2=!forReport?` data-drag="${i}" style="cursor:grab"`:'';
          s+=`<g${drag2} transform="translate(${X(st)},${PIPE_Y-g.cy*sc+dy}) scale(${sc})">${g.body}</g>`;
          s+=`<text x="${X(st)+g.w*sc/2}" y="${PIPE_Y-g.cy*sc-5+dy}" font-size="8" text-anchor="middle" style="paint-order:stroke" stroke="#e8e0c8" stroke-width="3">${rEsc(el2.label)}</text>`;
        }
        return;}
      if(el2.kind==='label'){
        const up=el2.pos!=='below';
        s+=`<text${!forReport?` data-drag="${i}" style="cursor:grab"`:''} x="${X(st)}" y="${(up?PIPE_Y-bigH/2-8-((i%3)*12):PIPE_Y+bigH/2+16+((i%3)*12))+dy}" font-size="10" text-anchor="middle" style="paint-order:stroke" stroke="#e8e0c8" stroke-width="3">${rEsc(el2.label||'')}</text>`;return;}
      s+=gO+drawShape(el2.kind,X(st),X(en),el2.size,i)+gC;
    });
  } else {
    const redIdx=secs.findIndex(sec=>/reducer/i.test(sec.notes||''));
    const segH=i=>redIdx>=0?(i<redIdx?'small':(i===redIdx?'':'large')):'large';
    const comp=sec=>{const n2=(sec.notes||'').toLowerCase();
      return /elbow/.test(n2)?'elbow':/reducer/.test(n2)?'reducer':/valve/.test(n2)?'valve':/pup/.test(n2)?'pup':'pipe';};
    secs.forEach((sec,i)=>{
      const xa=X(num(sec.start)), xb=X(isFinite(num(sec.end))?num(sec.end):num(sec.start)+1);
      s+=drawShape(comp(sec),xa,xb,segH(i)||'large');
    });
    /* coated pipe carrying on past the bare pipe end — it used to start AT
       X(a1) and run 26px, which pushed it clean outside the soil block and made
       the BPE look like it sat outside the excavation. It now runs from BPE to
       the soil edge and no further. */
    const coatEnd=Math.min(X(a1)+26,W-R+14);
    if(coatEnd>X(a1))s+=`<rect x="${X(a1)}" y="${PIPE_Y-bigH/2}" width="${coatEnd-X(a1)}" height="${bigH}" fill="#5b3a29"/>`;
    const gws=[...new Set(secs.map(sec=>num(sec.start)).filter(v=>isFinite(v)&&v>a0))];
    gws.forEach((g,i)=>{s+=gwMark(g,i);});
  }
  /* BPS / BPE */
  /* BPS / BPE — anchored on the actual station line, with a tick down to the
     pipe, so the label, the box below it and the pipe end all agree */
  const endTick=(x,lab,up)=>
    `<line x1="${x}" y1="${PIPE_Y-bigH/2-2}" x2="${x}" y2="${PIPE_Y+bigH/2+2}" stroke="#000" stroke-width="1.4" stroke-dasharray="3 2"/>`
   +`<text x="${x}" y="${up?PIPE_Y-bigH/2-8:PIPE_Y+bigH/2+16}" font-size="9" font-weight="bold" text-anchor="middle" style="paint-order:stroke" stroke="#e8e0c8" stroke-width="3" fill="#000">${lab}</text>`;
  s+=endTick(X(a0),'BPS',true)+endTick(X(a1),'BPE',false);
  /* what the bell hole is cut against at each end */
  s+=pitEnd(D.profile.endUS,L-14,SOIL_T,SOIL_B-58,false)+pitEnd(D.profile.endDS,W-R+14,SOIL_T,SOIL_B-58,true);
  /* not-to-scale banner */
  s+=`<rect x="${L+40}" y="${SOIL_B-98}" width="${W-L-R-80}" height="26" fill="#6b3a1f"/><text x="${(L+W-R)/2}" y="${SOIL_B-80}" font-size="16" font-weight="bold" text-anchor="middle" fill="#f3c14b" letter-spacing="2">Drawing Not to Scale</text>`;
  /* bottom stationing boxes */
  const bbox=(x,big,lab,sta)=>`<rect x="${x-42}" y="${SOIL_B+16}" width="84" height="26" fill="#fff" stroke="#000" stroke-width="1.3"/><text x="${x}" y="${SOIL_B+34}" font-size="13" text-anchor="middle">${big}</text><text x="${x}" y="${SOIL_B+56}" font-size="10" text-anchor="middle">${lab}</text>${sta?`<text x="${x}" y="${SOIL_B+68}" font-size="9" text-anchor="middle" fill="#555" font-family="var(--mono)">${rEsc(sta)}</text>`:''}`;
  /* the boxes used to sit 30px inboard of the ends they label, so nothing on
     the drawing lined up with anything else. They now sit on X(a0)/X(a1), only
     pulled in far enough to keep an 84px box inside the frame. Values are the
     ref footage as entered — not 0/half/length — and carry the station form
     underneath when Master has a stationing. */
  const c9=calcStationing();
  const clampX=x=>Math.max(46,Math.min(W-46,x));
  s+=bbox(clampX(X(a0)),fmt(a0,2),'Bare Pipe Start',c9.staBPS)
    +bbox((X(a0)+X(a1))/2,fmt((a0+a1)/2,2),'Center',fmtStation(num(D.master.stationing)+(a0+a1)/2))
    +bbox(clampX(X(a1)),fmt(a1,2),'Bare Pipe End',c9.staBPE);
  /* section list right */
  let ly=SOIL_T+4;
  secs.forEach((sec,i)=>{ s+=`<text x="${W-R+22}" y="${ly}" font-size="8.6">Section ${i+1} Start: ${num(sec.start)}, ${rEsc((sec.notes||'').split(',').pop().trim()||'Pipe')}</text>`; ly+=12; });
  s+='</svg>';
  return s;
}

/* The printed GPS schematic used to space points evenly by index, so a point at
   5 ft and one at 40 ft sat the same distance apart as two a foot apart — the
   drawing looked plausible and told you nothing. Points are now plotted at their
   actual Ref ft, and the callouts go through the same layout engine as the
   indication map, so they neither overlap nor cross their own leaders. */
function gpsSchematicSVG(){
  const pts=D.gps.rows.filter(r=>r.label);
  const W=940,H=260,L=60,R=60,PIPE_Y=190;
  const refs=pts.map(r=>num(r.refFt)).filter(isFinite);
  const noRef=pts.length&&!refs.length;
  let a0=refs.length?Math.min(...refs):0, a1=refs.length?Math.max(...refs):10;
  if(a1-a0<0.5){ a0-=1; a1+=1; }                      /* all at one spot */
  const pad=(a1-a0)*0.06;
  a0-=pad; a1+=pad;
  const X=v=>L+40+((v-a0)/((a1-a0)||1))*(W-L-R-110);
  let s=svgOpen(W,H);
  s+=`<defs><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z"/></marker></defs>`;
  s+=`<rect x="10" y="${PIPE_Y-90}" width="46" height="120" fill="#7a4a21"/><rect x="${W-56}" y="${PIPE_Y-90}" width="46" height="120" fill="#7a4a21"/>`;
  s+=`<circle cx="${L+40}" cy="${PIPE_Y}" r="24" fill="#5b9bd5" stroke="#2f5a86" stroke-width="1.5"/>`;
  s+=`<rect x="${L+64}" y="${PIPE_Y-15}" width="${W-L-R-140}" height="30" rx="3" fill="#d5d5d5" stroke="#555"/>`;
  s+=`<rect x="${W-R-76}" y="${PIPE_Y-15}" width="30" height="30" fill="#3a3a3a"/>`;
  s+=`<text x="${L+90}" y="${PIPE_Y+42}" font-size="11" font-weight="700">FLOW</text>`
    +`<line x1="${L+140}" y1="${PIPE_Y+38}" x2="${L+230}" y2="${PIPE_Y+38}" stroke="#000" stroke-width="2" marker-end="url(#arr)"/>`;
  /* a ft scale, so the reader can see the drawing is to distance */
  if(refs.length){
    s+=`<line x1="${X(a0)}" y1="${PIPE_Y+58}" x2="${X(a1)}" y2="${PIPE_Y+58}" stroke="#666" stroke-width=".8"/>`;
    for(let k=0;k<=4;k++){ const v=a0+(a1-a0)*k/4, x=X(v);
      s+=`<line x1="${x}" y1="${PIPE_Y+54}" x2="${x}" y2="${PIPE_Y+62}" stroke="#666" stroke-width=".8"/>`
        +`<text x="${x}" y="${PIPE_Y+72}" font-size="7.5" text-anchor="middle" fill="#666">${v.toFixed(1)}'</text>`; }
    s+=`<text x="${X(a0)}" y="${PIPE_Y+84}" font-size="7.5" fill="#666">Ref ft</text>`;
  }
  /* callouts */
  const nodes=[], marks=[];
  pts.forEach((p,i)=>{
    const r=num(p.refFt);
    const x=isFinite(r)?X(r):X(a0)+((W-L-R-110)/Math.max(pts.length-1,1))*i;
    marks.push({x,known:isFinite(r)});
    nodes.push({box:{x:x-2,y:PIPE_Y-18,w:4,h:36},text:p.label});
  });
  const obs=nodes.map(n=>n.box).concat([{x:L+64,y:PIPE_Y-15,w:W-L-R-140,h:30}]);
  const labs=nodes.length?layoutMapLabels(nodes,obs,{x:L,y:12,w:W-L-R,h:PIPE_Y-40}):[];
  labs.forEach((l,i)=>{
    const m2=marks[i];
    s+=`<circle cx="${m2.x}" cy="${PIPE_Y}" r="3" fill="#0a7a3e"/>`;
    const a=boxAnchor(nodes[i].box,l), e=labelEdge(l,a.x,a.y);
    s+=`<line x1="${e.x.toFixed(1)}" y1="${e.y.toFixed(1)}" x2="${m2.x.toFixed(1)}" y2="${PIPE_Y}" stroke="#0a7a3e" stroke-width=".8" stroke-dasharray="2 2"/>`;
    s+=`<rect x="${l.x.toFixed(1)}" y="${l.y.toFixed(1)}" width="${l.w.toFixed(1)}" height="${l.h.toFixed(1)}" rx="1.5" fill="#fff" fill-opacity=".95" stroke="#0a7a3e" stroke-width=".6"/>`;
    s+=`<text x="${(l.x+l.w/2).toFixed(1)}" y="${(l.y+7.4).toFixed(1)}" font-size="7.5" text-anchor="middle" fill="#0a7a3e">${rEsc(pts[i].label)}${marks[i].known?'':' (no ref ft)'}</text>`;
  });
  if(noRef)s+=`<text x="${W/2}" y="${H-6}" font-size="8" text-anchor="middle" fill="#c00000">No Ref ft on any GPS row — points are shown in list order, not to distance.</text>`;
  s+='</svg>';
  return s;
}

function parseCSV(text){
  const rows=[]; let row=[],cur='',inQ=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(inQ){ if(ch==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else inQ=false; } else cur+=ch; }
    else if(ch==='"')inQ=true;
    else if(ch===','||ch==='\t'){row.push(cur);cur='';}
    else if(ch==='\n'||ch==='\r'){ if(ch==='\r'&&text[i+1]==='\n')i++; row.push(cur);cur='';
      if(row.some(c=>c.trim()!==''))rows.push(row); row=[]; }
    else cur+=ch;
  }
  if(cur!==''||row.length){row.push(cur); if(row.some(c=>c.trim()!==''))rows.push(row);}
  return rows;
}

 ['awt',     /awt|actual wall/i],
 ['method',  /sizing|method/i],
 ['comments',/comment|note|remark/i],
 ['decision',/decision|eng/i],
 ['repair',  /repair/i],
];
function csvImportIndications(file){
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const rows=parseCSV(String(rd.result));
      if(rows.length<2)throw new Error('file needs a header row plus at least one data row');
      const hdr=rows[0];
      const colFor={};
      hdr.forEach((h,i)=>{ for(const [key,re] of CSV_MAP){ if(colFor[key]===undefined&&re.test(h.trim())){colFor[key]=i;break;} } });
      if(colFor.type===undefined&&colFor.dist===undefined)throw new Error('could not recognize any columns — headers found: '+hdr.join(', '));
      let added=0;
      rows.slice(1).forEach(r=>{
        const get=k=>colFor[k]!==undefined?String(r[colFor[k]]??'').trim():'';
        if(!get('type')&&!get('dist'))return;
        D.indications.push({id:get('id')||String(D.indications.length+1).padStart(3,'0'),
          type:get('type').toUpperCase(),surf:get('surf')||'OD',dist:get('dist'),clock:get('clock'),
          len:get('len'),wid:get('wid'),depth:get('depth'),awt:get('awt'),
          method:get('method'),comments:get('comments'),decision:get('decision'),repair:get('repair')});
        added++;
      });
      renderTable('ind'); refresh('ind');
      alert(`Imported ${added} indication(s).\nMapped columns: ${Object.entries(colFor).map(([k,i])=>k+'←"'+hdr[i]+'"').join(', ')}`);
    }catch(e){alert('CSV import failed: '+e.message);}
  };
  rd.readAsText(file);
}
/* corrosion log pull — workbook links H8 to Indication Table EC-type rows */
function pullCorrLog(){
  const src=D.indications.filter(r=>['EC','CEC','EML','IC','IML'].includes(r.type));
  if(!src.length){alert('No external/internal corrosion rows (EC, CEC, EML, IC, IML) on the Indication Table yet.');return;}
  const mapped=src.map(r=>({type:r.type||'EC',dist:r.dist,clock:r.clock,
    depth:isFinite(num(r.depth))?(num(r.depth)>10?(num(r.depth)/1000).toFixed(3):r.depth):r.depth,
    len:r.len,circ:r.wid,pof:'',comments:`${r.type}-${r.id}${r.comments?' — '+r.comments:''}`}));
  if(D.corrLog.length&&!confirm(`Replace the ${D.corrLog.length} existing corrosion log row(s) with ${mapped.length} pulled from the Indication Table?`))return;
  D.corrLog=mapped;
  renderTable('corrlog'); refresh('h8');
}
/* photo log generator — standard shot list like the deliverable's photo report */
/* Shots are emitted in phase order, which is dig order — the phase tags only
   mean anything if the generated log already runs excavation -> coating -> bare
   pipe -> NDE -> repair -> recoat -> backfill. Phases are referenced by KEY via
   PH(), so a renamed or reordered phase list still tags these correctly. Label
   and dimension strings come from the shared helpers so this generator and the
   annotator can never disagree. */
function genPhotoLog(){
  const shots=[];
  const push=(t,ph)=>shots.push({no:String(shots.length+1),comments:t,img:'',phase:ph||''});

  push('Excavation overview — as found',PH('exc'));
  push('Excavation — pit dimensions / shoring',PH('exc'));
  push('Depth of cover measurement — US',PH('exc'));
  push('Depth of cover measurement — center',PH('exc'));
  push('Depth of cover measurement — DS',PH('exc'));
  if(D.samples.pin4Ohms)push('Soil resistivity — 4-pin reading',PH('exc'));

  push('Coating, as found',PH('coat'));
  push('Coating adhesion / disbondment test',PH('coat'));
  D.coatDamage.forEach((r,i)=>push(`${cdLabel(r,i)} | ${cdDims(r)}`,PH('coat')));

  push('Pipe surface after coating removal, before blast',PH('under'));

  ['12:00','03:00','06:00','09:00'].forEach(c=>push(`Blasted pipe overview — US looking DS @ ${c}`,PH('bare')));
  ['12:00','03:00','06:00','09:00'].forEach(c=>push(`Blasted pipe overview — DS looking US @ ${c}`,PH('bare')));
  D.sections.forEach((s,i)=>{ if(isFinite(num(s.start)))push(`Section ${i+1} — GW @ ${num(s.start).toFixed(2)}'${s.seamType?' · seam '+s.seamType+(s.seamLoc?' @ '+s.seamLoc:''):''}`,PH('bare')); });
  D.indications.forEach((r,i)=>push(`${indLabel(r,i)} | ${indDims(r)}`,PH('bare')));

  /* only acid-etch reports carry a per-location rows[] table; an MT report is a
     single whole-component examination with one result */
  (NDE('acid').rows||[]).filter(r=>r.axial).forEach(r=>push(`Acid etch — ${r.axial}${r.seam?' · '+r.seam:''}`,PH('mt')));
  ndeList('mt').filter(r=>r.tech||r.comments).forEach(r=>push(`WFMT examination${r.compType?' — '+r.compType:''}${r.tech?' · '+r.tech:''}`,PH('mt')));

  if(String(D.h10.repairType||'').trim())push(`Repair — ${D.h10.repairType}`,PH('rep'));
  if(D.h10.recoatedWith)push(`Recoat — ${D.h10.recoatedWith}`,PH('recoat'));
  push('Backfill / site restoration',PH('back'));

  if(D.photoLog.length&&!confirm(`Replace the ${D.photoLog.length} existing photo log entrie(s) with ${shots.length} generated entries?`))return;
  D.photoLog=shots;
  renderTable('photo'); refresh('h9');
}

/* live auto-sync: add corrLog rows for any EC/CEC/EML/IC/IML indication not yet represented,
   without disturbing rows the user has already edited (matched by comments "TYPE-id" tag) */
function autosyncCorrLog(){
  const src=D.indications.filter(r=>['EC','CEC','EML','IC','IML'].includes(r.type)&&r.type&&r.id);
  const have=new Set(D.corrLog.map(r=>(r.comments||'').split(' ')[0]));
  let added=0;
  src.forEach(r=>{
    const tag=`${r.type}-${r.id}`;
    if(have.has(tag))return;
    D.corrLog.push({type:r.type,dist:r.dist,clock:r.clock,
      depth:isFinite(num(r.depth))?(num(r.depth)>10?(num(r.depth)/1000).toFixed(3):r.depth):r.depth,
      len:r.len,circ:r.wid,pof:'',comments:`${tag}${r.comments?' — '+r.comments:''}`});
    added++;
  });
  if(added)renderTable('corrlog');
}

/* ============================================================
   FITTING MAKER — ported from Fitting_Maker.xlsm
   Reducer/Elbow/Tee geometry line-for-line from Modules 1-3;
   Flange & valves built from their parameter sheets.
   ============================================================ */
const FIT_TYPES={
 reducer:{name:'Concentric Reducer',params:[['largeDia','Large end diameter (in)',24],['smallDia','Small end diameter (in)',16],['len','Reducer length (in)',20]]},
 elbow:{name:'Elbow / Bend',params:[['pipeDia','Pipe diameter (in)',12.75],['bendR','Bend radius (in)',18],['angle','Bend angle (°)',90]]},
 tee:{name:'Tee',params:[['runDia','Run diameter (in)',12.75],['branchDia','Branch diameter (in)',8.625],['cornerR','Corner radius (in)',1.5]]},
 flange:{name:'Weld Neck Flange',params:[['pipeOD','Pipe OD (in)',6.625],['flangeOD','Flange OD (in)',11],['thk','Flange thickness (in)',1.5],['hub','Hub length (in)',2]]},
 gate:{name:'Gate Valve',params:[['pipeOD','Pipe OD (in)',6.625],['bodyLen','Body length (in)',8],['bodyH','Body height (in)',7],['stem','Stem height (in)',6]]},
 ball:{name:'Ball Valve',params:[['pipeOD','Pipe OD (in)',10.75],['bodyLen','Body length (in)',5]]}
};
let FM={type:'reducer',p:{},name:''};
function fmDefaults(type){const o={};FIT_TYPES[type].params.forEach(([k,,d])=>o[k]=d);return o;}
const FIT_GRAD=`<defs><linearGradient id="fitmetal" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="#a0a0a5"/><stop offset=".5" stop-color="#d2d2d7"/><stop offset="1" stop-color="#a0a0a5"/></linearGradient>
  <linearGradient id="fitmetalD" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0" stop-color="#a0a0a5"/><stop offset=".5" stop-color="#d7d7dc"/><stop offset="1" stop-color="#a0a0a5"/></linearGradient></defs>`;
const FIT_STYLE='fill="url(#fitmetal)" stroke="#50505a" stroke-width="1.5"';
/* returns {w,h,cy,body} — body is SVG markup in local coords, cy = pipe centerline y */
function fittingGeometry(type,p,ppi){
  const P=Math.PI;
  if(type==='reducer'){
    /* exact port of UpdateReducerShape: 15% stubs, cubic taper w/ cp at x1+0.45*body */
    const totalW=p.len*ppi, largeH=p.largeDia*ppi, smallH=p.smallDia*ppi;
    const stub=totalW*0.15, body=totalW-2*stub;
    const cy=largeH/2;
    const x0=0,x1=stub,x2=stub+body,x3=totalW;
    const lT=cy-largeH/2,lB=cy+largeH/2,sT=cy-smallH/2,sB=cy+smallH/2;
    const cpX=x1+body*0.45;
    const d=`M${x0},${lT} L${x1},${lT} C${cpX},${lT} ${cpX},${sT} ${x2},${sT} L${x3},${sT} L${x3},${sB} L${x2},${sB} C${cpX},${sB} ${cpX},${lB} ${x1},${lB} L${x0},${lB} Z`;
    return {w:totalW,h:largeH,cy,body:`<path d="${d}" ${FIT_STYLE}/>`};
  }
  if(type==='elbow'){
    /* exact port of UpdateElbowShape: annulus polyline sweep, start -90°, 36 steps */
    const outerR=(p.bendR+p.pipeDia/2)*ppi, innerR=(p.bendR-p.pipeDia/2)*ppi;
    if(innerR<=0)return {w:10,h:10,cy:5,body:''};
    const aRad=p.angle*P/180, a0=-P/2, steps=36;
    const cx=outerR+4, cy0=outerR+4;
    const pt=(r,a)=>[cx+r*Math.cos(a),cy0+r*Math.sin(a)];
    let pts=[pt(outerR,a0),pt(innerR,a0)];
    for(let k=1;k<=steps;k++)pts.push(pt(innerR,a0+aRad*k/steps));
    pts.push(pt(outerR,a0+aRad));
    for(let k=steps-1;k>=0;k--)pts.push(pt(outerR,a0+aRad*k/steps));
    const xs=pts.map(q=>q[0]),ys=pts.map(q=>q[1]);
    const mnx=Math.min(...xs),mny=Math.min(...ys);
    const d='M'+pts.map(q=>`${(q[0]-mnx).toFixed(2)},${(q[1]-mny).toFixed(2)}`).join(' L')+' Z';
    /* inlet centerline (pointing down from start at -90°, i.e. left end top) sits at bend-radius from center */
    return {w:Math.max(...xs)-mnx,h:Math.max(...ys)-mny,cy:(cy0-mny)-p.bendR*ppi+p.bendR*ppi, cy:(cy0-mny),body:`<path d="${d}" fill="url(#fitmetalD)" stroke="#50505a" stroke-width="1.5"/>`};
  }
  if(type==='tee'){
    /* exact port of UpdateTeeShape: run stubs 1.2×runDia, quarter fillets 20 steps */
    const rD=p.runDia*ppi,bD=p.branchDia*ppi,cr=p.cornerR*ppi;
    const stubRun=rD*1.2,stubBr=bD*1.2;
    const ox=4,oy=4;
    const bLX=ox+stubRun+(rD-bD)/2,bRX=bLX+bD;
    const rTY=oy+stubBr,rBY=rTY+rD,rLX=ox,rRX=ox+stubRun+rD+stubRun,bTY=oy;
    const steps=20;let pts=[[bLX,bTY],[bRX,bTY],[bRX,rTY-cr]];
    for(let k=1;k<=steps;k++){const a=P-(P/2)*k/steps;pts.push([(bRX+cr)+cr*Math.cos(a),(rTY-cr)+cr*Math.sin(a)]);}
    pts.push([rRX,rTY],[rRX,rBY],[rLX,rBY],[rLX,rTY],[bLX-cr,rTY]);
    for(let k=1;k<=steps;k++){const a=(P/2)-(P/2)*k/steps;pts.push([(bLX-cr)+cr*Math.cos(a),(rTY-cr)+cr*Math.sin(a)]);}
    const d='M'+pts.map(q=>`${q[0].toFixed(2)},${q[1].toFixed(2)}`).join(' L')+' Z';
    return {w:rRX+4,h:rBY+4,cy:rTY+rD/2,body:`<path d="${d}" fill="url(#fitmetalD)" stroke="#50505a" stroke-width="1.5"/>`};
  }
  if(type==='flange'){
    const od=p.pipeOD*ppi,fod=p.flangeOD*ppi,thk=p.thk*ppi,hub=p.hub*ppi;
    const stub=od*0.9, cy=fod/2, W=stub+hub+thk+4;
    let b=`<rect x="0" y="${cy-od/2}" width="${stub}" height="${od}" ${FIT_STYLE}/>`;
    b+=`<polygon points="${stub},${cy-od/2} ${stub+hub},${cy-od*0.68} ${stub+hub},${cy+od*0.68} ${stub},${cy+od/2}" ${FIT_STYLE}/>`;
    b+=`<rect x="${stub+hub}" y="${cy-fod/2}" width="${thk}" height="${fod}" ${FIT_STYLE}/>`;
    b+=`<line x1="${stub+hub+thk/2}" y1="${cy-fod/2+3}" x2="${stub+hub+thk/2}" y2="${cy+fod/2-3}" stroke="#6a6a74" stroke-dasharray="3 3"/>`;
    return {w:W,h:fod,cy,body:b};
  }
  if(type==='gate'){
    const od=p.pipeOD*ppi,bl=p.bodyLen*ppi,bh=p.bodyH*ppi,st=p.stem*ppi;
    const stub=od*0.9,cy=st+bh/2,W=stub*2+bl;
    let b=`<rect x="0" y="${cy-od/2}" width="${stub}" height="${od}" ${FIT_STYLE}/>`;
    b+=`<rect x="${stub+bl}" y="${cy-od/2}" width="${stub}" height="${od}" ${FIT_STYLE}/>`;
    b+=`<polygon points="${stub},${cy-bh/2} ${stub+bl},${cy-bh/2} ${stub+bl*0.5+od*0.35},${cy} ${stub+bl},${cy+bh/2} ${stub},${cy+bh/2} ${stub+bl*0.5-od*0.35},${cy}" ${FIT_STYLE}/>`;
    b+=`<rect x="${stub+bl/2-2}" y="${cy-bh/2-st}" width="4" height="${st}" fill="#8a8a94" stroke="#50505a"/>`;
    b+=`<ellipse cx="${stub+bl/2}" cy="${cy-bh/2-st}" rx="${od*0.55}" ry="3.5" fill="none" stroke="#50505a" stroke-width="2"/>`;
    return {w:W,h:st+bh,cy,body:b};
  }
  if(type==='ball'){
    const od=p.pipeOD*ppi,bl=Math.max(p.bodyLen*ppi,od*1.1);
    const stub=od*0.8,cy=od*0.75+od/2,W=stub*2+bl;
    let b=`<rect x="0" y="${cy-od/2}" width="${stub}" height="${od}" ${FIT_STYLE}/>`;
    b+=`<rect x="${stub+bl}" y="${cy-od/2}" width="${stub}" height="${od}" ${FIT_STYLE}/>`;
    b+=`<rect x="${stub}" y="${cy-od*0.62}" width="${bl}" height="${od*1.24}" rx="${od*0.3}" ${FIT_STYLE}/>`;
    b+=`<circle cx="${stub+bl/2}" cy="${cy}" r="${od*0.4}" fill="#c4c4c9" stroke="#50505a"/>`;
    b+=`<rect x="${stub+bl/2-2}" y="${cy-od*0.62-8}" width="4" height="8" fill="#8a8a94" stroke="#50505a"/>`;
    b+=`<rect x="${stub+bl/2-2}" y="${cy-od*0.62-12}" width="${od*0.9}" height="5" rx="2" fill="#b33" stroke="#50505a"/>`;
    return {w:W,h:od*0.75+od*1.24,cy,body:b};
  }
  return {w:10,h:10,cy:5,body:''};
}
function fittingPreviewSVG(type,p){
  const g=fittingGeometry(type,p,10);
  const pad=10, W=g.w+pad*2, H=g.h+pad*2;
  return `<svg viewBox="0 0 ${W} ${H}" style="max-width:100%;max-height:260px" xmlns="http://www.w3.org/2000/svg">${FIT_GRAD}
    <g transform="translate(${pad},${pad})">${g.body}
    <line x1="-6" y1="${g.cy}" x2="${g.w+6}" y2="${g.cy}" stroke="#c00000" stroke-width=".8" stroke-dasharray="8 3 2 3"/></g></svg>`;
}
function renderFittingMaker(){

      ${t.params.map(([k,label])=>`<div class="fld"><label>${label}</label><input type="number" step="any" data-fm="${k}" value="${FM.p[k]}"></div>`).join('')}
      <div class="fld"><label>Fitting name (for library)</label><input id="fm-name" value="${esc(FM.name||t.name)}" placeholder="${t.name}"></div>
    </div>

    </div>

function fmLibHTML(){
  if(!D.fittings.length)return '<p style="font-size:.78rem;color:var(--ink3)">Library is empty — saved fittings appear here and can be placed on the drawing as <b>fitting</b> elements (the element Label = fitting name).</p>';

      <td><button class="tb-btn" data-fmedit="${i}">edit</button> <button class="tb-btn" data-fmplace="${i}">place</button> <button class="del" data-fmdel="${i}">✕</button></td></tr>`).join('')
  }</tbody></table>`;

function fittingNaturalLen(f){
  const p=f.p;
  const inches=f.type==='reducer'?p.len
    :f.type==='gate'?p.bodyLen+2*p.pipeOD*0.9
    :f.type==='ball'?Math.max(p.bodyLen,p.pipeOD*1.1)+2*p.pipeOD*0.8
    :f.type==='flange'?p.hub+p.thk+p.pipeOD*0.9
    :f.type==='tee'?p.runDia*3.4
    :p.bendR+p.pipeDia/2+0.8; /* elbow footprint */
  return inches/12;
}
function placeFitting(f){
  if(!f)return;
  const ends=D.profile.elems.map(e=>num(e.end)).filter(isFinite);
  const secs=D.sections.map(s2=>num(s2.end)).filter(isFinite);
  const at=ends.length?Math.max(...ends):(secs.length?Math.max(...secs)/2:2);
  D.profile.elems.push({kind:'fitting',start:String(Math.round(at*100)/100),
    end:String(Math.round((at+fittingNaturalLen(f))*100)/100),size:'large',pos:'above',label:f.name});
  if(D.profile.layoutMode!=='manual'){D.profile.layoutMode='manual';const lm=$('select[data-p="profile.layoutMode"]');if(lm)lm.value='manual';toggleH3Manual();}
  renderTable('h3elems'); redrawH3();
}
function fmSave(alsoPlace){
  const name=(($('#fm-name')?.value)||FM.name||'').trim()||FIT_TYPES[FM.type].name;
  const existing=D.fittings.findIndex(f=>f.name===name);
  const entry={name,type:FM.type,p:{...FM.p}};
  if(existing>=0)D.fittings[existing]=entry; else D.fittings.push(entry);
  FM.name=name;
  if(alsoPlace)placeFitting(entry);
  renderFittingMaker();
}

/* ============================================================
   PLAN VIEW + FULL FORM-H PRINT PAGES (order matches deliverable)
   ============================================================ */
function h3PlanSVG(forReport){
  const m=D.master,p=D.profile;
  const secs=D.sections.filter(s2=>isFinite(num(s2.start)));
  const a0=isFinite(num(m.assessStart))?num(m.assessStart):(secs.length?Math.min(...secs.map(s2=>num(s2.start))):0);
  const aEnd=[...secs.map(s2=>num(s2.end)),num(m.assessEnd)].filter(isFinite);
  const a1=aEnd.length?Math.max(...aEnd):a0+10;
  const W=940,H=380,L=90,R=170,CY=185;
  const X=v=>L+((v-a0)/((a1-a0)||1))*(W-L-R);
  const dia=num(m.diameter)||12, band=Math.max(Math.min(dia*2.2,42),18);
  let s=svgOpen(W,H).replace('<svg ','<svg data-h3scale="'+((a1-a0)/(W-L-R))+'" ')+FIT_GRAD;
  s+=`<text x="${(L+W-R)/2}" y="20" font-size="13" font-weight="bold" text-anchor="middle" letter-spacing="1">PLAN VIEW — LOOKING DOWN</text>`;
  s+=`<g transform="translate(${L-56},34)"><text x="0" y="0" font-size="13" font-weight="bold">N</text><path d="M10,22 L16,2 L22,22 L16,15 Z" fill="#000"/></g>`;
  /* excavation boundary */
  s+=`<rect x="${L-20}" y="60" width="${W-L-R+40}" height="${H-130}" fill="#efe9d8" stroke="#8a6b3f" stroke-width="1.4" stroke-dasharray="8 5"/>`;
  s+=`<text x="${L-14}" y="74" font-size="8.5" fill="#8a6b3f">EXCAVATION LIMITS</text>`;
  /* pipe band */
  const bandRect=(xa,xb,w2)=>`<rect x="${xa}" y="${CY-w2/2}" width="${Math.max(xb-xa,3)}" height="${w2}" fill="url(#fitmetal)" stroke="#50505a" stroke-width="1.2"/>`;
  const manual=p.layoutMode==='manual'&&p.elems.length>0;
  const drawPlan=(kind,xa,xb,size,pos,i,label)=>{
    const w2=size==='small'?band*0.62:band;
    const drag=manual&&i!==undefined&&!forReport?` data-drag="${i}" style="cursor:grab"`:'';
    if(kind==='reducer')
      return `<polygon${drag} points="${xa},${CY-band/2} ${xb},${CY-band*0.31} ${xb},${CY+band*0.31} ${xa},${CY+band/2}" fill="url(#fitmetal)" stroke="#50505a" stroke-width="1.2"/>`;
    if(kind==='valve'){const cx=(xa+xb)/2;
      return `<g${drag}>${bandRect(xa,xb,w2*0.5)}<polygon points="${xa},${CY-w2*0.8} ${cx},${CY} ${xa},${CY+w2*0.8}" fill="#9aa" stroke="#556"/><polygon points="${xb},${CY-w2*0.8} ${cx},${CY} ${xb},${CY+w2*0.8}" fill="#9aa" stroke="#556"/></g>`;}
    if(kind==='elbow'){ /* quarter-bend band turning toward pos */
      const up=pos!=='below', r0=Math.max(xb-xa,band), sweep=up?0:1;
      const yEnd=up?CY-r0:CY+r0;
      return `<g${drag}><path d="M${xa},${CY-w2/2} A${r0-w2/2},${r0-w2/2} 0 0 ${sweep} ${xa+r0-w2/2},${up?yEnd+0:yEnd} L${xa+r0+w2/2>xb?xb:xa+r0+w2/2},${yEnd} A${r0+w2/2},${r0+w2/2} 0 0 ${1-sweep} ${xa},${CY+w2/2} Z" fill="url(#fitmetal)" stroke="#50505a" stroke-width="1.2"/></g>`;}
    if(kind==='coated')return `<rect${drag} x="${xa}" y="${CY-w2/2}" width="${Math.max(xb-xa,6)}" height="${w2}" fill="#5b3a29"/>`;
    if(kind==='fitting'){
      const f=D.fittings.find(x=>x.name===label);
      if(!f)return '';
      if(f.type==='tee'){const up=pos!=='below',bw=Math.max((xb-xa)*0.4,10);
        return `<g${drag}>${bandRect(xa,xb,w2)}<rect x="${(xa+xb)/2-bw/2}" y="${up?CY-w2/2-band*1.1:CY+w2/2}" width="${bw}" height="${band*1.1}" fill="url(#fitmetal)" stroke="#50505a" stroke-width="1.2"/></g>`;}
      if(f.type==='ball'){const cx=(xa+xb)/2;
        return `<g${drag}>${bandRect(xa,xb,w2*0.6)}<circle cx="${cx}" cy="${CY}" r="${w2*0.75}" fill="url(#fitmetalD)" stroke="#50505a" stroke-width="1.2"/><rect x="${cx-2}" y="${CY-w2*0.75-10}" width="4" height="10" fill="#8a8a94"/><rect x="${cx-2}" y="${CY-w2*0.75-14}" width="${w2*1.1}" height="5" rx="2" fill="#b33"/></g>`;}
      if(f.type==='gate')return drawPlan('valve',xa,xb,size,pos,undefined,label).replace('<g>',`<g${drag}>`);
      if(f.type==='flange'){return `<g${drag}>${bandRect(xa,xb,w2*0.6)}<rect x="${xb-4}" y="${CY-w2}" width="4" height="${w2*2}" fill="url(#fitmetal)" stroke="#50505a"/></g>`;}
      if(f.type==='reducer')return drawPlan('reducer',xa,xb,size,pos,undefined,label).replace('<polygon ',`<polygon${drag} `);
      if(f.type==='elbow')return drawPlan('elbow',xa,xb,size,pos,undefined,label).replace('<g>',`<g${drag}>`);
      return bandRect(xa,xb,w2);
    }
    return `<g${drag}>${bandRect(xa,xb,w2)}<line x1="${xa}" y1="${CY}" x2="${xb}" y2="${CY}" stroke="#7d7d86" stroke-width=".7" stroke-dasharray="6 4"/></g>`;
  };
  const gwTick=(g,i,lab)=>`<line x1="${X(g)}" y1="${CY-band*0.9}" x2="${X(g)}" y2="${CY+band*0.9}" stroke="#333" stroke-width="2"/>`+
    `<text x="${X(g)}" y="${CY+band*0.9+12+((i%2)*11)}" font-size="9" text-anchor="middle" style="paint-order:stroke" stroke="#efe9d8" stroke-width="3">${rEsc(lab||('GW @ '+g.toFixed(2)+"'"))}</text>`;
  if(manual){
    p.elems.forEach((el2,i)=>{
      const st=num(el2.start); if(!isFinite(st))return;
      const en=isFinite(num(el2.end))?num(el2.end):st+0.5;
      if(el2.kind==='gw'){s+=gwTick(st,i,el2.label);return;}
      if(el2.kind==='label'){const up=el2.pos!=='below';
        s+=`<text x="${X(st)}" y="${up?CY-band-14-((i%3)*11):CY+band+22+((i%3)*11)}" font-size="10" text-anchor="middle" style="paint-order:stroke" stroke="#efe9d8" stroke-width="3">${rEsc(el2.label||'')}</text>`;return;}
      s+=drawPlan(el2.kind,X(st),X(en),el2.size,el2.pos,i,el2.label);
      if(el2.kind==='fitting')s+=`<text x="${(X(st)+X(en))/2}" y="${CY-band-6}" font-size="8" text-anchor="middle" style="paint-order:stroke" stroke="#efe9d8" stroke-width="3">${rEsc(el2.label)}</text>`;
    });
  } else {
    const comp=sec=>{const n2=(sec.notes||'').toLowerCase();
      return /elbow/.test(n2)?'elbow':/reducer/.test(n2)?'reducer':/valve/.test(n2)?'valve':'pipe';};
    secs.forEach(sec=>{s+=drawPlan(comp(sec),X(num(sec.start)),X(isFinite(num(sec.end))?num(sec.end):num(sec.start)+1),'large','above');});
    const gws=[...new Set(secs.map(sec=>num(sec.start)).filter(v=>isFinite(v)&&v>a0))];
    gws.forEach((g,i)=>{s+=gwTick(g,i);});
  }
  /* BPS/BPE + flow */
  s+=`<text x="${X(a0)}" y="${CY-band-18}" font-size="9" font-weight="bold" text-anchor="middle">BPS</text>`;
  s+=`<text x="${X(a1)}" y="${CY-band-18}" font-size="9" font-weight="bold" text-anchor="middle">BPE</text>`;
  s+=`<text x="${(L+W-R)/2-60}" y="${H-38}" font-size="13" font-weight="600">${rEsc(p.flowFrom)}  Flow ⇨  ${rEsc(p.flowTo)}</text>`;
  s+=`<rect x="${L+40}" y="${H-30}" width="${W-L-R-80}" height="20" fill="#6b3a1f"/><text x="${(L+W-R)/2}" y="${H-16}" font-size="12" font-weight="bold" text-anchor="middle" fill="#f3c14b" letter-spacing="2">Drawing Not to Scale</text>`;
  let ly=70;
  secs.forEach((sec,i)=>{s+=`<text x="${W-R+22}" y="${ly}" font-size="8.6">Section ${i+1} Start: ${num(sec.start)}, ${rEsc((sec.notes||'').split(',').pop().trim()||'Pipe')}</text>`;ly+=12;});
  s+='</svg>';
  return s;
}

/* ---- Form-H checkbox helpers (reproduce the PDF's marked-box layout) ---- */
/* one checkbox option: rendered checked (✕) when its label is in the selected set */
function cbx(label,on,dot){
  return `<span class="cbx${on?' on':''}"><span class="bx${dot?' dot':''}"></span>${rEsc(label)}</span>`;
}
/* a row of checkbox options; sel may be an array (multi) or a string (single) */
function cbGroup(options,sel){
  const set=Array.isArray(sel)?sel.map(x=>String(x).toLowerCase().trim())
                              :[String(sel??'').toLowerCase().trim()];
  return options.map(o=>{
    const [val,shown]=Array.isArray(o)?o:[o,o];
    const on=set.includes(String(val).toLowerCase().trim());
    return cbx(shown,on);
  }).join('');
}
/* labelled line: number, bold label, then arbitrary value markup */
function hfLine(no,label,valHTML,narrow){
  return `<div class="hf-line"><span class="no">${no||''}</span><span class="lab${narrow?' narrow':''}">${label}</span><span class="val">${valHTML}</span></div>`;
}
/* Yes/No inline pair, marking whichever the value matches */
function ynBoxes(v){
  const s=String(v??'').toLowerCase();
  return cbx('Yes',s==='yes')+cbx('No',s==='no'||s===''&&false)+(s==='n/a'||s==='na'?cbx('N/A',true):'');
}

function fillV(label,val){return `<span class="hf-fill"><b>${label}</b><span>${rEsc(val||'')||'&nbsp;'}</span></span>`;}

/* ---------- Site map labelling helpers ----------
   Bell-hole GPS points sit a few feet apart, so at any useful zoom their
   callouts overlap. These pick which points get labelled and then lay the
   labels out so they never collide, with leader lines back to each marker. */
const SITEMAP_LABEL_MODES=['All points','Extents + reference','Reference only','None'];
const SITEMAP_LABEL_TEXT=['Label + description','Label only','Description only'];
/* A point is the reference only if its LABEL says so (a description mentioning
   "center of assessment" must not turn a second marker red). */
const isRefPt=p=>/(^|[^a-z])ref([^a-z]|$)/i.test(p.label||'');
/* Which points get a callout, per the chosen mode */
function labelledPoints(pts,mode){
  if(mode==='None')return [];
  if(mode==='Reference only')return pts.filter(isRefPt);
  if(mode==='Extents + reference'){
    const withRef=pts.filter(p=>isFinite(p.ref));
    const sorted=[...(withRef.length?withRef:pts)].sort((a,b)=>(a.ref||0)-(b.ref||0));
    const keep=new Set([sorted[0],sorted[sorted.length-1]].filter(Boolean));
    pts.filter(isRefPt).forEach(p=>keep.add(p));
    return pts.filter(p=>keep.has(p));
  }
  return pts;
}
function labelTextOf(p,style){
  if(style==='Label only')return p.label||'';
  if(style==='Description only')return p.desc||p.label||'';
  return `${p.label}${p.desc?' — '+p.desc:''}`;
}
/* Greedy placement: try beside the marker, flip to the other side near the
   right edge, then step down until the box is clear of everything placed. */
function placeLabels(items,W,H,fs){
  const lh=fs*1.3, placed=[];
  const hits=r=>placed.some(p=>!(r.x+r.w<p.x||r.x>p.x+p.w||r.y+r.h<p.y||r.y>p.y+p.h));
  items.forEach(it=>{
    const wpx=Math.max(18,it.text.length*fs*0.56);
    let flip=(it.x+12+wpx)>(W-8);
    let lx=flip?it.x-12-wpx:it.x+12, ly=it.y-4;
    let guard=0;
    const rect=()=>({x:lx,y:ly-fs,w:wpx,h:lh});
    while(hits(rect())&&guard++<80)ly+=lh;
    if(ly>H-12){ ly=it.y-4; guard=0; while(hits(rect())&&guard++<80)ly-=lh; }
    ly=Math.max(fs+4,Math.min(H-6,ly));
    placed.push(rect());
    Object.assign(it,{lx,ly,wpx,flip});
  });
  return items;
}
/* ---------- Web Mercator helpers for the satellite site map ----------
   Standard slippy-map projection: world is TILE*2^z pixels square at zoom z. */
const TILE=256;
function worldPx(lat,lon,z){
  const n=TILE*Math.pow(2,z);
  const s=Math.max(-0.9999,Math.min(0.9999,Math.sin(lat*Math.PI/180)));
  return {x:(lon+180)/360*n, y:(0.5-Math.log((1+s)/(1-s))/(4*Math.PI))*n};
}
/* ground resolution (metres per pixel) at a latitude / zoom */
const metresPerPx=(lat,z)=>156543.03392*Math.cos(lat*Math.PI/180)/Math.pow(2,z);
/* Aerial tile providers. Both are keyless; Esri is the default because its
   imagery is higher resolution over most of the US. */
const SAT_SOURCES={
  'Esri World Imagery':{
    url:(z,x,y)=>`https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/${z}/${y}/${x}`,
    attr:'Imagery © Esri, Maxar, Earthstar Geographics, USDA FSA, USGS, Aerogrid, IGN, IGP', max:21},
  'USGS Imagery':{
    url:(z,x,y)=>`https://basemap.nationalmap.gov/arcgis/rest/services/USGSImageryOnly/MapServer/tile/${z}/${y}/${x}`,
    attr:'Imagery courtesy of the USGS National Map', max:19}
};
/* Zoom that frames the dig with useful surrounding context (~200 m across,
   matching the operator's overview map) while never exceeding the provider. */
function autoZoom(pts,lat0,W,maxZ){
  let span=25;
  if(pts.length>1){
    const xs=pts.map(p=>p.mx), ys=pts.map(p=>p.my);
    span=Math.max(Math.max(...xs)-Math.min(...xs), Math.max(...ys)-Math.min(...ys), 5);
  }
  const targetM=Math.max(span*8,180);              // metres to show across the view
  const z=Math.log2(156543.03392*Math.cos(lat0*Math.PI/180)/(targetM/W));
  return Math.max(12,Math.min(maxZ,Math.round(z)));
}
/* ---------- Site overview map generated from the collected GPS points ----------
   Projects lat/lon to a local plan view (equirectangular about the centroid),
   true to scale, with a north arrow and scale bar. Used on the Dig Location
   Overview Map page whenever no site image has been uploaded. */
function gpsSiteMapSVG(forReport){
  const pts=D.gps.rows
    .map(r=>({label:r.label||'',desc:r.desc||'',ref:num(r.refFt),lat:num(r.lat),lon:num(r.lon)}))
    .filter(p=>isFinite(p.lat)&&isFinite(p.lon)&&p.lat!==0&&p.lon!==0);
  const W=940,H=560,PAD=64;
  if(pts.length<1)
    return `<div style="border:1px solid #000;height:${forReport?560:420}px;display:flex;align-items:center;justify-content:center;color:#888;font-size:13px;text-align:center;padding:20px">No GPS coordinates yet — enter lat/lon on the GPS page (or use the baseline calculator) and this site map draws itself.<br>You can still upload a site photo on the Report page to use instead.</div>`;
  const lat0=pts.reduce((a,p)=>a+p.lat,0)/pts.length;
  const lon0=pts.reduce((a,p)=>a+p.lon,0)/pts.length;
  const cfg=D.siteMap||{};
  const sat=String(cfg.mode||'Satellite').toLowerCase()==='satellite';
  /* ---------- SATELLITE: real aerial tiles, markers projected on top ---------- */
  if(sat){
    const src=SAT_SOURCES[cfg.source]||SAT_SOURCES['Esri World Imagery'];
    /* metre offsets only used to size the auto zoom */
    const MLAT=110540, MLON=111320*Math.cos(lat0*Math.PI/180);
    const mpts=pts.map(p=>({...p,mx:(p.lon-lon0)*MLON,my:(p.lat-lat0)*MLAT}));
    let z=num(cfg.zoom);
    if(!isFinite(z)||z<1)z=autoZoom(mpts,lat0,W,src.max);
    z=Math.max(1,Math.min(src.max,Math.round(z)));
    const c=worldPx(lat0,lon0,z), ox=c.x-W/2, oy=c.y-H/2, n=Math.pow(2,z);
    let tiles='';
    for(let tx=Math.floor(ox/TILE);tx<=Math.floor((ox+W)/TILE);tx++){
      for(let ty=Math.floor(oy/TILE);ty<=Math.floor((oy+H)/TILE);ty++){
        if(ty<0||ty>=n)continue;
        const wx=((tx%n)+n)%n;                       // wrap at the date line
        const u=src.url(z,wx,ty);
        tiles+=`<image href="${esc(u)}" xlink:href="${esc(u)}" x="${(tx*TILE-ox).toFixed(1)}" y="${(ty*TILE-oy).toFixed(1)}" width="${TILE}" height="${TILE}" preserveAspectRatio="none"/>`;
      }
    }
    const SX=p=>worldPx(p.lat,p.lon,z).x-ox, SY=p=>worldPx(p.lat,p.lon,z).y-oy;
    let s=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img">`;
    s+=`<rect x="0" y="0" width="${W}" height="${H}" fill="#2b3a2b"/>`;   // shows if tiles are offline
    s+=tiles;
    /* pipe alignment through the points, in Ref-ft order */
    if(String(cfg.showLine||'Yes').toLowerCase()==='yes'){
      const line=[...pts].sort((a,b)=>(isFinite(a.ref)?a.ref:0)-(isFinite(b.ref)?b.ref:0));
      if(line.length>1){
        const d=line.map((p,i)=>`${i?'L':'M'}${SX(p).toFixed(1)},${SY(p).toFixed(1)}`).join(' ');
        s+=`<path d="${d}" stroke="#111" stroke-width="7" fill="none" stroke-linecap="round" opacity=".55"/>`;
        s+=`<path d="${d}" stroke="#ff8c1a" stroke-width="4" fill="none" stroke-linecap="round"/>`;
      }
    }
    /* markers */
    const mr=Math.max(1.5,num(cfg.markerSize)||4.5);
    pts.forEach(p=>{
      const x=SX(p), y=SY(p), ref=isRefPt(p);
      s+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${(ref?mr*1.35:mr).toFixed(1)}" fill="${ref?'#e11':'#1e90ff'}" stroke="#fff" stroke-width="1.6"/>`;
    });
    /* callouts — only the chosen points, laid out so they never overlap */
    const fs=Math.max(6,num(cfg.labelSize)||10.5);
    const items=labelledPoints(pts,cfg.labels||'All points')
      .map(p=>({x:SX(p),y:SY(p),text:labelTextOf(p,cfg.labelText||'Label + description')}))
      .filter(i=>i.text);
    placeLabels(items,W,H,fs).forEach(it=>{
      const ax=it.flip?it.lx+it.wpx+3:it.lx-3, ay=it.ly-fs*0.35;
      s+=`<path d="M${it.x.toFixed(1)},${it.y.toFixed(1)} L${ax.toFixed(1)},${ay.toFixed(1)}" stroke="#000" stroke-width="2.4" opacity=".65"/>`;
      s+=`<path d="M${it.x.toFixed(1)},${it.y.toFixed(1)} L${ax.toFixed(1)},${ay.toFixed(1)}" stroke="#fff" stroke-width="1"/>`;
      s+=`<text x="${it.lx.toFixed(1)}" y="${it.ly.toFixed(1)}" font-size="${fs}" font-weight="600" fill="#fff" style="paint-order:stroke" stroke="#000" stroke-width="3.2">${rEsc(it.text)}</text>`;
    });
    /* dig-site callout arrow, in the operator's overview-map style */
    if(String(cfg.arrow||'Yes').toLowerCase()==='yes'){
      const ref=pts.find(p=>/ref/i.test(p.label))||pts[0];
      const ax=SX(ref), ay=SY(ref);
      s+=`<path d="M${ax.toFixed(1)},${(ay+86).toFixed(1)} L${ax.toFixed(1)},${(ay+20).toFixed(1)}" stroke="#ffe000" stroke-width="5"/>`;
      s+=`<path d="M${ax.toFixed(1)},${(ay+11).toFixed(1)} l-8,15 l16,0 Z" fill="#ffe000"/>`;
      const lbl=cfg.label||`Dig Site ${D.master.digSite||''}`.trim();
      s+=`<text x="${ax.toFixed(1)}" y="${(ay+104).toFixed(1)}" font-size="13" font-weight="700" text-anchor="middle" fill="#ffe000" style="paint-order:stroke" stroke="#000" stroke-width="3.5">${rEsc(lbl)}</text>`;
    }
    /* north arrow */
    if(String(cfg.showNorth||'Yes').toLowerCase()==='yes')
      s+=`<g transform="translate(${W-46},40)"><path d="M0,-24 L7,9 L0,3 L-7,9 Z" fill="#fff" stroke="#000" stroke-width="1"/>
        <text x="0" y="25" font-size="13" font-weight="700" text-anchor="middle" fill="#fff" style="paint-order:stroke" stroke="#000" stroke-width="3">N</text></g>`;
    /* scale bar sized off true ground resolution */
    const mpp=metresPerPx(lat0,z);
    if(String(cfg.showScale||'Yes').toLowerCase()==='yes'){
      const target=(W/5)*mpp;
      const nice=[1,2,5,10,20,25,50,100,200,500,1000];
      const mBar=nice.reduce((a,b)=>Math.abs(b-target)<Math.abs(a-target)?b:a,nice[0]);
      const barPx=mBar/mpp, ftBar=Math.round(mBar*3.28084);
      s+=`<g transform="translate(24,${H-30})">
        <rect x="-4" y="-13" width="${(barPx+90).toFixed(0)}" height="30" fill="#000" opacity=".45" rx="3"/>
        <rect x="0" y="0" width="${barPx.toFixed(1)}" height="6" fill="#fff" stroke="#000"/>
        <rect x="0" y="0" width="${(barPx/2).toFixed(1)}" height="6" fill="#000"/>
        <text x="${(barPx+6).toFixed(1)}" y="6" font-size="10" fill="#fff">${mBar} m / ${ftBar} ft</text></g>`;
    }
    /* provider attribution (required by the imagery terms) */
    s+=`<text x="${W-6}" y="${H-6}" font-size="8" text-anchor="end" fill="#fff" style="paint-order:stroke" stroke="#000" stroke-width="2.5">${rEsc(src.attr)}</text>`;
    if(String(cfg.showCaption||'Yes').toLowerCase()==='yes')
      s+=`<text x="6" y="14" font-size="9" fill="#fff" style="paint-order:stroke" stroke="#000" stroke-width="2.5">${lat0.toFixed(6)}, ${lon0.toFixed(6)} · zoom ${z} · ${mpp.toFixed(2)} m/px</text>`;
    s+='</svg>';
    return s;
  }
  /* ---------- SCHEMATIC: offline plan view (no imagery required) ---------- */
  const M_PER_DEG_LAT=110540, M_PER_DEG_LON=111320*Math.cos(lat0*Math.PI/180);
  const xy=pts.map(p=>({...p,
    mx:(p.lon-lon0)*M_PER_DEG_LON,
    my:(p.lat-lat0)*M_PER_DEG_LAT}));
  const xs=xy.map(p=>p.mx), ys=xy.map(p=>p.my);
  let spanX=Math.max(...xs)-Math.min(...xs), spanY=Math.max(...ys)-Math.min(...ys);
  if(spanX<1&&spanY<1){spanX=spanY=10;}            // all points ~coincident
  const availW=W-PAD*2, availH=H-PAD*2;
  const scale=Math.min(availW/(spanX||1),availH/(spanY||1))*0.86;   // px per metre
  const cx0=(Math.max(...xs)+Math.min(...xs))/2, cy0=(Math.max(...ys)+Math.min(...ys))/2;
  const SX=mx=>W/2+(mx-cx0)*scale, SY=my=>H/2-(my-cy0)*scale;       // y flips: north = up
  let s=svgOpen(W,H);
  s+=`<rect x="0" y="0" width="${W}" height="${H}" fill="#f4f2ec" stroke="#000"/>`;
  /* faint grid */
  for(let g=0;g<=10;g++){
    s+=`<line x1="${g*W/10}" y1="0" x2="${g*W/10}" y2="${H}" stroke="#e0dccf" stroke-width=".7"/>`;
    s+=`<line x1="0" y1="${g*H/10}" x2="${W}" y2="${g*H/10}" stroke="#e0dccf" stroke-width=".7"/>`;
  }
  /* pipe alignment: connect points in Ref-ft order (fall back to input order) */
  const line=[...xy].sort((a,b)=>(isFinite(a.ref)?a.ref:0)-(isFinite(b.ref)?b.ref:0));
  if(line.length>1){
    const d=line.map((p,i)=>`${i?'L':'M'}${SX(p.mx).toFixed(1)},${SY(p.my).toFixed(1)}`).join(' ');
    s+=`<path d="${d}" fill="none" stroke="#e8890c" stroke-width="7" stroke-linecap="round" opacity=".9"/>`;
    s+=`<path d="${d}" fill="none" stroke="#7a4a08" stroke-width="1.2" stroke-dasharray="5 4"/>`;
  }
  /* markers */
  const smr=Math.max(1.5,num(cfg.markerSize)||5);
  xy.forEach(p=>{
    const x=SX(p.mx), y=SY(p.my), ref=isRefPt(p);
    s+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${(ref?smr*1.4:smr).toFixed(1)}" fill="${ref?'#c00':'#1f4e79'}" stroke="#fff" stroke-width="1.6"/>`;
  });
  /* callouts, laid out clear of one another */
  const sfs=Math.max(6,num(cfg.labelSize)||11);
  const sitems=labelledPoints(xy,cfg.labels||'All points')
    .map(p=>({x:SX(p.mx),y:SY(p.my),text:labelTextOf(p,cfg.labelText||'Label + description')+(isFinite(p.ref)?`  (${p.ref}′)`:'')}))
    .filter(i=>i.text.trim());
  placeLabels(sitems,W,H,sfs).forEach(it=>{
    const ax=it.flip?it.lx+it.wpx+3:it.lx-3, ay=it.ly-sfs*0.35;
    s+=`<path d="M${it.x.toFixed(1)},${it.y.toFixed(1)} L${ax.toFixed(1)},${ay.toFixed(1)}" stroke="#888" stroke-width="1"/>`;
    s+=`<text x="${it.lx.toFixed(1)}" y="${it.ly.toFixed(1)}" font-size="${sfs}" font-weight="600" style="paint-order:stroke" stroke="#f4f2ec" stroke-width="3.5" fill="#111">${rEsc(it.text)}</text>`;
  });
  /* north arrow */
  s+=`<g transform="translate(${W-52},42)">
      <path d="M0,-26 L8,10 L0,3 L-8,10 Z" fill="#111"/>
      <text x="0" y="26" font-size="13" font-weight="700" text-anchor="middle">N</text></g>`;
  /* scale bar — pick a round distance that fits ~1/5 of the width */
  const target=(availW/5)/scale;                                   // metres
  const nice=[1,2,5,10,20,25,50,100,200,500,1000];
  const mBar=nice.reduce((a,b)=>Math.abs(b-target)<Math.abs(a-target)?b:a,nice[0]);
  const barPx=mBar*scale, ftBar=Math.round(mBar*3.28084);
  s+=`<g transform="translate(${PAD-24},${H-30})">
      <rect x="0" y="0" width="${barPx.toFixed(1)}" height="7" fill="#111"/>
      <rect x="0" y="0" width="${(barPx/2).toFixed(1)}" height="7" fill="#fff" stroke="#111" stroke-width="1"/>
      <text x="0" y="21" font-size="10">0</text>
      <text x="${barPx.toFixed(1)}" y="21" font-size="10" text-anchor="middle">${mBar} m / ${ftBar} ft</text></g>`;
  /* centre coordinate caption */
  s+=`<text x="${PAD-24}" y="26" font-size="10" fill="#444">Plan view generated from collected GPS · centre ${lat0.toFixed(6)}, ${lon0.toFixed(6)} · north up, true to scale</text>`;
  s+='</svg>';
  return s;
}

/* ---- GPS baseline projection ---- */
function calcGPSFromBaseline(){
  const b=D.gps.baseline;
  const A=D.gps.rows.find(r=>r.label===b.ptA), B=D.gps.rows.find(r=>r.label===b.ptB);
  if(!A||!B){alert('Pick both baseline points first.');return;}
  const latA=num(A.lat), lonA=num(A.lon), latB=num(B.lat), lonB=num(B.lon), dist=num(b.distFt);
  if(!isFinite(latA)||!isFinite(lonA)){alert('Point A needs a latitude and longitude entered first.');return;}
  if(!isFinite(latB)||!isFinite(lonB)){
    /* only A has coordinates: project B and everything else purely from ref-ft along an assumed bearing of 0 (north) unless both have coords */
  }
  if(!isFinite(dist)||dist<=0){alert('Enter the real surveyed distance between A and B.');return;}
  const refA=num(A.refFt), refB=num(B.refFt);
  if(!isFinite(refA)||!isFinite(refB)){alert('Both baseline points need a Ref ft value.');return;}
  const ftSpan=Math.abs(refB-refA)||1;
  let dLat,dLon;
  if(isFinite(latB)&&isFinite(lonB)){
    dLat=(latB-latA)/ftSpan; dLon=(lonB-lonA)/ftSpan;
  } else {
    /* fall back: treat pipe as running due north, 1 ft = 1/364000 deg lat (approx at mid-latitudes) */
    dLat=(refB>refA?1:-1)/364000; dLon=0;
  }
  const sign=refB>=refA?1:-1;
  D.gps.rows.forEach(r=>{
    if(r.label===b.ptA||r.label===b.ptB)return;
    const ref=num(r.refFt); if(!isFinite(ref))return;
    const d=ref-refA;
    r.lat=String(Math.round((latA+dLat*d)*1e8)/1e8);
    r.lon=String(Math.round((lonA+dLon*d)*1e8)/1e8);
  });
  renderTable('gps'); refresh('gps');
  alert('Projected coordinates for all rows with a Ref ft value (A and B left as entered).');
}
/* ---- GPS diagram: reuse H3 elevation drawing, overlay GPS labels at their ref-ft position ---- */
/* GPS callouts over the H3 drawing. The old version stacked them at fixed
   offsets by index (i%2 up/down, i%3 for a step), which overlapped and crossed
   as soon as two points sat near each other — the same failure the indication
   map had, so it gets the same fix. Each label can then be nudged by hand and
   the nudge is remembered on the row. */
function gpsOverlay(base,PIPE_Y,X,bounds,forReport){
  const rows=D.gps.rows.map((r,i)=>({r,i,x:X(num(r.refFt))})).filter(o=>isFinite(num(o.r.refFt))&&o.r.label);
  if(!rows.length)return base;
  const nodes=rows.map(o=>({box:{x:o.x-2,y:PIPE_Y-14,w:4,h:28},text:o.r.label}));
  const labs=layoutMapLabels(nodes,nodes.map(n=>n.box),bounds);
  let ov='';
  labs.forEach((l,k)=>{
    const o=rows[k];
    /* a hand nudge is stored on the row, so it survives a redraw and a reload */
    l.x+=num(o.r.ldx)||0; l.y+=num(o.r.ldy)||0;
    const a=boxAnchor(nodes[k].box,l), e=labelEdge(l,a.x,a.y);
    ov+=`<line x1="${e.x.toFixed(1)}" y1="${e.y.toFixed(1)}" x2="${o.x.toFixed(1)}" y2="${PIPE_Y}" stroke="#0a7a3e" stroke-width="1" stroke-dasharray="2 2"/>`;
    ov+=`<circle cx="${o.x.toFixed(1)}" cy="${PIPE_Y}" r="3" fill="#0a7a3e"/>`;
    ov+=`<g${forReport?'':` data-gpsdrag="${o.i}" style="cursor:grab"`}>`
      +`<rect x="${l.x.toFixed(1)}" y="${l.y.toFixed(1)}" width="${l.w.toFixed(1)}" height="${l.h.toFixed(1)}" rx="1.5" fill="#fff" fill-opacity=".95" stroke="#0a7a3e" stroke-width=".6"/>`
      +`<text x="${(l.x+l.w/2).toFixed(1)}" y="${(l.y+7.4).toFixed(1)}" font-size="8" font-weight="700" text-anchor="middle" fill="#0a7a3e">${rEsc(o.r.label)}</text></g>`;
  });
  return base.replace('</svg>',ov+'</svg>');
}
function gpsDiagramSVG(forReport){
  const m=D.master;
  const secs=D.sections.filter(s2=>isFinite(num(s2.start)));
  const a0=isFinite(num(m.assessStart))?num(m.assessStart):(secs.length?Math.min(...secs.map(s2=>num(s2.start))):0);
  const aEnd=[...secs.map(s2=>num(s2.end)),num(m.assessEnd)].filter(isFinite);
  const a1=aEnd.length?Math.max(...aEnd):a0+10;
  const W=940,L=90,R=170,PIPE_Y=250;
  const X=v=>L+((v-a0)/((a1-a0)||1))*(W-L-R);
  return gpsOverlay(h3DiagramSVG(forReport),PIPE_Y,X,{x:L,y:96,w:W-L-R,h:300},forReport);
}

function gpsPlanSVG(forReport){
