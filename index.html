  <linearGradient id="fitmetalD" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0" stop-color="#a0a0a5"/><stop offset=".5" stop-color="#d7d7dc"/><stop offset="1" stop-color="#a0a0a5"/></linearGradient></defs>`;
const FIT_STYLE='fill="url(#fitmetal)" stroke="#50505a" stroke-width="1.5"';
/* returns {w,h,cy,body} — body is SVG markup in local coords, cy = pipe centerline y */
function fittingGeometry(type,p,ppi){
  const P=Math.PI;
  if(type==='reducer'){
    /* exact port of UpdateReducerShape: 15% stubs, cubic taper w/ cp at x1+0.45*body */
    const totalW=p.len*ppi, largeH=p.largeDia*ppi, smallH=p.smallDia*ppi;
    const stub=totalW*0.15, body=totalW-2*stub;
    const cy=largeH/2;
    const x0=0,x1=stub,x2=stub+body,x3=totalW;
    const lT=cy-largeH/2,lB=cy+largeH/2,sT=cy-smallH/2,sB=cy+smallH/2;
    const cpX=x1+body*0.45;
    const d=`M${x0},${lT} L${x1},${lT} C${cpX},${lT} ${cpX},${sT} ${x2},${sT} L${x3},${sT} L${x3},${sB} L${x2},${sB} C${cpX},${sB} ${cpX},${lB} ${x1},${lB} L${x0},${lB} Z`;
    return {w:totalW,h:largeH,cy,body:`<path d="${d}" ${FIT_STYLE}/>`};
  }
  if(type==='elbow'){
    /* exact port of UpdateElbowShape: annulus polyline sweep, start -90°, 36 steps */
    const outerR=(p.bendR+p.pipeDia/2)*ppi, innerR=(p.bendR-p.pipeDia/2)*ppi;
    if(innerR<=0)return {w:10,h:10,cy:5,body:''};
    const aRad=p.angle*P/180, a0=-P/2, steps=36;
    const cx=outerR+4, cy0=outerR+4;
    const pt=(r,a)=>[cx+r*Math.cos(a),cy0+r*Math.sin(a)];
    let pts=[pt(outerR,a0),pt(innerR,a0)];
    for(let k=1;k<=steps;k++)pts.push(pt(innerR,a0+aRad*k/steps));
    pts.push(pt(outerR,a0+aRad));
    for(let k=steps-1;k>=0;k--)pts.push(pt(outerR,a0+aRad*k/steps));
    const xs=pts.map(q=>q[0]),ys=pts.map(q=>q[1]);
    const mnx=Math.min(...xs),mny=Math.min(...ys);
    const d='M'+pts.map(q=>`${(q[0]-mnx).toFixed(2)},${(q[1]-mny).toFixed(2)}`).join(' L')+' Z';
    /* inlet centerline (pointing down from start at -90°, i.e. left end top) sits at bend-radius from center */
    return {w:Math.max(...xs)-mnx,h:Math.max(...ys)-mny,cy:(cy0-mny)-p.bendR*ppi+p.bendR*ppi, cy:(cy0-mny),body:`<path d="${d}" fill="url(#fitmetalD)" stroke="#50505a" stroke-width="1.5"/>`};
  }
  if(type==='tee'){
    /* exact port of UpdateTeeShape: run stubs 1.2×runDia, quarter fillets 20 steps */
    const rD=p.runDia*ppi,bD=p.branchDia*ppi,cr=p.cornerR*ppi;
    const stubRun=rD*1.2,stubBr=bD*1.2;
    const ox=4,oy=4;
    const bLX=ox+stubRun+(rD-bD)/2,bRX=bLX+bD;
    const rTY=oy+stubBr,rBY=rTY+rD,rLX=ox,rRX=ox+stubRun+rD+stubRun,bTY=oy;
    const steps=20;let pts=[[bLX,bTY],[bRX,bTY],[bRX,rTY-cr]];
    for(let k=1;k<=steps;k++){const a=P-(P/2)*k/steps;pts.push([(bRX+cr)+cr*Math.cos(a),(rTY-cr)+cr*Math.sin(a)]);}
    pts.push([rRX,rTY],[rRX,rBY],[rLX,rBY],[rLX,rTY],[bLX-cr,rTY]);
    for(let k=1;k<=steps;k++){const a=(P/2)-(P/2)*k/steps;pts.push([(bLX-cr)+cr*Math.cos(a),(rTY-cr)+cr*Math.sin(a)]);}
    const d='M'+pts.map(q=>`${q[0].toFixed(2)},${q[1].toFixed(2)}`).join(' L')+' Z';
    return {w:rRX+4,h:rBY+4,cy:rTY+rD/2,body:`<path d="${d}" fill="url(#fitmetalD)" stroke="#50505a" stroke-width="1.5"/>`};
  }
  if(type==='flange'){
    const od=p.pipeOD*ppi,fod=p.flangeOD*ppi,thk=p.thk*ppi,hub=p.hub*ppi;
    const stub=od*0.9, cy=fod/2, W=stub+hub+thk+4;
    let b=`<rect x="0" y="${cy-od/2}" width="${stub}" height="${od}" ${FIT_STYLE}/>`;
    b+=`<polygon points="${stub},${cy-od/2} ${stub+hub},${cy-od*0.68} ${stub+hub},${cy+od*0.68} ${stub},${cy+od/2}" ${FIT_STYLE}/>`;
    b+=`<rect x="${stub+hub}" y="${cy-fod/2}" width="${thk}" height="${fod}" ${FIT_STYLE}/>`;
    b+=`<line x1="${stub+hub+thk/2}" y1="${cy-fod/2+3}" x2="${stub+hub+thk/2}" y2="${cy+fod/2-3}" stroke="#6a6a74" stroke-dasharray="3 3"/>`;
    return {w:W,h:fod,cy,body:b};
  }
  if(type==='gate'){
    const od=p.pipeOD*ppi,bl=p.bodyLen*ppi,bh=p.bodyH*ppi,st=p.stem*ppi;
    const stub=od*0.9,cy=st+bh/2,W=stub*2+bl;
    let b=`<rect x="0" y="${cy-od/2}" width="${stub}" height="${od}" ${FIT_STYLE}/>`;
    b+=`<rect x="${stub+bl}" y="${cy-od/2}" width="${stub}" height="${od}" ${FIT_STYLE}/>`;
    b+=`<polygon points="${stub},${cy-bh/2} ${stub+bl},${cy-bh/2} ${stub+bl*0.5+od*0.35},${cy} ${stub+bl},${cy+bh/2} ${stub},${cy+bh/2} ${stub+bl*0.5-od*0.35},${cy}" ${FIT_STYLE}/>`;
    b+=`<rect x="${stub+bl/2-2}" y="${cy-bh/2-st}" width="4" height="${st}" fill="#8a8a94" stroke="#50505a"/>`;
    b+=`<ellipse cx="${stub+bl/2}" cy="${cy-bh/2-st}" rx="${od*0.55}" ry="3.5" fill="none" stroke="#50505a" stroke-width="2"/>`;
    return {w:W,h:st+bh,cy,body:b};
  }
  if(type==='ball'){
    const od=p.pipeOD*ppi,bl=Math.max(p.bodyLen*ppi,od*1.1);
    const stub=od*0.8,cy=od*0.75+od/2,W=stub*2+bl;
    let b=`<rect x="0" y="${cy-od/2}" width="${stub}" height="${od}" ${FIT_STYLE}/>`;
    b+=`<rect x="${stub+bl}" y="${cy-od/2}" width="${stub}" height="${od}" ${FIT_STYLE}/>`;
    b+=`<rect x="${stub}" y="${cy-od*0.62}" width="${bl}" height="${od*1.24}" rx="${od*0.3}" ${FIT_STYLE}/>`;
    b+=`<circle cx="${stub+bl/2}" cy="${cy}" r="${od*0.4}" fill="#c4c4c9" stroke="#50505a"/>`;
    b+=`<rect x="${stub+bl/2-2}" y="${cy-od*0.62-8}" width="4" height="8" fill="#8a8a94" stroke="#50505a"/>`;
    b+=`<rect x="${stub+bl/2-2}" y="${cy-od*0.62-12}" width="${od*0.9}" height="5" rx="2" fill="#b33" stroke="#50505a"/>`;
    return {w:W,h:od*0.75+od*1.24,cy,body:b};
  }
  return {w:10,h:10,cy:5,body:''};
}
function fittingPreviewSVG(type,p){
  const g=fittingGeometry(type,p,10);
  const pad=10, W=g.w+pad*2, H=g.h+pad*2;
  return `<svg viewBox="0 0 ${W} ${H}" style="max-width:100%;max-height:260px" xmlns="http://www.w3.org/2000/svg">${FIT_GRAD}
    <g transform="translate(${pad},${pad})">${g.body}
    <line x1="-6" y1="${g.cy}" x2="${g.w+6}" y2="${g.cy}" stroke="#c00000" stroke-width=".8" stroke-dasharray="8 3 2 3"/></g></svg>`;
}
function renderFittingMaker(){
  const host=$('#fitmaker'); if(!host)return;
  const t=FIT_TYPES[FM.type];
  if(!Object.keys(FM.p).length)FM.p=fmDefaults(FM.type);
  host.innerHTML=`
    <div class="fgrid">
      <div class="fld"><label>Fitting type</label>
        <select id="fm-type">${Object.entries(FIT_TYPES).map(([k,v])=>`<option value="${k}"${k===FM.type?' selected':''}>${v.name}</option>`).join('')}</select></div>
      ${t.params.map(([k,label])=>`<div class="fld"><label>${label}</label><input type="number" step="any" data-fm="${k}" value="${FM.p[k]}"></div>`).join('')}
      <div class="fld"><label>Fitting name (for library)</label><input id="fm-name" value="${esc(FM.name||t.name)}" placeholder="${t.name}"></div>
    </div>
    <div class="mapbox" id="fm-preview" style="margin-top:10px;text-align:center;background:#fbfcfd">${fittingPreviewSVG(FM.type,FM.p)}</div>
    <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="tb-btn pri" id="fm-save">💾 Save to library</button>
      <button class="tb-btn" id="fm-add">⇩ Save & add to drawing</button>
    </div>
    <div id="fm-lib" style="margin-top:14px">${fmLibHTML()}</div>`;
}
function fmLibHTML(){
  if(!D.fittings.length)return '<p style="font-size:.78rem;color:var(--ink3)">Library is empty — saved fittings appear here and can be placed on the drawing as <b>fitting</b> elements (the element Label = fitting name).</p>';
  return `<table class="dt"><thead><tr><th>Name</th><th>Type</th><th>Parameters</th><th style="width:150px"></th></tr></thead><tbody>${
    D.fittings.map((f,i)=>`<tr><td><b>${esc(f.name)}</b></td><td>${FIT_TYPES[f.type]?.name||f.type}</td>
      <td style="font-family:var(--mono);font-size:.68rem">${Object.entries(f.p).map(([k,v])=>k+'='+v).join(' · ')}</td>
      <td><button class="tb-btn" data-fmedit="${i}">edit</button> <button class="tb-btn" data-fmplace="${i}">place</button> <button class="del" data-fmdel="${i}">✕</button></td></tr>`).join('')
  }</tbody></table>`;
}
function fittingNaturalLen(f){
  const p=f.p;
  const inches=f.type==='reducer'?p.len
    :f.type==='gate'?p.bodyLen+2*p.pipeOD*0.9
    :f.type==='ball'?Math.max(p.bodyLen,p.pipeOD*1.1)+2*p.pipeOD*0.8
    :f.type==='flange'?p.hub+p.thk+p.pipeOD*0.9
    :f.type==='tee'?p.runDia*3.4
    :p.bendR+p.pipeDia/2+0.8; /* elbow footprint */
  return inches/12;
}
function placeFitting(f){
  if(!f)return;
  const ends=D.profile.elems.map(e=>num(e.end)).filter(isFinite);
  const secs=D.sections.map(s2=>num(s2.end)).filter(isFinite);
  const at=ends.length?Math.max(...ends):(secs.length?Math.max(...secs)/2:2);
  D.profile.elems.push({kind:'fitting',start:String(Math.round(at*100)/100),
    end:String(Math.round((at+fittingNaturalLen(f))*100)/100),size:'large',pos:'above',label:f.name});
  if(D.profile.layoutMode!=='manual'){D.profile.layoutMode='manual';const lm=$('select[data-p="profile.layoutMode"]');if(lm)lm.value='manual';toggleH3Manual();}
  renderTable('h3elems'); redrawH3();
}
function fmSave(alsoPlace){
  const name=(($('#fm-name')?.value)||FM.name||'').trim()||FIT_TYPES[FM.type].name;
  const existing=D.fittings.findIndex(f=>f.name===name);
  const entry={name,type:FM.type,p:{...FM.p}};
  if(existing>=0)D.fittings[existing]=entry; else D.fittings.push(entry);
  FM.name=name;
  if(alsoPlace)placeFitting(entry);
  renderFittingMaker();
}

/* ============================================================
   PLAN VIEW + FULL FORM-H PRINT PAGES (order matches deliverable)
   ============================================================ */
function h3PlanSVG(forReport){
  const m=D.master,p=D.profile;
  const secs=D.sections.filter(s2=>isFinite(num(s2.start)));
  const a0=isFinite(num(m.assessStart))?num(m.assessStart):(secs.length?Math.min(...secs.map(s2=>num(s2.start))):0);
  const aEnd=[...secs.map(s2=>num(s2.end)),num(m.assessEnd)].filter(isFinite);
  const a1=aEnd.length?Math.max(...aEnd):a0+10;
  const W=940,H=380,L=90,R=170,CY=185;
  const X=v=>L+((v-a0)/((a1-a0)||1))*(W-L-R);
  const dia=num(m.diameter)||12, band=Math.max(Math.min(dia*2.2,42),18);
  let s=svgOpen(W,H).replace('<svg ','<svg data-h3scale="'+((a1-a0)/(W-L-R))+'" ')+FIT_GRAD;
  s+=`<text x="${(L+W-R)/2}" y="20" font-size="13" font-weight="bold" text-anchor="middle" letter-spacing="1">PLAN VIEW — LOOKING DOWN</text>`;
  s+=`<g transform="translate(${L-56},34)"><text x="0" y="0" font-size="13" font-weight="bold">N</text><path d="M10,22 L16,2 L22,22 L16,15 Z" fill="#000"/></g>`;
  /* excavation boundary */
  s+=`<rect x="${L-20}" y="60" width="${W-L-R+40}" height="${H-130}" fill="#efe9d8" stroke="#8a6b3f" stroke-width="1.4" stroke-dasharray="8 5"/>`;
  s+=`<text x="${L-14}" y="74" font-size="8.5" fill="#8a6b3f">EXCAVATION LIMITS</text>`;
  /* pipe band */
  const bandRect=(xa,xb,w2)=>`<rect x="${xa}" y="${CY-w2/2}" width="${Math.max(xb-xa,3)}" height="${w2}" fill="url(#fitmetal)" stroke="#50505a" stroke-width="1.2"/>`;
  const manual=p.layoutMode==='manual'&&p.elems.length>0;
  const drawPlan=(kind,xa,xb,size,pos,i,label)=>{
    const w2=size==='small'?band*0.62:band;
    const drag=manual&&i!==undefined&&!forReport?` data-drag="${i}" style="cursor:grab"`:'';
    if(kind==='reducer')
      return `<polygon${drag} points="${xa},${CY-band/2} ${xb},${CY-band*0.31} ${xb},${CY+band*0.31} ${xa},${CY+band/2}" fill="url(#fitmetal)" stroke="#50505a" stroke-width="1.2"/>`;
    if(kind==='valve'){const cx=(xa+xb)/2;
      return `<g${drag}>${bandRect(xa,xb,w2*0.5)}<polygon points="${xa},${CY-w2*0.8} ${cx},${CY} ${xa},${CY+w2*0.8}" fill="#9aa" stroke="#556"/><polygon points="${xb},${CY-w2*0.8} ${cx},${CY} ${xb},${CY+w2*0.8}" fill="#9aa" stroke="#556"/></g>`;}
    if(kind==='elbow'){ /* quarter-bend band turning toward pos */
      const up=pos!=='below', r0=Math.max(xb-xa,band), sweep=up?0:1;
      const yEnd=up?CY-r0:CY+r0;
      return `<g${drag}><path d="M${xa},${CY-w2/2} A${r0-w2/2},${r0-w2/2} 0 0 ${sweep} ${xa+r0-w2/2},${up?yEnd+0:yEnd} L${xa+r0+w2/2>xb?xb:xa+r0+w2/2},${yEnd} A${r0+w2/2},${r0+w2/2} 0 0 ${1-sweep} ${xa},${CY+w2/2} Z" fill="url(#fitmetal)" stroke="#50505a" stroke-width="1.2"/></g>`;}
    if(kind==='coated')return `<rect${drag} x="${xa}" y="${CY-w2/2}" width="${Math.max(xb-xa,6)}" height="${w2}" fill="#5b3a29"/>`;
    if(kind==='fitting'){
      const f=D.fittings.find(x=>x.name===label);
      if(!f)return '';
      if(f.type==='tee'){const up=pos!=='below',bw=Math.max((xb-xa)*0.4,10);
        return `<g${drag}>${bandRect(xa,xb,w2)}<rect x="${(xa+xb)/2-bw/2}" y="${up?CY-w2/2-band*1.1:CY+w2/2}" width="${bw}" height="${band*1.1}" fill="url(#fitmetal)" stroke="#50505a" stroke-width="1.2"/></g>`;}
      if(f.type==='ball'){const cx=(xa+xb)/2;
        return `<g${drag}>${bandRect(xa,xb,w2*0.6)}<circle cx="${cx}" cy="${CY}" r="${w2*0.75}" fill="url(#fitmetalD)" stroke="#50505a" stroke-width="1.2"/><rect x="${cx-2}" y="${CY-w2*0.75-10}" width="4" height="10" fill="#8a8a94"/><rect x="${cx-2}" y="${CY-w2*0.75-14}" width="${w2*1.1}" height="5" rx="2" fill="#b33"/></g>`;}
      if(f.type==='gate')return drawPlan('valve',xa,xb,size,pos,undefined,label).replace('<g>',`<g${drag}>`);
      if(f.type==='flange'){return `<g${drag}>${bandRect(xa,xb,w2*0.6)}<rect x="${xb-4}" y="${CY-w2}" width="4" height="${w2*2}" fill="url(#fitmetal)" stroke="#50505a"/></g>`;}
      if(f.type==='reducer')return drawPlan('reducer',xa,xb,size,pos,undefined,label).replace('<polygon ',`<polygon${drag} `);
      if(f.type==='elbow')return drawPlan('elbow',xa,xb,size,pos,undefined,label).replace('<g>',`<g${drag}>`);
      return bandRect(xa,xb,w2);
    }
    return `<g${drag}>${bandRect(xa,xb,w2)}<line x1="${xa}" y1="${CY}" x2="${xb}" y2="${CY}" stroke="#7d7d86" stroke-width=".7" stroke-dasharray="6 4"/></g>`;
  };
  const gwTick=(g,i,lab)=>`<line x1="${X(g)}" y1="${CY-band*0.9}" x2="${X(g)}" y2="${CY+band*0.9}" stroke="#333" stroke-width="2"/>`+
    `<text x="${X(g)}" y="${CY+band*0.9+12+((i%2)*11)}" font-size="9" text-anchor="middle" style="paint-order:stroke" stroke="#efe9d8" stroke-width="3">${rEsc(lab||('GW @ '+g.toFixed(2)+"'"))}</text>`;
  if(manual){
    p.elems.forEach((el2,i)=>{
      const st=num(el2.start); if(!isFinite(st))return;
      const en=isFinite(num(el2.end))?num(el2.end):st+0.5;
      if(el2.kind==='gw'){s+=gwTick(st,i,el2.label);return;}
      if(el2.kind==='label'){const up=el2.pos!=='below';
        s+=`<text x="${X(st)}" y="${up?CY-band-14-((i%3)*11):CY+band+22+((i%3)*11)}" font-size="10" text-anchor="middle" style="paint-order:stroke" stroke="#efe9d8" stroke-width="3">${rEsc(el2.label||'')}</text>`;return;}
      s+=drawPlan(el2.kind,X(st),X(en),el2.size,el2.pos,i,el2.label);
      if(el2.kind==='fitting')s+=`<text x="${(X(st)+X(en))/2}" y="${CY-band-6}" font-size="8" text-anchor="middle" style="paint-order:stroke" stroke="#efe9d8" stroke-width="3">${rEsc(el2.label)}</text>`;
    });
  } else {
    const comp=sec=>{const n2=(sec.notes||'').toLowerCase();
      return /elbow/.test(n2)?'elbow':/reducer/.test(n2)?'reducer':/valve/.test(n2)?'valve':'pipe';};
    secs.forEach(sec=>{s+=drawPlan(comp(sec),X(num(sec.start)),X(isFinite(num(sec.end))?num(sec.end):num(sec.start)+1),'large','above');});
    const gws=[...new Set(secs.map(sec=>num(sec.start)).filter(v=>isFinite(v)&&v>a0))];
    gws.forEach((g,i)=>{s+=gwTick(g,i);});
  }
  /* BPS/BPE + flow */
  s+=`<text x="${X(a0)}" y="${CY-band-18}" font-size="9" font-weight="bold" text-anchor="middle">BPS</text>`;
  s+=`<text x="${X(a1)}" y="${CY-band-18}" font-size="9" font-weight="bold" text-anchor="middle">BPE</text>`;
  s+=`<text x="${(L+W-R)/2-60}" y="${H-38}" font-size="13" font-weight="600">${rEsc(p.flowFrom)}  Flow ⇨  ${rEsc(p.flowTo)}</text>`;
  s+=`<rect x="${L+40}" y="${H-30}" width="${W-L-R-80}" height="20" fill="#6b3a1f"/><text x="${(L+W-R)/2}" y="${H-16}" font-size="12" font-weight="bold" text-anchor="middle" fill="#f3c14b" letter-spacing="2">Drawing Not to Scale</text>`;
  let ly=70;
  secs.forEach((sec,i)=>{s+=`<text x="${W-R+22}" y="${ly}" font-size="8.6">Section ${i+1} Start: ${num(sec.start)}, ${rEsc((sec.notes||'').split(',').pop().trim()||'Pipe')}</text>`;ly+=12;});
  s+='</svg>';
  return s;
}
function renderH3Views(){
  const el=$('#h3-diagram'); if(!el)return;
  const v=D.profile.view||'elevation';
  el.innerHTML=(v!=='plan'?h3DiagramSVG(false):'')+(v!=='elevation'?h3PlanSVG(false):'');
}
/* ---------- Form-H print pages 1-10 ---------- */
function rFormHdr(pg){
  const m=D.master;
  /* Sized for the portrait sheet (728px of content): labels never wrap, values
     flex down and ellipsis rather than pushing the 3rd column off the page. */
  const hv=(l,v)=>`<div style="display:flex;font-size:8.2px;align-items:baseline;gap:3px;min-width:0">`+
    `<b style="flex:0 0 auto;text-align:right;white-space:nowrap">${l}</b>`+
    `<span style="flex:1 1 auto;min-width:0;border-bottom:1px solid #000;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${rEsc(v||'NA')}</span></div>`;
  return `<div style="font-weight:700;font-size:12px">${rEsc(opFormName())}: Direct Examination Data Sheet - Page ${pg} of ${opPages()}</div>
    <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:2.5px 10px;margin:6px 0 8px">
      ${hv('Route Number:',m.lineNumber)+hv('Site Designation:',m.digSite)+hv('ILI Log Distance:',m.iliLogDist||'NA')}
      ${hv('Date of Excavation:',dLong(m.dExcavation))+hv('N-Segment:',m.nSegment||m.lineNumber)+hv('TD-4810P-11 Ref. Section:','NA')}

/* ---- Form-H checkbox helpers (reproduce the PDF's marked-box layout) ---- */
/* one checkbox option: rendered checked (✕) when its label is in the selected set */
function cbx(label,on,dot){
  return `<span class="cbx${on?' on':''}"><span class="bx${dot?' dot':''}"></span>${rEsc(label)}</span>`;
}
/* a row of checkbox options; sel may be an array (multi) or a string (single) */
function cbGroup(options,sel){
  const set=Array.isArray(sel)?sel.map(x=>String(x).toLowerCase().trim())
                              :[String(sel??'').toLowerCase().trim()];
  return options.map(o=>{
    const [val,shown]=Array.isArray(o)?o:[o,o];
    const on=set.includes(String(val).toLowerCase().trim());
    return cbx(shown,on);
  }).join('');
}
/* labelled line: number, bold label, then arbitrary value markup */
function hfLine(no,label,valHTML,narrow){
  return `<div class="hf-line"><span class="no">${no||''}</span><span class="lab${narrow?' narrow':''}">${label}</span><span class="val">${valHTML}</span></div>`;
}
/* Yes/No inline pair, marking whichever the value matches */
function ynBoxes(v){
  const s=String(v??'').toLowerCase();
  return cbx('Yes',s==='yes')+cbx('No',s==='no'||s===''&&false)+(s==='n/a'||s==='na'?cbx('N/A',true):'');
}
/* fill-in value with underline, PDF style */
function fillV(label,val){return `<span class="hf-fill"><b>${label}</b><span>${rEsc(val||'')||'&nbsp;'}</span></span>`;}

/* ---------- Site map labelling helpers ----------
   Bell-hole GPS points sit a few feet apart, so at any useful zoom their
   callouts overlap. These pick which points get labelled and then lay the
   labels out so they never collide, with leader lines back to each marker. */
const SITEMAP_LABEL_MODES=['All points','Extents + reference','Reference only','None'];
const SITEMAP_LABEL_TEXT=['Label + description','Label only','Description only'];
/* A point is the reference only if its LABEL says so (a description mentioning
   "center of assessment" must not turn a second marker red). */
const isRefPt=p=>/(^|[^a-z])ref([^a-z]|$)/i.test(p.label||'');
/* Which points get a callout, per the chosen mode */
function labelledPoints(pts,mode){
  if(mode==='None')return [];
  if(mode==='Reference only')return pts.filter(isRefPt);
  if(mode==='Extents + reference'){
    const withRef=pts.filter(p=>isFinite(p.ref));
    const sorted=[...(withRef.length?withRef:pts)].sort((a,b)=>(a.ref||0)-(b.ref||0));
    const keep=new Set([sorted[0],sorted[sorted.length-1]].filter(Boolean));
    pts.filter(isRefPt).forEach(p=>keep.add(p));
    return pts.filter(p=>keep.has(p));
  }
  return pts;
}
function labelTextOf(p,style){
  if(style==='Label only')return p.label||'';
  if(style==='Description only')return p.desc||p.label||'';
  return `${p.label}${p.desc?' — '+p.desc:''}`;
}
/* Greedy placement: try beside the marker, flip to the other side near the
   right edge, then step down until the box is clear of everything placed. */
function placeLabels(items,W,H,fs){
  const lh=fs*1.3, placed=[];
  const hits=r=>placed.some(p=>!(r.x+r.w<p.x||r.x>p.x+p.w||r.y+r.h<p.y||r.y>p.y+p.h));
  items.forEach(it=>{
    const wpx=Math.max(18,it.text.length*fs*0.56);
    let flip=(it.x+12+wpx)>(W-8);
    let lx=flip?it.x-12-wpx:it.x+12, ly=it.y-4;
    let guard=0;
    const rect=()=>({x:lx,y:ly-fs,w:wpx,h:lh});
    while(hits(rect())&&guard++<80)ly+=lh;
    if(ly>H-12){ ly=it.y-4; guard=0; while(hits(rect())&&guard++<80)ly-=lh; }
    ly=Math.max(fs+4,Math.min(H-6,ly));
    placed.push(rect());
    Object.assign(it,{lx,ly,wpx,flip});
  });
  return items;
}
/* ---------- Web Mercator helpers for the satellite site map ----------
   Standard slippy-map projection: world is TILE*2^z pixels square at zoom z. */
const TILE=256;
function worldPx(lat,lon,z){
  const n=TILE*Math.pow(2,z);
  const s=Math.max(-0.9999,Math.min(0.9999,Math.sin(lat*Math.PI/180)));
  return {x:(lon+180)/360*n, y:(0.5-Math.log((1+s)/(1-s))/(4*Math.PI))*n};
}
/* ground resolution (metres per pixel) at a latitude / zoom */
const metresPerPx=(lat,z)=>156543.03392*Math.cos(lat*Math.PI/180)/Math.pow(2,z);
/* Aerial tile providers. Both are keyless; Esri is the default because its
   imagery is higher resolution over most of the US. */
const SAT_SOURCES={
  'Esri World Imagery':{
    url:(z,x,y)=>`https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/${z}/${y}/${x}`,
    attr:'Imagery © Esri, Maxar, Earthstar Geographics, USDA FSA, USGS, Aerogrid, IGN, IGP', max:21},
  'USGS Imagery':{
    url:(z,x,y)=>`https://basemap.nationalmap.gov/arcgis/rest/services/USGSImageryOnly/MapServer/tile/${z}/${y}/${x}`,
    attr:'Imagery courtesy of the USGS National Map', max:19}
};
/* Zoom that frames the dig with useful surrounding context (~200 m across,
   matching the operator's overview map) while never exceeding the provider. */
function autoZoom(pts,lat0,W,maxZ){
  let span=25;
  if(pts.length>1){
    const xs=pts.map(p=>p.mx), ys=pts.map(p=>p.my);
    span=Math.max(Math.max(...xs)-Math.min(...xs), Math.max(...ys)-Math.min(...ys), 5);
  }
  const targetM=Math.max(span*8,180);              // metres to show across the view
  const z=Math.log2(156543.03392*Math.cos(lat0*Math.PI/180)/(targetM/W));
  return Math.max(12,Math.min(maxZ,Math.round(z)));
}
/* ---------- Site overview map generated from the collected GPS points ----------
   Projects lat/lon to a local plan view (equirectangular about the centroid),
   true to scale, with a north arrow and scale bar. Used on the Dig Location
   Overview Map page whenever no site image has been uploaded. */
function gpsSiteMapSVG(forReport){
  const pts=D.gps.rows
    .map(r=>({label:r.label||'',desc:r.desc||'',ref:num(r.refFt),lat:num(r.lat),lon:num(r.lon)}))
    .filter(p=>isFinite(p.lat)&&isFinite(p.lon)&&p.lat!==0&&p.lon!==0);
  const W=940,H=560,PAD=64;
  if(pts.length<1)
    return `<div style="border:1px solid #000;height:${forReport?560:420}px;display:flex;align-items:center;justify-content:center;color:#888;font-size:13px;text-align:center;padding:20px">No GPS coordinates yet — enter lat/lon on the GPS page (or use the baseline calculator) and this site map draws itself.<br>You can still upload a site photo on the Report page to use instead.</div>`;
  const lat0=pts.reduce((a,p)=>a+p.lat,0)/pts.length;
  const lon0=pts.reduce((a,p)=>a+p.lon,0)/pts.length;
  const cfg=D.siteMap||{};
  const sat=String(cfg.mode||'Satellite').toLowerCase()==='satellite';
  /* ---------- SATELLITE: real aerial tiles, markers projected on top ---------- */
  if(sat){
    const src=SAT_SOURCES[cfg.source]||SAT_SOURCES['Esri World Imagery'];
    /* metre offsets only used to size the auto zoom */
    const MLAT=110540, MLON=111320*Math.cos(lat0*Math.PI/180);
    const mpts=pts.map(p=>({...p,mx:(p.lon-lon0)*MLON,my:(p.lat-lat0)*MLAT}));
    let z=num(cfg.zoom);
    if(!isFinite(z)||z<1)z=autoZoom(mpts,lat0,W,src.max);
    z=Math.max(1,Math.min(src.max,Math.round(z)));
    const c=worldPx(lat0,lon0,z), ox=c.x-W/2, oy=c.y-H/2, n=Math.pow(2,z);
    let tiles='';
    for(let tx=Math.floor(ox/TILE);tx<=Math.floor((ox+W)/TILE);tx++){
      for(let ty=Math.floor(oy/TILE);ty<=Math.floor((oy+H)/TILE);ty++){
        if(ty<0||ty>=n)continue;
        const wx=((tx%n)+n)%n;                       // wrap at the date line
        const u=src.url(z,wx,ty);
        tiles+=`<image href="${esc(u)}" xlink:href="${esc(u)}" x="${(tx*TILE-ox).toFixed(1)}" y="${(ty*TILE-oy).toFixed(1)}" width="${TILE}" height="${TILE}" preserveAspectRatio="none"/>`;
      }
    }
    const SX=p=>worldPx(p.lat,p.lon,z).x-ox, SY=p=>worldPx(p.lat,p.lon,z).y-oy;
    let s=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img">`;
    s+=`<rect x="0" y="0" width="${W}" height="${H}" fill="#2b3a2b"/>`;   // shows if tiles are offline
    s+=tiles;
    /* pipe alignment through the points, in Ref-ft order */
    if(String(cfg.showLine||'Yes').toLowerCase()==='yes'){
      const line=[...pts].sort((a,b)=>(isFinite(a.ref)?a.ref:0)-(isFinite(b.ref)?b.ref:0));
      if(line.length>1){
        const d=line.map((p,i)=>`${i?'L':'M'}${SX(p).toFixed(1)},${SY(p).toFixed(1)}`).join(' ');
        s+=`<path d="${d}" stroke="#111" stroke-width="7" fill="none" stroke-linecap="round" opacity=".55"/>`;
        s+=`<path d="${d}" stroke="#ff8c1a" stroke-width="4" fill="none" stroke-linecap="round"/>`;
      }
    }
    /* markers */
    const mr=Math.max(1.5,num(cfg.markerSize)||4.5);
    pts.forEach(p=>{
      const x=SX(p), y=SY(p), ref=isRefPt(p);
      s+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${(ref?mr*1.35:mr).toFixed(1)}" fill="${ref?'#e11':'#1e90ff'}" stroke="#fff" stroke-width="1.6"/>`;
    });
    /* callouts — only the chosen points, laid out so they never overlap */
    const fs=Math.max(6,num(cfg.labelSize)||10.5);
    const items=labelledPoints(pts,cfg.labels||'All points')
      .map(p=>({x:SX(p),y:SY(p),text:labelTextOf(p,cfg.labelText||'Label + description')}))
      .filter(i=>i.text);
    placeLabels(items,W,H,fs).forEach(it=>{
      const ax=it.flip?it.lx+it.wpx+3:it.lx-3, ay=it.ly-fs*0.35;
      s+=`<path d="M${it.x.toFixed(1)},${it.y.toFixed(1)} L${ax.toFixed(1)},${ay.toFixed(1)}" stroke="#000" stroke-width="2.4" opacity=".65"/>`;
      s+=`<path d="M${it.x.toFixed(1)},${it.y.toFixed(1)} L${ax.toFixed(1)},${ay.toFixed(1)}" stroke="#fff" stroke-width="1"/>`;
      s+=`<text x="${it.lx.toFixed(1)}" y="${it.ly.toFixed(1)}" font-size="${fs}" font-weight="600" fill="#fff" style="paint-order:stroke" stroke="#000" stroke-width="3.2">${rEsc(it.text)}</text>`;
    });
    /* dig-site callout arrow, in the operator's overview-map style */
    if(String(cfg.arrow||'Yes').toLowerCase()==='yes'){
      const ref=pts.find(p=>/ref/i.test(p.label))||pts[0];
      const ax=SX(ref), ay=SY(ref);
      s+=`<path d="M${ax.toFixed(1)},${(ay+86).toFixed(1)} L${ax.toFixed(1)},${(ay+20).toFixed(1)}" stroke="#ffe000" stroke-width="5"/>`;
      s+=`<path d="M${ax.toFixed(1)},${(ay+11).toFixed(1)} l-8,15 l16,0 Z" fill="#ffe000"/>`;
      const lbl=cfg.label||`Dig Site ${D.master.digSite||''}`.trim();
      s+=`<text x="${ax.toFixed(1)}" y="${(ay+104).toFixed(1)}" font-size="13" font-weight="700" text-anchor="middle" fill="#ffe000" style="paint-order:stroke" stroke="#000" stroke-width="3.5">${rEsc(lbl)}</text>`;
    }
    /* north arrow */
    if(String(cfg.showNorth||'Yes').toLowerCase()==='yes')
      s+=`<g transform="translate(${W-46},40)"><path d="M0,-24 L7,9 L0,3 L-7,9 Z" fill="#fff" stroke="#000" stroke-width="1"/>
        <text x="0" y="25" font-size="13" font-weight="700" text-anchor="middle" fill="#fff" style="paint-order:stroke" stroke="#000" stroke-width="3">N</text></g>`;
    /* scale bar sized off true ground resolution */
    const mpp=metresPerPx(lat0,z);
    if(String(cfg.showScale||'Yes').toLowerCase()==='yes'){
      const target=(W/5)*mpp;
      const nice=[1,2,5,10,20,25,50,100,200,500,1000];
      const mBar=nice.reduce((a,b)=>Math.abs(b-target)<Math.abs(a-target)?b:a,nice[0]);
      const barPx=mBar/mpp, ftBar=Math.round(mBar*3.28084);
      s+=`<g transform="translate(24,${H-30})">
        <rect x="-4" y="-13" width="${(barPx+90).toFixed(0)}" height="30" fill="#000" opacity=".45" rx="3"/>
        <rect x="0" y="0" width="${barPx.toFixed(1)}" height="6" fill="#fff" stroke="#000"/>
        <rect x="0" y="0" width="${(barPx/2).toFixed(1)}" height="6" fill="#000"/>
        <text x="${(barPx+6).toFixed(1)}" y="6" font-size="10" fill="#fff">${mBar} m / ${ftBar} ft</text></g>`;
    }
    /* provider attribution (required by the imagery terms) */
    s+=`<text x="${W-6}" y="${H-6}" font-size="8" text-anchor="end" fill="#fff" style="paint-order:stroke" stroke="#000" stroke-width="2.5">${rEsc(src.attr)}</text>`;
    if(String(cfg.showCaption||'Yes').toLowerCase()==='yes')
      s+=`<text x="6" y="14" font-size="9" fill="#fff" style="paint-order:stroke" stroke="#000" stroke-width="2.5">${lat0.toFixed(6)}, ${lon0.toFixed(6)} · zoom ${z} · ${mpp.toFixed(2)} m/px</text>`;
    s+='</svg>';
    return s;
  }
  /* ---------- SCHEMATIC: offline plan view (no imagery required) ---------- */
  const M_PER_DEG_LAT=110540, M_PER_DEG_LON=111320*Math.cos(lat0*Math.PI/180);
  const xy=pts.map(p=>({...p,
    mx:(p.lon-lon0)*M_PER_DEG_LON,
    my:(p.lat-lat0)*M_PER_DEG_LAT}));
  const xs=xy.map(p=>p.mx), ys=xy.map(p=>p.my);
  let spanX=Math.max(...xs)-Math.min(...xs), spanY=Math.max(...ys)-Math.min(...ys);
  if(spanX<1&&spanY<1){spanX=spanY=10;}            // all points ~coincident
  const availW=W-PAD*2, availH=H-PAD*2;
  const scale=Math.min(availW/(spanX||1),availH/(spanY||1))*0.86;   // px per metre
  const cx0=(Math.max(...xs)+Math.min(...xs))/2, cy0=(Math.max(...ys)+Math.min(...ys))/2;
  const SX=mx=>W/2+(mx-cx0)*scale, SY=my=>H/2-(my-cy0)*scale;       // y flips: north = up
  let s=svgOpen(W,H);
  s+=`<rect x="0" y="0" width="${W}" height="${H}" fill="#f4f2ec" stroke="#000"/>`;
  /* faint grid */
  for(let g=0;g<=10;g++){
    s+=`<line x1="${g*W/10}" y1="0" x2="${g*W/10}" y2="${H}" stroke="#e0dccf" stroke-width=".7"/>`;
    s+=`<line x1="0" y1="${g*H/10}" x2="${W}" y2="${g*H/10}" stroke="#e0dccf" stroke-width=".7"/>`;
  }
  /* pipe alignment: connect points in Ref-ft order (fall back to input order) */
  const line=[...xy].sort((a,b)=>(isFinite(a.ref)?a.ref:0)-(isFinite(b.ref)?b.ref:0));
  if(line.length>1){
    const d=line.map((p,i)=>`${i?'L':'M'}${SX(p.mx).toFixed(1)},${SY(p.my).toFixed(1)}`).join(' ');
    s+=`<path d="${d}" fill="none" stroke="#e8890c" stroke-width="7" stroke-linecap="round" opacity=".9"/>`;
    s+=`<path d="${d}" fill="none" stroke="#7a4a08" stroke-width="1.2" stroke-dasharray="5 4"/>`;
  }
  /* markers */
  const smr=Math.max(1.5,num(cfg.markerSize)||5);
  xy.forEach(p=>{
    const x=SX(p.mx), y=SY(p.my), ref=isRefPt(p);
    s+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${(ref?smr*1.4:smr).toFixed(1)}" fill="${ref?'#c00':'#1f4e79'}" stroke="#fff" stroke-width="1.6"/>`;
  });
  /* callouts, laid out clear of one another */
  const sfs=Math.max(6,num(cfg.labelSize)||11);
  const sitems=labelledPoints(xy,cfg.labels||'All points')
    .map(p=>({x:SX(p.mx),y:SY(p.my),text:labelTextOf(p,cfg.labelText||'Label + description')+(isFinite(p.ref)?`  (${p.ref}′)`:'')}))
    .filter(i=>i.text.trim());
  placeLabels(sitems,W,H,sfs).forEach(it=>{
    const ax=it.flip?it.lx+it.wpx+3:it.lx-3, ay=it.ly-sfs*0.35;
    s+=`<path d="M${it.x.toFixed(1)},${it.y.toFixed(1)} L${ax.toFixed(1)},${ay.toFixed(1)}" stroke="#888" stroke-width="1"/>`;
    s+=`<text x="${it.lx.toFixed(1)}" y="${it.ly.toFixed(1)}" font-size="${sfs}" font-weight="600" style="paint-order:stroke" stroke="#f4f2ec" stroke-width="3.5" fill="#111">${rEsc(it.text)}</text>`;
  });
  /* north arrow */
  s+=`<g transform="translate(${W-52},42)">
      <path d="M0,-26 L8,10 L0,3 L-8,10 Z" fill="#111"/>
      <text x="0" y="26" font-size="13" font-weight="700" text-anchor="middle">N</text></g>`;
  /* scale bar — pick a round distance that fits ~1/5 of the width */
  const target=(availW/5)/scale;                                   // metres
  const nice=[1,2,5,10,20,25,50,100,200,500,1000];
  const mBar=nice.reduce((a,b)=>Math.abs(b-target)<Math.abs(a-target)?b:a,nice[0]);
  const barPx=mBar*scale, ftBar=Math.round(mBar*3.28084);
  s+=`<g transform="translate(${PAD-24},${H-30})">
      <rect x="0" y="0" width="${barPx.toFixed(1)}" height="7" fill="#111"/>
      <rect x="0" y="0" width="${(barPx/2).toFixed(1)}" height="7" fill="#fff" stroke="#111" stroke-width="1"/>
      <text x="0" y="21" font-size="10">0</text>
      <text x="${barPx.toFixed(1)}" y="21" font-size="10" text-anchor="middle">${mBar} m / ${ftBar} ft</text></g>`;
  /* centre coordinate caption */
  s+=`<text x="${PAD-24}" y="26" font-size="10" fill="#444">Plan view generated from collected GPS · centre ${lat0.toFixed(6)}, ${lon0.toFixed(6)} · north up, true to scale</text>`;
  s+='</svg>';
  return s;
}

    ${L('6.14','End of casing GPS coordinates:',(String(c.endGPSNA).toLowerCase()==='yes'?`<div class="hf-cbrow">${cbx('N/A — casing completely removed',true)}</div>`:F('Lat',c.endLatAfter1)+' '+F('Lon',c.endLonAfter1)+'<br>'+F('Lat',c.endLatAfter2)+' '+F('Lon',c.endLonAfter2)))}
    ${c.leftComments?L('','Comments:',rEsc(c.leftComments)):''}
  </div>`;
  return p1+p2;
}

/* ---- GPS baseline projection ---- */
function calcGPSFromBaseline(){
  const b=D.gps.baseline;
  const A=D.gps.rows.find(r=>r.label===b.ptA), B=D.gps.rows.find(r=>r.label===b.ptB);
  if(!A||!B){alert('Pick both baseline points first.');return;}
  const latA=num(A.lat), lonA=num(A.lon), latB=num(B.lat), lonB=num(B.lon), dist=num(b.distFt);
  if(!isFinite(latA)||!isFinite(lonA)){alert('Point A needs a latitude and longitude entered first.');return;}
  if(!isFinite(latB)||!isFinite(lonB)){
    /* only A has coordinates: project B and everything else purely from ref-ft along an assumed bearing of 0 (north) unless both have coords */
  }
  if(!isFinite(dist)||dist<=0){alert('Enter the real surveyed distance between A and B.');return;}
  const refA=num(A.refFt), refB=num(B.refFt);
  if(!isFinite(refA)||!isFinite(refB)){alert('Both baseline points need a Ref ft value.');return;}
  const ftSpan=Math.abs(refB-refA)||1;
  let dLat,dLon;
  if(isFinite(latB)&&isFinite(lonB)){
    dLat=(latB-latA)/ftSpan; dLon=(lonB-lonA)/ftSpan;
  } else {
    /* fall back: treat pipe as running due north, 1 ft = 1/364000 deg lat (approx at mid-latitudes) */
    dLat=(refB>refA?1:-1)/364000; dLon=0;
  }
  const sign=refB>=refA?1:-1;
  D.gps.rows.forEach(r=>{
    if(r.label===b.ptA||r.label===b.ptB)return;
    const ref=num(r.refFt); if(!isFinite(ref))return;
    const d=ref-refA;
    r.lat=String(Math.round((latA+dLat*d)*1e8)/1e8);
    r.lon=String(Math.round((lonA+dLon*d)*1e8)/1e8);
  });
  renderTable('gps'); refresh('gps');
  alert('Projected coordinates for all rows with a Ref ft value (A and B left as entered).');
}
/* ---- GPS diagram: reuse H3 elevation drawing, overlay GPS labels at their ref-ft position ---- */
function gpsDiagramSVG(){
  const base=h3DiagramSVG(false);
  const m=D.master,p=D.profile;
  const secs=D.sections.filter(s2=>isFinite(num(s2.start)));
  const a0=isFinite(num(m.assessStart))?num(m.assessStart):(secs.length?Math.min(...secs.map(s2=>num(s2.start))):0);
  const aEnd=[...secs.map(s2=>num(s2.end)),num(m.assessEnd)].filter(isFinite);
  const a1=aEnd.length?Math.max(...aEnd):a0+10;
  const W=940,L=90,R=170,PIPE_Y=250;
  const X=v=>L+((v-a0)/((a1-a0)||1))*(W-L-R);
  let overlay='';
  D.gps.rows.forEach((r,i)=>{
    const ref=num(r.refFt); if(!isFinite(ref))return;
    const x=X(ref), up=i%2===0, y=up?PIPE_Y-100-((i%3)*13):PIPE_Y+120+((i%3)*13);
    overlay+=`<line x1="${x}" y1="${PIPE_Y}" x2="${x}" y2="${y+(up?8:-8)}" stroke="#0a7a3e" stroke-width="1" stroke-dasharray="2 2"/>`;
    overlay+=`<circle cx="${x}" cy="${PIPE_Y}" r="3" fill="#0a7a3e"/>`;
    overlay+=`<text x="${x}" y="${y+(up?0:12)}" font-size="9" font-weight="700" text-anchor="middle" fill="#0a7a3e" style="paint-order:stroke" stroke="#fff" stroke-width="3">${rEsc(r.label)}</text>`;
  });
  return base.replace('</svg>', overlay+'</svg>');
}

/* ============================================================
   VALIDATION ENGINE — ported from ValidateDraftSubmittal suite
   ============================================================ */
function validate(silent=false){
  const R=[]; const m=D.master;
  const add=(lvl,cat,msg,pg)=>R.push({lvl,cat,msg,pg});
  const has=v=>String(v??'').trim()!=='';

  /* — ValidateMasterTab — */
  REQ_FIELDS.forEach(([p,label])=>{
    has(getPath(D,p)) ? add('ok','Master',label+' entered','master')
                      : add('err','Master',label+' is required','master');
  });
  if(has(m.smys)&&!isFinite(num(m.smys))) add('err','Master','SMYS is not numeric','master');
  if(has(m.maop)&&!isFinite(num(m.maop))) add('err','Master','MAOP is not numeric','master');
  if(!has(m.mop)) add('warn','Master','MOP blank — enter MAOP value if MOP unknown (workbook rule)','master');

  /* — ValidatePlannedVsActualLength — */
  const pl=num(m.plannedLength), al=num(m.actualLength);
  if(isFinite(pl)&&isFinite(al)){
    Math.abs(pl-al)>0.5
      ? add('warn','Length',`Actual length ${al} ft differs from planned ${pl} ft — confirm and note in comments`,'master')
      : add('ok','Length','Planned vs actual inspection length agree','master');
  } else if(isFinite(pl)&&!isFinite(al)) add('warn','Length','Actual inspection length not entered','master');

  /* — ValidateSectionsTab — */
  if(!D.sections.length) add('err','Sections','No pipe sections entered','sections');
  D.sections.forEach((s,i)=>{
    const a=num(s.start), b=num(s.end);
    if(!isFinite(a)||!isFinite(b)) add('err','Sections',`Section ${i+1} missing start or end distance`,'sections');
    else if(b<=a) add('err','Sections',`Section ${i+1} end (${b}) must be greater than start (${a})`,'sections');
    else add('ok','Sections',`Section ${i+1} geometry OK (${a} → ${b} ft)`,'sections');
    if(i>0){
      const prevEnd=num(D.sections[i-1].end);
      if(isFinite(prevEnd)&&isFinite(a)&&Math.abs(prevEnd-a)>0.01)
        add('warn','Sections',`Gap/overlap between section ${i} end (${prevEnd}) and section ${i+1} start (${a})`,'sections');
    }
    const uttN=s.utt.filter(v=>isFinite(num(v))&&num(v)>0).length;
    if(uttN===0) add('warn','Sections',`Section ${i+1} has no 12-pt UTT readings`,'sections');
    else if(uttN<12) add('warn','Sections',`Section ${i+1} has only ${uttN}/12 UTT readings`,'sections');
    if(!has(s.seamLoc)) add('warn','Sections',`Section ${i+1} long seam location blank (use "SMLS" or "NA" if applicable)`,'sections');
  });
  if(isFinite(num(m.assessStart))&&D.sections.length&&isFinite(num(D.sections[0].start))
     &&Math.abs(num(m.assessStart)-num(D.sections[0].start))>0.01)
    add('warn','Sections','Section 1 start should equal Assessment Start (workbook rule)','sections');

  /* — UTT vs NWT (87.5%) — */
  const nwtMils=wallIn(m.nwt)*1000;
  const uttAll=D.sections.flatMap(s=>s.utt.map(v=>num(v))).filter(v=>isFinite(v)&&v>0);
  if(uttAll.length&&isFinite(nwtMils)){
    const mn=Math.min(...uttAll);
    mn<nwtMils*0.875
      ? add('warn','UTT',`Minimum UTT ${mn} mils is below 87.5% of nominal wall (${fmt(nwtMils*0.875)} mils) — document as metal loss`,'sections')
      : add('ok','UTT','All UTT readings within 87.5% of nominal wall','sections');
  }

  /* — ValidateH1Page — */
  if(!(D.h1.landUse||[]).length) add('warn','H1','Land use not selected','h1');
  if(!(D.h1.soilType||[]).length) add('warn','H1','Native soil type not selected','h1');
  if(!has(D.h1.docCtr)&&!has(D.h1.docUS)&&!has(D.h1.docDS)) add('warn','H1','No depth-of-cover readings entered','h1');
  if(!(D.h1.coatingTypeFound||[]).length) add('warn','H1','Coating type as found not selected','h1');
  (has(D.h1.ps12US)&&has(D.h1.ps12DS)) ? add('ok','H1','P/S in-ditch potentials recorded','h1')
    : add('warn','H1','US and DS pipe-to-soil potentials incomplete','h1');

  /* — Indication completeness — */
  if(D.indications.length){
    let bad=0;
    D.indications.forEach((r,i)=>{
      const missing=['type','dist','clock','len','wid','depth'].filter(k=>!has(r[k]));
      if(missing.length){bad++; add('err','Indications',`Row ${i+1}${r.id?' ('+r.id+')':''} missing: ${missing.join(', ')}`,'ind');}
      const dep=num(r.depth), awt=num(r.awt)||nwtMils;
      if(isFinite(dep)&&isFinite(awt)&&awt>0&&dep/awt>0.8)
        add('err','Indications',`Row ${i+1}${r.id?' ('+r.id+')':''}: depth ${dep} mils exceeds 80% of wall — repair evaluation required`,'ind');
    });
    if(!bad) add('ok','Indications',`All ${D.indications.length} indication rows complete`,'ind');
  } else add('ok','Indications','No indications logged (Sections summary will read "None")','ind');

  /* — RSTRENG required when EC present — */
  { const seen=new Set();
    D.indications.forEach(r=>{ if(!r.type||!r.id)return; const key=r.type+'-'+r.id;
      if(seen.has(key))add('err','Indications',`Duplicate indication ID ${key} — every indication must have a unique type+number`,'ind'); seen.add(key); }); }
  { const seen=new Set();
    D.coatDamage.forEach(r=>{ if(!r.type||!r.no)return; const key=r.type+'-'+r.no;
      if(seen.has(key))add('err','Coating','Duplicate coating damage ID '+key+' — every entry must have a unique type+number','h7'); seen.add(key); }); }
  const hasEC=D.indications.some(r=>['EC','CEC','EML'].includes(r.type))||D.corrLog.length>0;
  const gridsRun=D.rstreng.grids.filter(g=>g.results);
  if(hasEC){
    gridsRun.length ? add('ok','RSTRENG',`Failure pressure calculated on ${gridsRun.length} grid(s)`,'h4')
                    : add('warn','RSTRENG','External corrosion logged but RSTRENG has not been run','h4');
  }
  gridsRun.forEach((g,i)=>{ if(g.results.pctWall>80)
    add('err','RSTRENG',`Grid: max defect depth ${g.results.pctWall.toFixed(1)}% of wall (>80%) — repair may be required`,'h4');});
  /* samples & resistivity (ValidateSoilSamples / GroundwaterSamples / ResistivityData) */
  if(D.h1.gwPresent==='Yes'&&!String(D.h1.gwCollected).trim())
    add('warn','H1','Groundwater present but "collected?" not answered','h1');
  if(D.h1.gwCollected==='Yes'&&!String(D.h1.gwPH).trim())
    add('warn','H1','Groundwater collected but pH not recorded','h1');
  if(D.h1.corrProductPresent==='Yes'&&!String(D.h1.corrProductSample).trim())
    add('warn','H1','Corrosion product present but sample disposition blank','h1');
  if(String(D.h1.pin4Ohms).trim()&&!String(D.h1.pin4Res).trim())
    add('warn','H1','4-pin ohms entered but resistivity not computed','h1');
  /* casing */
  if(D.casing.present==='Yes'){
    if(!String(D.casing.casingDia).trim()) add('err','Casing','Casing present but casing diameter blank','casing');
    if(!String(D.casing.shorted).trim()) add('warn','Casing','Casing present — shorted/isolated status not recorded','casing');
  }
  /* LSC */
  if(D.master.lsc==='Yes'){
    D.lsc.seamType ? add('ok','LSC','Seam type concluded: '+D.lsc.seamType,'lsc')
                   : add('err','LSC','LSC requested on Master but seam type conclusion is blank','lsc');
    if(!(D.lsc.methods||[]).length) add('warn','LSC','No inspection methods checked on LSC sheet','lsc');
  }

  /* — ValidateGPSData — */
  const gpsPts=D.gps.rows.filter(r=>isFinite(num(r.lat))&&num(r.lat)!==0);
  if(gpsPts.length<2) add('warn','GPS','Fewer than 2 GPS points with coordinates','gps');
  else{
    let ok=true;
    gpsPts.forEach(r=>{const la=num(r.lat),lo=num(r.lon);
      if(la<32||la>42.2||lo<-125||lo>-114){ok=false;add('err','GPS',`${r.label||'Point'}: coordinates (${la}, ${lo}) outside California range`,'gps');}});
    if(ok) add('ok','GPS',`${gpsPts.length} GPS points within expected range`,'gps');
  }

  /* — ValidateNDEReports + GetCalibrationSeverity — */
  const calChecks=[[nP('mt','yokeCal'),'MT yoke'],[nP('mt','lmCal'),'MT light meter'],[nP('ut','unitCal'),'UT unit']];
  calChecks.forEach(([p,label])=>{
    const v=getPath(D,p); if(!has(v))return;
    const sev=calSeverity(v);
    if(sev==='expired') add('err','NDE',`${label} calibration is PAST DUE (${v})`,'nde');
    else if(sev==='soon') add('warn','NDE',`${label} calibration due within 30 days (${v})`,'nde');
    else add('ok','NDE',`${label} calibration current (${v})`,'nde');
  });
  if(has(NDE('mt').tech)&&!has(NDE('mt').level2)) add('warn','NDE','MT report missing Level II sign-off name','nde');
  if(has(NDE('ut').tech)&&!has(NDE('ut').level2)) add('warn','NDE','UT report missing Level II sign-off name','nde');

  /* — ValidateRepairInfo — */
  if(D.h10.repairMade==='Yes'){
    if(!has(D.h10.numRepairs)) add('err','Repair','Repair made but "number of repairs" is blank','h10');
    if(!D.h10.repairType.length) add('err','Repair','Repair made but no repair type selected','h10');
    if(!D.h10.repairedDefect.length) add('err','Repair','Repair made but no repaired defect type selected','h10');
  }

  /* — Comments end with a period (workbook pet rule) — */
  [['master.inspComments','Inspection comments'],['ss.findings','SS findings']].forEach(([p,label])=>{
    const v=String(getPath(D,p)||'').trim();
    if(v&&!/[.!?]$/.test(v)) add('warn','Style',`${label} should end with a period (workbook rule)`,'master');
  });

  if(!silent){
    const ul=$('#vout');
    const order={err:0,warn:1,ok:2};
    const sorted=[...R].sort((a,b)=>order[a.lvl]-order[b.lvl]);
    ul.innerHTML=sorted.map(r=>`<li class="${r.lvl}"><span class="tag">${r.lvl==='ok'?'PASS':r.lvl==='warn'?'WARN':'FAIL'}</span>
      <div>${esc(r.msg)}<span class="where">${r.cat} · <a href="#" data-nav="${r.pg}">go to page →</a></span></div></li>`).join('');
  }
  const e=R.filter(x=>x.lvl==='err').length, w=R.filter(x=>x.lvl==='warn').length;
  const vb=$('#vbadge');
  vb.className=e?'err':(w?'warn':'ok');
  vb.textContent=e?`● ${e} error${e>1?'s':''}`:(w?`● ${w} warning${w>1?'s':''}`:'● all checks pass');
  return R;
}

/* ---- save / load ---- */
/* ============================================================
   LOCAL PERSISTENCE
   Three separate concerns:
     • autosave  — a crash/close safety net for the CURRENT job
     • library   — roster, contacts, zone lists and operators kept
                   across jobs so they're configured once
     • dirty     — warn before leaving with unsaved changes
   Browser storage is per-machine and can be cleared, so none of this
   replaces "Save file" — it's a net, not the record of work.
   ============================================================ */
const LS={auto:'de-digital:autosave', lib:'de-digital:library'};
const LS_OK=(()=>{try{const k='__de_t';localStorage.setItem(k,'1');localStorage.removeItem(k);return true;}catch(e){return false;}})();
let DIRTY=false, AUTOTIMER=null, LIBTIMER=null;

function updateSaveBadge(){
  const b=$('#btn-save'); if(b)b.classList.toggle('unsaved',DIRTY);
  const n=$('#save-note'); if(!n)return;
  if(!LS_OK){n.textContent='autosave unavailable';return;}
  if(DIRTY){n.textContent='unsaved changes';return;}
  const sv=D.meta.saved?new Date(D.meta.saved):null, au=D.meta.autosaved?new Date(D.meta.autosaved):null;
  if(sv&&(!au||sv>=au))n.textContent='saved to file '+sv.toLocaleTimeString();
  else if(au)n.textContent='autosaved '+au.toLocaleTimeString();
  else n.textContent='';
}
function markDirty(){ DIRTY=true; updateSaveBadge(); scheduleAutosave(); }
function scheduleAutosave(){ if(!LS_OK)return; clearTimeout(AUTOTIMER); AUTOTIMER=setTimeout(autosave,1500); }
function collectAll(){ D.roster=TECHS; D.contactsRoster=CONTACTS; D.zoneLists=ZONE_LISTS; D.operators=OPERATORS; return D; }
function autosave(){
  if(!LS_OK)return;
  collectAll(); D.meta.autosaved=new Date().toISOString();
  const wrap=data=>JSON.stringify({t:Date.now(),site:D.master.digSite||'',data});
  try{ localStorage.setItem(LS.auto,wrap(D)); }
  catch(err){
    /* over quota — images (logo / site photo / photo log) are the usual cause.
       Keep the data by autosaving a lean copy rather than losing everything. */
    try{
      const lean=JSON.parse(JSON.stringify(D));
      if(lean.brand)lean.brand.logo='';
      if(lean.master)lean.master.siteImg='';
      (lean.photoLog||[]).forEach(p=>{if(p.img)p.img='';});
      localStorage.setItem(LS.auto,JSON.stringify({t:Date.now(),site:D.master.digSite||'',data:lean,lean:true}));
    }catch(e2){ try{localStorage.removeItem(LS.auto);}catch(e3){} }
  }
  updateSaveBadge();
}
function clearAutosave(){ if(LS_OK)try{localStorage.removeItem(LS.auto);}catch(e){} }
/* Offer to restore on startup rather than silently overwriting a fresh form */
function checkAutosave(){
  if(!LS_OK)return;
  let p; try{ const raw=localStorage.getItem(LS.auto); if(!raw)return; p=JSON.parse(raw); }catch(e){ return; }
  if(!p||!p.data||!p.data.master)return;
  const when=new Date(p.t||Date.now());
  const msg=`Unsaved work was found from a previous session.\n\n`+
    `Site: ${p.site||'(unnamed)'}\nAutosaved: ${when.toLocaleString()}`+
    (p.lean?`\n\nNote: images were too large to autosave and were not kept.`:'')+
    `\n\nOK = restore it · Cancel = discard and start fresh`;
  if(confirm(msg)){
    try{ applyLoaded(p.data); DIRTY=false; updateSaveBadge();
         alert('Work restored. Remember to use Save file to keep a permanent copy.'); }
    catch(e){ alert('Could not restore the autosave: '+e.message); }
  } else { clearAutosave(); }
}
/* ---- library: roster / contacts / zone lists / operators across jobs ---- */
function scheduleLibrarySave(){ if(!LS_OK)return; clearTimeout(LIBTIMER); LIBTIMER=setTimeout(saveLibrary,800); }
function saveLibrary(){
  if(!LS_OK)return;
  try{ localStorage.setItem(LS.lib,JSON.stringify({techs:TECHS,contacts:CONTACTS,zones:ZONE_LISTS,operators:OPERATORS})); }catch(e){}
}
function loadLibrary(){
  if(!LS_OK)return false;
  try{
    const raw=localStorage.getItem(LS.lib); if(!raw)return false;
    const l=JSON.parse(raw);
    if(l.techs&&Object.keys(l.techs).length)TECHS=l.techs;
    if(l.contacts&&Object.keys(l.contacts).length)CONTACTS=l.contacts;
    if(l.zones)ZONE_NAMES.forEach(z=>{ if(Array.isArray(l.zones[z]))ZONE_LISTS[z]=l.zones[z]; });
    if(l.operators&&Object.keys(l.operators).length)OPERATORS=l.operators;
    return true;
  }catch(e){ return false; }
}
function clearLibrary(){
  if(!LS_OK)return;
  try{ localStorage.removeItem(LS.lib); }catch(e){}
  TECHS=JSON.parse(JSON.stringify(TECH_DEFAULTS));
  CONTACTS=JSON.parse(JSON.stringify(CONTACT_DEFAULTS));
  ZONE_LISTS=JSON.parse(JSON.stringify(ZONE_LIST_DEFAULTS));
  OPERATORS=JSON.parse(JSON.stringify(OPERATOR_DEFAULTS));
}
/* leaving with unsaved changes */
window.addEventListener('beforeunload',e=>{ if(DIRTY){ e.preventDefault(); e.returnValue=''; return ''; } });

/* Save filename: Project ID _ Site _ timestamp, e.g.
   EC26-1027-01_EC26-1027-01-A_2026-07-15_1305.hform.json
   Parts that are blank are simply left out, so a half-filled form still saves
   to something sensible rather than "undefined". */
function saveFileName(){
  const m=D.master;
  const clean=v=>String(v||'').trim().replace(/[^\w.\-]+/g,'-').replace(/^-+|-+$/g,'');
  const d=new Date();
  const p=n=>String(n).padStart(2,'0');
  const stamp=`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}`;
  const parts=[clean(m.projectId),clean(m.digSite),stamp].filter(Boolean);
  return parts.join('_')+'.hform.json';
}
function saveFile(){
  D.meta.saved=new Date().toISOString();
  collectAll();
  DIRTY=false; clearAutosave(); saveLibrary(); updateSaveBadge();
  const name=saveFileName();
  const blob=new Blob([JSON.stringify(D,null,1)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
}
function loadFile(file){
  const rd=new FileReader();
  rd.onload=()=>{try{
      const obj=JSON.parse(rd.result);
      applyLoaded(obj);
      DIRTY=false; updateSaveBadge();
    }catch(err){alert('Could not open file: '+err.message);}};
  rd.readAsText(file);
}
/* Hydrate the whole app from a saved/autosaved object. Shared by Open file and
   the autosave restore so both go through exactly the same migrations. */
function applyLoaded(obj){
      if(!obj.master) throw new Error('not a DE Digital file');
      const base=DEFAULT();
      /* migrate pre-multigrid saves */
      if(obj.rstreng&&!obj.rstreng.grids){
        const o=obj.rstreng;
        obj.rstreng={grids:[{anomaly:o.anomaly||'',gridNo:o.gridNo||'',axialDist:o.axialDist||'',clock:o.clock||'',
          gridSpacing:o.gridSpacing||'0.5',awt:o.awt||'',readings:o.readings||'',results:o.results||null}]};
      }
      D=Object.assign(base,obj);
      if(!D.rstreng||!Array.isArray(D.rstreng.grids)||!D.rstreng.grids.length)D.rstreng={grids:[blankGrid()]};
      /* migrate textarea-era grids to 2D cells */
      D.rstreng.grids.forEach(g=>{
        if(!Array.isArray(g.cells)){
          const vals=String(g.readings||'').split(/[\s,;\t\n]+/).filter(x=>x!=='');
          g.rows=1; g.cols=Math.max(vals.length,10);
          g.cells=[Array.from({length:g.cols},(_,i)=>vals[i]??'')];
          if(g.indLen===undefined)g.indLen=''; if(g.indWid===undefined)g.indWid='';
          delete g.readings;
        }
      });
      if(obj.roster&&typeof obj.roster==='object'&&Object.keys(obj.roster).length)TECHS=obj.roster;
      if(obj.contactsRoster&&typeof obj.contactsRoster==='object'&&Object.keys(obj.contactsRoster).length)CONTACTS=obj.contactsRoster;
      if(obj.zoneLists&&typeof obj.zoneLists==='object'){ZONE_NAMES.forEach(z=>{ if(Array.isArray(obj.zoneLists[z]))ZONE_LISTS[z]=obj.zoneLists[z]; });}
      if(obj.operators&&typeof obj.operators==='object'&&Object.keys(obj.operators).length)
        Object.entries(obj.operators).forEach(([k,v])=>{OPERATORS[k]=Object.assign({},OPERATOR_FALLBACK,v);});
      if(D.h10&&!Array.isArray(D.h10.repairType))D.h10.repairType=D.h10.repairType&&D.h10.repairType!=='None'?[D.h10.repairType]:[];
      if(D.h10&&!Array.isArray(D.h10.repairedDefect))D.h10.repairedDefect=D.h10.repairedDefect?[D.h10.repairedDefect]:[];
      /* older files stored a single NDE report per kind — wrap into arrays */
      D.nde=Object.assign({idx:{mt:0,ut:0,acid:0}},obj.nde||{});
      NDE_KINDS.forEach(([k])=>{
        const base=DEFAULT().nde[k][0];
        if(!Array.isArray(D.nde[k]))D.nde[k]=D.nde[k]?[D.nde[k]]:[JSON.parse(JSON.stringify(base))];
        D.nde[k]=D.nde[k].map(r=>Object.assign(JSON.parse(JSON.stringify(base)),r||{}));
        if(!D.nde[k].length)D.nde[k]=[JSON.parse(JSON.stringify(base))];
      });
      D.nde.idx=Object.assign({mt:0,ut:0,acid:0},(obj.nde||{}).idx||{});
      if(!Array.isArray(D.h5grids))D.h5grids=[];
      D.h5grids.forEach(g=>{ if(!Array.isArray(g.cells)){g.rows=g.rows||3;g.cols=g.cols||10;g.cells=Array.from({length:g.rows},()=>Array(g.cols).fill(''));} });
      if(!Array.isArray(D.intGrids)||!D.intGrids.length)D.intGrids=[blankIntGrid()];
      D.intGrids.forEach(g=>{
        if(!Array.isArray(g.cells)){
          const vals=String(g.readings||'').split(/[\s,;\n]+/).filter(x=>x.trim()!=='');
          const od=num(g.compOD)||num(D.master&&D.master.diameter)||num((obj.master||{}).diameter);
          const spec=intGridSpec(od);
          if(spec){g.spacing=g.spacing||String(spec.spacing);g.circStart=g.circStart||String(Math.round(spec.circStartIn*100)/100);
            g.rows=spec.rows;g.cols=spec.cols;}
          else {g.cols=Math.min(Math.max(vals.length,1),12);g.rows=Math.max(Math.ceil(vals.length/g.cols),1);g.spacing=g.spacing||g.gridSize||'1';}
          g.cells=[];let k=0;
          for(let r=0;r<g.rows;r++){g.cells.push(Array.from({length:g.cols},()=>vals[k]!==undefined?vals[k++]:''));}
          delete g.readings;
        }
      });
      D.lsc=Object.assign(base.lsc,obj.lsc||{});
      D.casing=Object.assign(base.casing,obj.casing||{});
      D.samples=Object.assign(base.samples,obj.samples||{});
      D.dents=obj.dents||[]; D.grind=obj.grind||[];
      D.report=Object.assign(base.report,obj.report||{});
      D.report.include=Object.assign(base.report.include,(obj.report||{}).include||{});
      D.siteMap=Object.assign(base.siteMap,obj.siteMap||{});
      if(D.report.include.hform===undefined&&(obj.report||{}).include&&obj.report.include.h3!==undefined)D.report.include.hform=obj.report.include.h3;
      if(!D.profile.view)D.profile.view='elevation';
      if(obj.master&&obj.master.siteImg)D.master.siteImg=obj.master.siteImg;
      D.profile=Object.assign(base.profile,obj.profile||{});
      if(!D.lsc.evidence)D.lsc.evidence={};
      if(!Array.isArray(D.lsc.uttRows))D.lsc.uttRows=base.lsc.uttRows;
      if(!D.gps.refDoc)D.gps.refDoc=base.gps.refDoc;
      D.brand=Object.assign(base.brand,obj.brand||{});
      if(!Array.isArray(D.profile.elems))D.profile.elems=[];
      if(!D.profile.layoutMode)D.profile.layoutMode='auto';
      D.fittings=Array.isArray(obj.fittings)?obj.fittings:[];
      D.master=Object.assign(base.master,obj.master||{});
      D.master.operator=normalizeOperator(D.master.operator);
      D.h1=Object.assign(base.h1,obj.h1||{});
      D.h10=Object.assign(base.h10,obj.h10||{});
      buildPages(); buildNav(); renderAllTables(); refresh(); nav(CUR);
}

/* ---- delegated events ---- */
document.addEventListener('input',e=>{
  const el=e.target;
  /* any edit makes the job dirty and schedules an autosave */
  if(el.dataset&&(el.dataset.p!==undefined||el.dataset.c||el.dataset.o||el.dataset.zl||el.dataset.r))markDirty();
  /* roster equipment, contacts, zone lists and operators are remembered across jobs */
  if(el.dataset&&(el.dataset.c||el.dataset.o||el.dataset.zl||el.dataset.r))scheduleLibrarySave();
  /* fitting maker (no data-p) */
  if(el.id==='fm-type'){FM.type=el.value;FM.p=fmDefaults(FM.type);FM.name='';renderFittingMaker();return;}
  if(el.dataset&&el.dataset.fm){FM.p[el.dataset.fm]=parseFloat(el.value)||0;
    const pv=$('#fm-preview');if(pv)pv.innerHTML=fittingPreviewSVG(FM.type,FM.p);return;}
  if(el.id==='fm-name'){FM.name=el.value;return;}
  if(el.dataset.p==='report.theme'){D.report.theme=el.value;renderReport();return;}
  /* internal grid cell */
  if(el.dataset.icell){
    const [gi,r,c]=el.dataset.icell.split(',').map(Number);
    const g=D.intGrids[gi]; if(!g)return;
    g.cells[r][c]=el.value;
    const nwt=wallIn(D.master.nwt), nv=parseFloat(el.value), td=el.parentElement;
    td.className=isFinite(nv)&&isFinite(nwt)&&nwt>0?(nv<nwt*0.8?'deep':(nv<nwt*0.875?'warm':'')):'';
    return;
  }
  /* pit grid cell (rs = H4 external, h5 = internal) */
  if(el.dataset.cell){
    const tok=el.dataset.cell.split(',');
    const fam=tok.length===4?tok[0]:'rs';
    const [gi,r,c]=tok.slice(-3).map(Number);
    pitGridsOf(fam)[gi].cells[r][c]=el.value;
    updatePitCell(fam,gi,r,c);
    return;
  }
  /* roster field */
  if(el.dataset.r){
    const [name,key]=el.dataset.r.split('|');
    if(TECHS[name])TECHS[name][key]=el.value;
    return;
  }
  /* contact field */
  if(el.dataset.c){
    const [name,key]=el.dataset.c.split('|');
    if(CONTACTS[name])CONTACTS[name][key]=el.value;
    return;
  }
  /* operator profile field */
  if(el.dataset.o){
    const [name,key]=el.dataset.o.split('|');
    if(OPERATORS[name])OPERATORS[name][key]=el.value;
    return;
  }
  /* zone distribution list recipient field */
  if(el.dataset.zl){
    const [i,key]=el.dataset.zl.split('|');
    const list=ZONE_LISTS[ZONE_EDIT]; if(list&&list[+i]){list[+i][key]=el.value;}
    /* if this zone is the active one, keep the export CC in sync live */
    if(D.master.zone===ZONE_EDIT)applyZoneContacts();
    return;
  }
  if(el.dataset.p!==undefined&&el.dataset.p){
    setPath(D,el.dataset.p,el.value);
    /* anything the site overview map is built from — redraw it live (debounced) */
    if(/^siteMap\.|^gps\.rows\[\d+\]\.(lat|lon|label|desc|refFt)$/.test(el.dataset.p))refreshSiteMap();
    /* personnel field: light up the + when this name isn't in Contacts yet */
    if(el.dataset.contact){
      const b=el.parentElement&&el.parentElement.querySelector('.cadd');
      if(b){const v=el.value.trim();
        const known=!v||allContactNames().includes(v);
        b.classList.toggle('known',known); b.classList.toggle('on',!known);}
    }
    /* Grade → SMYS auto-fill (workbook lookup) */
    if(el.dataset.grade){const s=SMYS_MAP[el.value]; if(s){D.master.smys=String(s); const f=$('input[data-p="master.smys"]'); if(f)f.value=s;}}
    /* Measured circumference → calculated diameter */
    if(el.dataset.circ){const c=num(el.value); const dcalc=isFinite(c)?(c/Math.PI).toFixed(3):'';
      D.master.calcDiameter=dcalc; const f=$('input[data-p="master.calcDiameter"]'); if(f)f.value=dcalc;}
    /* live bits that don't rebuild inputs */
    progress();
    if(['ind','map'].includes(CUR)) {indCounts(); if(CUR==='map')renderMaps();}
    if(CUR==='h7') renderMaps();
    if(CUR==='h3') renderProfile();
    if(CUR==='h4'&&/^rstreng\.grids\[(\d+)\]\.(readings|awt)$/.test(el.dataset.p)){
      const gi=+el.dataset.p.match(/\[(\d+)\]/)[1];
      const pv=$('#h4-prof-'+gi); if(pv)pv.innerHTML=gridProfileSVG(D.rstreng.grids[gi]);
    }
    if((CUR==='samples'||CUR==='h1')&&el.dataset.res!==undefined)computeResistivity();
    if(el.dataset.p==='master.operator'){
      D.master.operator=normalizeOperator(el.value);
      /* labels across the whole UI resolve through OP() — rebuild so they refresh */
      rebuildAfterRoster(); nav(CUR); return;}
    if(el.dataset.p==='master.zone'){applyZoneContacts(true);nav(CUR);return;}
    /* editing a personnel name: refresh the PM "To" address only.
       ccEmails belongs to the zone distribution list — never rebuild it from
       the four role-holders or a 20-person zone list collapses to 4. */
    if(CONTACT_FIELD_PATHS.includes(el.dataset.p)){
      if(el.dataset.p==='master.pm')D.master.pmEmail=lookupEmail(D.master.pm)||'';
      if(!ZONE_NAMES.includes(D.master.zone))
        D.master.ccEmails=[D.master.pe,D.master.pleName,D.master.cm].map(lookupEmail).filter(Boolean).join('; ');
    }
    if(el.dataset.p==='gridColor.h4'){renderH4Grids();return;}
    if(el.dataset.p==='gridColor.h5'){renderH5Grids();return;}
    if(CUR==='h3'&&/^(profile\.|h1\.doc)/.test(el.dataset.p||'')){
      if(el.dataset.p==='profile.layoutMode')toggleH3Manual();
      renderH3Views();
    }
    if(CUR==='gps') gpsStats();
    if(CUR==='corr') corrCheck();
    if(CUR==='h8') corrlogStats();
    if(CUR==='dents'&&el.dataset.p.startsWith('dents')) refreshDentPct();
    if(CUR==='details') renderDetails();
    if(el.dataset.p.startsWith('sections')&&el.dataset.p.includes('utt')) uttStats();
  }
});

    const g=D.h5grids[+gi];
    resizeGrid(g, which==='r'?+el.value:g.rows, which==='c'?+el.value:g.cols);
    renderH5Grids();
    return;
  }
  /* grid dimension change */
  if(el.dataset.dim){
    const [gi,which]=el.dataset.dim.split(',');
    const g=D.rstreng.grids[+gi];
    resizeGrid(g, which==='r'?+el.value:g.rows, which==='c'?+el.value:g.cols);
    renderH4Grids();
    return;
  }
  /* roster rename */
  if(el.dataset.rname!==undefined){
    const oldName=el.dataset.rname, newName=el.value.trim();
    if(!newName||newName===oldName)return;
    if(TECHS[newName]){alert('A technician named "'+newName+'" already exists.');el.value=oldName;return;}
    const entry=TECHS[oldName]; delete TECHS[oldName];
    TECHS[newName]=entry;
    if(D.master.techs===oldName)D.master.techs=newName;
    ['mt','ut','acid'].forEach(k=>{if(D.nde[k].tech===oldName)D.nde[k].tech=newName;});
    if(D.lsc.tech===oldName)D.lsc.tech=newName;
    rebuildAfterRoster();
    return;
  }
  /* contact rename */
  if(el.dataset.oname!==undefined){
    const oldN=el.dataset.oname, newN=el.value.trim();
    if(!newN||newN===oldN){el.value=oldN;return;}
    if(OPERATORS[newN]){alert('An operator named '+newN+' already exists.');el.value=oldN;return;}
    const out={}; Object.keys(OPERATORS).forEach(k=>{ out[k===oldN?newN:k]=OPERATORS[k]; });
    OPERATORS=out;
    if(D.master.operator===oldN)D.master.operator=newN;
    rebuildAfterRoster(); nav('operators'); return;
  }
  if(el.dataset.cname!==undefined){
    const oldName=el.dataset.cname, newName=el.value.trim();
    if(!newName||newName===oldName)return;
    if(CONTACTS[newName]){alert('A contact named "'+newName+'" already exists.');el.value=oldName;return;}
    const entry=CONTACTS[oldName]; delete CONTACTS[oldName];
    CONTACTS[newName]=entry;
    ['pm','pe','pleName','cm'].forEach(k=>{if(D.master[k]===oldName)D.master[k]=newName;});
    rebuildAfterRoster();
    return;
  }
  if(el.dataset.chk){ /* checkbox groups */
    const arr=getPath(D,el.dataset.chk)||[];
    const i=arr.indexOf(el.value);
    if(el.checked&&i<0)arr.push(el.value);
    if(!el.checked&&i>=0)arr.splice(i,1);
    setPath(D,el.dataset.chk,arr);
    progress();
  }
  /* Technician → equipment auto-fill (Information Lists lookup) */
  if(el.dataset.techfill){
    const t=TECHS[el.value]; if(!t)return;
    const kind=el.dataset.techfill;
    if(kind==='mt'){
      Object.assign(NDE('mt'),{yokeModel:t.yokeModel||'',yokeSN:t.yokeSN||'',yokeCal:t.yokeCal||'',
        blBrand:t.blBrand||'',blModel:t.blModel||'',blSN:t.blSN||'',
        lmBrand:t.lmBrand||'',lmModel:t.lmModel||'',lmSN:t.lmSN||'',detSN:t.detSN||'',lmCal:t.lmCal||'',
        level2:el.value});

        xdModel:t.probeModel||'',xdSN:t.probeSN||'',level2:el.value});
    }
    buildPages(); renderAllTables(); refresh('nde'); nav('nde');
  }
  /* calibration date visual flag */
  if(el.dataset.cal){
    const sev=calSeverity(el.value);
    el.style.borderColor=sev==='expired'?'var(--fail)':sev==='soon'?'var(--amber)':'var(--line)';
    el.style.background=sev==='expired'?'var(--fail-t)':sev==='soon'?'var(--amber-t)':'#fff';
  }
});

document.addEventListener('paste',e=>{
  const el=e.target;
  if(el.dataset&&el.dataset.icell){
    const text=(e.clipboardData||window.clipboardData).getData('text');
    if(!/[\t\n]/.test(text))return;
    e.preventDefault();
    const [gi,r0,c0]=el.dataset.icell.split(',').map(Number);
    const g=D.intGrids[gi];
    const rows=text.replace(/\r/g,'').split('\n').filter(x=>x.trim()!=='');
    const block=rows.map(row=>row.split(/\t|,(?=\s*\d)/));
    block.forEach((row,ri)=>row.forEach((v,ci)=>{
      if(r0+ri<g.rows&&c0+ci<g.cols)g.cells[r0+ri][c0+ci]=v.trim();
    }));
    renderIntGrids();
    const back=$(`[data-icell="${gi},${r0},${c0}"]`); if(back)back.focus();
    return;
  }
  if(!el.dataset||!el.dataset.cell)return;
  const text=(e.clipboardData||window.clipboardData).getData('text');
  if(!/[\t\n]/.test(text))return; /* single value → default paste */
  e.preventDefault();
  const tok=el.dataset.cell.split(',');
  const fam=tok.length===4?tok[0]:'rs';
  const [gi,r0,c0]=tok.slice(-3).map(Number);
  const g=pitGridsOf(fam)[gi];
  const rows=text.replace(/\r/g,'').split('\n').filter(x=>x.trim()!=='');
  const block=rows.map(row=>row.split(/\t|,(?=\s*\d)/));
  const needR=r0+block.length, needC=c0+Math.max(...block.map(b=>b.length));
  if(needR>g.rows||needC>g.cols)resizeGrid(g,Math.max(g.rows,needR),Math.max(g.cols,needC));
  block.forEach((row,ri)=>row.forEach((v,ci)=>{
    const val=v.trim();
    if(r0+ri<g.rows&&c0+ci<g.cols)g.cells[r0+ri][c0+ci]=val===''?'':String(parseFloat(val)||val);
  }));
  fam==='h5'?renderH5Grids():renderH4Grids();
  const back=$(`[data-cell="${fam},${gi},${r0},${c0}"]`); if(back)back.focus();
});
document.addEventListener('change',e=>{
  if(e.target.id==='siteimg-in'&&e.target.files[0]){
    const f0=e.target.files[0];
    if(f0.size>4*1024*1024){alert('Site image over 4 MB — please resize first.');e.target.value='';return;}
    const rd0=new FileReader();
    rd0.onload=()=>{D.master.siteImg=rd0.result;D.report.include.digmap=1;renderReport();};
    rd0.readAsDataURL(f0); e.target.value=''; return;
  }
  if(e.target.id==='logo-in'&&e.target.files[0]){
    const f=e.target.files[0];
    if(f.size>2*1024*1024){alert('Logo file is over 2 MB — please use a smaller image.');e.target.value='';return;}
    const rd=new FileReader();
    rd.onload=()=>{D.brand.logo=rd.result;renderLogoPreview();renderReport();};
    rd.readAsDataURL(f); e.target.value=''; return;
  }
  if(e.target.id==='csv-in'&&e.target.files[0]){csvImportIndications(e.target.files[0]);e.target.value='';return;}
  if(e.target.id==='contacts-file'&&e.target.files[0]){contactsImport(e.target.files[0]);e.target.value='';return;}
  if(e.target.id==='roster-file'&&e.target.files[0]){rosterImport(e.target.files[0]);e.target.value='';return;}
  if(e.target.id==='zonelist-file'&&e.target.files[0]){zoneListsImport(e.target.files[0]);e.target.value='';return;}
  if(e.target.id==='operators-file'&&e.target.files[0]){operatorsImport(e.target.files[0]);e.target.value='';return;}
  if(e.target.id==='zonelist-pick'){ZONE_EDIT=e.target.value;renderZoneLists();return;}
  if(e.target.dataset&&e.target.dataset.ndepick){
    const k=e.target.dataset.ndepick; D.nde.idx[k]=+e.target.value; NDE_TAB=k;
    rebuildAfterRoster(); nav('nde'); return;}
});
$('#file-in')?.addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0]);e.target.value='';});


function redrawH3(){renderH3Views();}
function toggleH3Manual(){const m2=$('#h3-manual');if(m2)m2.style.display=D.profile.layoutMode==='manual'?'block':'none';}
function renderLogoPreview(){const p=$('#logo-preview');if(p)p.innerHTML=D.brand.logo?`<img src="${D.brand.logo}" style="height:28px;max-width:130px;object-fit:contain;border:1px solid var(--line);border-radius:3px;background:#fff;padding:2px">`:'<span style="font-size:.72rem;color:var(--ink3)">drawn mark</span>';}
/* drag components on the H3 drawing (manual mode) */
let H3DRAG=null;
document.addEventListener('pointerdown',e=>{
  const t=e.target.closest('[data-drag]'); if(!t)return;
  const svg=t.closest('svg'); if(!svg)return;
  const i=+t.dataset.drag, g2=D.profile.elems[i]; if(!g2)return;
  const scale=parseFloat(svg.dataset.h3scale)||0.01;
  const vscale=parseFloat(svg.dataset.h3vscale)||0;
  const pxScale=svg.getBoundingClientRect().width/ (svg.viewBox&&svg.viewBox.baseVal&&svg.viewBox.baseVal.width||svg.getBoundingClientRect().width);
  H3DRAG={i,x0:e.clientX,y0:e.clientY,s0:num(g2.start)||0,e0:num(g2.end),v0:num(g2.voff)||0,
          ftPerPx:scale/(pxScale||1), vftPerPx:vscale/(pxScale||1)};
  e.preventDefault();
});
document.addEventListener('pointermove',e=>{
  if(!H3DRAG)return;
  const g2=D.profile.elems[H3DRAG.i]; if(!g2){H3DRAG=null;return;}
  /* hold Shift to lock to one axis (whichever the pointer moved most) */
  const rawX=e.clientX-H3DRAG.x0, rawY=e.clientY-H3DRAG.y0;
  let doX=true, doY=H3DRAG.vftPerPx>0;
  if(e.shiftKey){ if(Math.abs(rawX)>=Math.abs(rawY))doY=false; else doX=false; }
  if(doX){
    const dft=rawX*H3DRAG.ftPerPx;
    g2.start=String(Math.round((H3DRAG.s0+dft)*100)/100);
    if(isFinite(H3DRAG.e0))g2.end=String(Math.round((H3DRAG.e0+dft)*100)/100);
  }
  if(doY){
    const dv=rawY*H3DRAG.vftPerPx;                       // + = dragged down = deeper
    g2.voff=String(Math.round((H3DRAG.v0+dv)*100)/100);
  }
  redrawH3();
});
document.addEventListener('pointerup',()=>{
  if(H3DRAG){renderTable('h3elems');H3DRAG=null;}
});

/* ---- boot ---- */
loadLibrary();          /* roster / contacts / zones / operators from last session */
buildNav();
buildPages();
renderAllTables();
refresh();
nav('dash');
updateSaveBadge();
checkAutosave();        /* offer to restore unsaved work from a crash or close */
</script>
