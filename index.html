<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DE Digital — Direct Examination Report System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#16232f; --ink2:#3d4f5f; --ink3:#6b7d8c;
  --paper:#f2f4f3; --sheet:#ffffff; --line:#d5dbde; --line2:#e7ebec;
  --steel:#2e5c8a; --steel-d:#214669; --steel-t:#e8eff6;
  --safety:#d9641e; --safety-t:#fbeee4;
  --pass:#2f7d4f; --pass-t:#e7f2ec;
  --fail:#b3352c; --fail-t:#f9e9e7;
  --amber:#a86a08; --amber-t:#faf1dd;
  --nav:#14222e; --nav2:#1c2f3f; --nav-t:#8fa6b8;
  --mono:'IBM Plex Mono',ui-monospace,Consolas,monospace;
  --disp:'Barlow Condensed','Arial Narrow',sans-serif;
  --body:'Public Sans',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{font-family:var(--body);background:var(--paper);color:var(--ink);display:flex;min-height:100vh}
button{font-family:var(--body);cursor:pointer}
input,select,textarea{font-family:var(--body);font-size:.88rem;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:3px;padding:.42em .55em;width:100%;transition:border-color .12s, box-shadow .12s}
input:focus,select:focus,textarea:focus,button:focus-visible{outline:none;border-color:var(--steel);box-shadow:0 0 0 3px rgba(46,92,138,.18)}
input[type=number]{font-family:var(--mono);font-size:.85rem}
textarea{resize:vertical;min-height:66px;line-height:1.45}
::placeholder{color:#a9b4bc}

/* ---------- SIDEBAR ---------- */
#sidebar{width:232px;min-width:232px;background:var(--nav);color:#cfdae2;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;scrollbar-width:thin}
#sidebar .brand{padding:18px 18px 14px;border-bottom:1px solid #24384a}
#sidebar .brand h1{font-family:var(--disp);font-weight:700;font-size:1.5rem;letter-spacing:.04em;color:#fff;line-height:1}
#sidebar .brand h1 span{color:#e8913f}
#sidebar .brand p{font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--nav-t);margin-top:5px}
#sidebar .grp{padding:14px 0 4px}
#sidebar .grp>h2{font-family:var(--disp);font-size:.72rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:#5f7689;padding:0 18px 6px}
#sidebar a.tab{display:flex;align-items:center;gap:9px;padding:7px 18px;color:#b9c8d3;font-size:.84rem;text-decoration:none;border-left:3px solid transparent}
#sidebar a.tab:hover{background:var(--nav2);color:#fff}
#sidebar a.tab.on{background:var(--nav2);color:#fff;border-left-color:#e8913f}
#sidebar a.tab .k{font-family:var(--mono);font-size:.66rem;color:#5f7689;min-width:26px}
#sidebar a.tab.on .k{color:#e8913f}
#sidebar .foot{margin-top:auto;padding:14px 18px;border-top:1px solid #24384a;font-size:.66rem;color:#5f7689;line-height:1.6}

/* ---------- TOPBAR ---------- */
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#topbar{position:sticky;top:0;z-index:40;background:var(--sheet);border-bottom:2px solid var(--ink);display:flex;align-items:center;gap:14px;padding:9px 22px}
#topbar .tb-id{font-family:var(--disp);font-weight:600;font-size:1.05rem;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#topbar .tb-id small{color:var(--ink3);font-family:var(--body);font-size:.7rem;font-weight:400;display:block;letter-spacing:.08em;text-transform:uppercase}
#tb-prog{display:flex;align-items:center;gap:8px;margin-left:auto}
#tb-prog .bar{width:130px;height:7px;background:var(--line2);border-radius:4px;overflow:hidden}
#tb-prog .bar i{display:block;height:100%;background:var(--steel);width:0%;transition:width .3s}
#tb-prog span{font-family:var(--mono);font-size:.72rem;color:var(--ink2)}
.tb-btn{border:1px solid var(--line);background:#fff;border-radius:4px;padding:.42em .8em;font-size:.78rem;font-weight:600;color:var(--ink2);white-space:nowrap}
.tb-btn:hover{border-color:var(--steel);color:var(--steel)}
.tb-btn.pri{background:var(--steel);border-color:var(--steel);color:#fff}
.tb-btn.pri:hover{background:var(--steel-d)}
#vbadge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:.72rem;padding:.35em .7em;border-radius:20px;background:var(--line2);color:var(--ink2);cursor:pointer;border:none}
#vbadge.ok{background:var(--pass-t);color:var(--pass)}
#vbadge.warn{background:var(--amber-t);color:var(--amber)}
#vbadge.err{background:var(--fail-t);color:var(--fail)}

/* ---------- CONTENT ---------- */
#content{padding:22px;max-width:1240px;width:100%;margin:0 auto}
.page{display:none}
.page.on{display:block;animation:fadein .18s ease}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.pg-head{display:flex;align-items:baseline;gap:14px;margin-bottom:4px}
.pg-head h2{font-family:var(--disp);font-weight:700;font-size:1.85rem;letter-spacing:.02em}
.pg-head .pg-no{font-family:var(--mono);font-size:.72rem;color:var(--safety);letter-spacing:.1em}
.pg-sub{color:var(--ink3);font-size:.84rem;margin-bottom:16px;max-width:70ch}

/* project header strip replicated on H pages */
.hdr-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));border:1px solid var(--line);border-left:4px solid var(--steel);background:var(--sheet);margin-bottom:18px}
.hdr-strip div{padding:7px 12px;border-right:1px solid var(--line2);min-width:0}
.hdr-strip b{display:block;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);font-weight:600}
.hdr-strip span{font-family:var(--mono);font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.hdr-strip span:empty::before{content:'—';color:#c3ccd2}

.card{background:var(--sheet);border:1px solid var(--line);border-radius:5px;margin-bottom:18px;overflow:hidden}
.card>h3{font-family:var(--disp);font-size:1.02rem;font-weight:600;letter-spacing:.05em;padding:10px 16px;border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:10px;background:linear-gradient(#fdfdfd,#f7f9f9)}
.card>h3 .sec-no{font-family:var(--mono);font-size:.68rem;color:var(--safety);background:var(--safety-t);padding:2px 7px;border-radius:3px;font-weight:600}
.card>h3 .hint{margin-left:auto;font-family:var(--body);font-size:.7rem;font-weight:400;color:var(--ink3);letter-spacing:0}
.card .bd{padding:14px 16px}
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:11px 14px}
.fgrid.g4{grid-template-columns:repeat(4,minmax(0,1fr))}
@media(max-width:920px){.fgrid.g4{grid-template-columns:repeat(2,minmax(0,1fr))}}
.fgrid .w2{grid-column:span 2}
.fgrid .w3{grid-column:1/-1}
.fld label{display:block;font-size:.68rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink2);margin-bottom:3px}
.fld label em{color:var(--fail);font-style:normal}
.fld .un{font-size:.62rem;color:var(--ink3);text-transform:none;letter-spacing:0;font-weight:400}
.chkrow{display:flex;flex-wrap:wrap;gap:6px 16px;padding-top:4px}
.chkrow label{display:inline-flex;align-items:center;gap:6px;font-size:.83rem;color:var(--ink2);font-weight:400;text-transform:none;letter-spacing:0;cursor:pointer}
.chkrow input{width:auto}

/* tables */
.twrap{overflow-x:auto}
table.dt{border-collapse:collapse;width:100%;font-size:.8rem}
table.dt th{font-family:var(--disp);font-weight:600;font-size:.74rem;letter-spacing:.06em;text-transform:uppercase;background:var(--ink);color:#e6edf2;padding:7px 8px;text-align:left;white-space:nowrap;position:sticky;top:0}
table.dt td{border-bottom:1px solid var(--line2);padding:3px 4px;vertical-align:middle;background:#fff}
table.dt tr:nth-child(even) td{background:#fafbfb}
table.dt input,table.dt select{border-color:transparent;background:transparent;padding:.35em .4em;border-radius:2px;min-width:64px}
table.dt input:hover,table.dt select:hover{border-color:var(--line)}
table.dt input:focus,table.dt select:focus{border-color:var(--steel);background:#fff}
table.dt .rowno{font-family:var(--mono);font-size:.7rem;color:var(--ink3);text-align:center;min-width:30px}
table.dt .del{border:none;background:none;color:#c3ccd2;font-size:1rem;line-height:1;padding:2px 6px;border-radius:3px}
table.dt .del:hover{color:var(--fail);background:var(--fail-t)}
.tbar{display:flex;gap:8px;align-items:center;padding:10px 16px;border-top:1px solid var(--line2);background:#fbfcfc}
.addbtn{border:1px dashed var(--steel);color:var(--steel);background:var(--steel-t);border-radius:4px;padding:.4em .9em;font-size:.78rem;font-weight:600}
.addbtn:hover{background:#dbe8f4}
.tbar .note{font-size:.72rem;color:var(--ink3);margin-left:auto}

/* stat chips + calc results */
.stats{display:flex;flex-wrap:wrap;gap:10px}
.stat{flex:1;min-width:130px;border:1px solid var(--line);border-radius:5px;padding:10px 13px;background:#fff}
.stat b{display:block;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);font-weight:600;margin-bottom:2px}
.stat .v{font-family:var(--mono);font-size:1.25rem;font-weight:600}
.stat .v small{font-size:.7rem;color:var(--ink3);font-weight:400}
.stat.good{border-color:var(--pass);background:var(--pass-t)} .stat.good .v{color:var(--pass)}
.stat.bad{border-color:var(--fail);background:var(--fail-t)} .stat.bad .v{color:var(--fail)}
.stat.mid{border-color:var(--amber);background:var(--amber-t)} .stat.mid .v{color:var(--amber)}

.gridpad{display:grid;grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:4px}
.gridpad input{font-family:var(--mono);font-size:.78rem;text-align:center;padding:.35em .2em}

.banner{border-left:4px solid var(--amber);background:var(--amber-t);color:#6d4a10;padding:10px 14px;font-size:.82rem;border-radius:0 4px 4px 0;margin-bottom:12px}
.banner.crit{border-color:var(--fail);background:var(--fail-t);color:#7d2620}
.banner.info{border-color:var(--steel);background:var(--steel-t);color:var(--steel-d)}

/* unsaved-changes indicator on the Save button */
.tb-btn.unsaved{position:relative}
.tb-btn.unsaved::after{content:'';position:absolute;top:-3px;right:-3px;width:9px;height:9px;border-radius:50%;
  background:var(--amber);border:1.5px solid #fff;box-shadow:0 0 0 1px var(--amber)}
.save-note{font-size:.68rem;color:var(--ink3);margin-left:8px;white-space:nowrap;align-self:center}

/* section divider bar (casing 5.0 / 6.0) */
.sec-bar{background:var(--ink);color:#fff;font-weight:700;font-size:.86rem;letter-spacing:.04em;
  padding:8px 14px;border-radius:4px;margin:22px 0 12px;text-transform:uppercase}

/* zone recipient tags */
.zr-tag{display:inline-block;font-family:var(--mono);font-size:.62rem;font-weight:600;letter-spacing:.04em;padding:1px 7px;border-radius:20px;text-transform:uppercase}
.zr-tag.to{background:var(--pass-t);color:var(--pass)}
.zr-tag.role{background:var(--amber-t);color:var(--amber)}
.zr-tag.cc{background:var(--line2);color:var(--ink2)}

/* contact field with inline "add to contacts" affordance */
.cfield{display:flex;gap:5px;align-items:stretch}
.cfield input{flex:1;min-width:0}
.cadd{flex:0 0 auto;width:30px;border:1px dashed var(--line);background:var(--line2);color:var(--ink3);border-radius:4px;font-size:1rem;font-weight:700;line-height:1;cursor:pointer;transition:all .15s}
.cadd:hover{background:var(--steel-t);color:var(--steel-d);border-color:var(--steel)}
.cadd.on{border-style:solid;border-color:var(--amber);background:var(--amber-t);color:var(--amber);animation:cpulse 1.4s ease-in-out 2}
@keyframes cpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.cadd.known{visibility:hidden}
/* quick-add modal */
.cmask{position:fixed;inset:0;background:rgba(20,26,32,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.cmodal{background:var(--bg);border-radius:8px;box-shadow:0 18px 50px rgba(0,0,0,.4);width:100%;max-width:440px;overflow:hidden}
.cmodal h4{background:var(--ink);color:#fff;font-size:.95rem;padding:12px 16px;font-weight:600}
.cmodal .cbody{padding:16px}
.cmodal .cfoot{display:flex;gap:8px;justify-content:flex-end;padding:12px 16px;border-top:1px solid var(--line2);background:var(--line2)}
.cmodal label{display:block;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink2);margin:10px 0 4px}
.cmodal label:first-child{margin-top:0}
.cmodal input,.cmodal select{width:100%}

/* validation list */
.vlist{list-style:none}
.vlist li{display:flex;gap:10px;align-items:flex-start;padding:8px 14px;border-bottom:1px solid var(--line2);font-size:.83rem}
.vlist li:last-child{border:none}
.vlist .tag{font-family:var(--mono);font-size:.62rem;letter-spacing:.08em;padding:2px 7px;border-radius:3px;white-space:nowrap;margin-top:1px}
.vlist li.ok .tag{background:var(--pass-t);color:var(--pass)}
.vlist li.warn .tag{background:var(--amber-t);color:var(--amber)}
.vlist li.err .tag{background:var(--fail-t);color:var(--fail)}
.vlist .where{color:var(--ink3);font-size:.7rem;display:block}
.vlist li a{color:var(--steel)}

/* svg maps */
.mapbox{background:#fff;padding:8px 4px 2px}
.mapbox svg{display:block;width:100%;height:auto}
.legend{display:flex;flex-wrap:wrap;gap:5px 12px;padding:10px 16px;border-top:1px solid var(--line2);font-size:.7rem;color:var(--ink2)}
.legend i{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:-1px}

/* dashboard */
.dashgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.dash-cov{border-top:4px solid var(--steel)}
.doclist{list-style:none}
.doclist li{display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px dashed var(--line2);font-size:.84rem}
.doclist li:last-child{border:none}

.pillrow{display:flex;flex-wrap:wrap;gap:6px}
.pill{font-family:var(--mono);font-size:.7rem;background:var(--line2);border-radius:12px;padding:3px 10px;color:var(--ink2)}
.pill.hot{background:var(--safety-t);color:var(--safety)}

.subtabs{display:flex;gap:2px;border-bottom:2px solid var(--ink);margin-bottom:16px;flex-wrap:wrap}
.subtabs button{border:1px solid var(--line);border-bottom:none;background:#e9edee;color:var(--ink2);font-size:.8rem;font-weight:600;padding:.5em 1.1em;border-radius:5px 5px 0 0}
.subtabs button.on{background:var(--ink);border-color:var(--ink);color:#fff}
.subpane{display:none}.subpane.on{display:block}

.footer-note{color:var(--ink3);font-size:.68rem;text-align:center;padding:8px 0 30px}
kbd{font-family:var(--mono);font-size:.68rem;background:var(--line2);padding:1px 5px;border-radius:3px}


/* pit depth entry grid */
.pitwrap{overflow-x:auto;border:1px solid var(--line);border-radius:4px}
table.pit{border-collapse:collapse;font-family:var(--mono);font-size:.72rem}
table.pit th{background:var(--ink);color:#dbe6ee;font-weight:500;padding:3px 5px;text-align:center;min-width:46px;position:sticky;top:0;font-size:.62rem;white-space:nowrap}
table.pit th.rowhdr{position:sticky;left:0;z-index:2;min-width:74px;background:var(--nav2)}
table.pit td{border:1px solid var(--line2);padding:0}
table.pit td input{border:none;border-radius:0;width:100%;min-width:46px;padding:.3em .2em;text-align:center;font-family:var(--mono);font-size:.74rem;background:transparent}
table.pit td input:focus{background:var(--steel-t);box-shadow:inset 0 0 0 2px var(--steel)}
table.pit td.deep input{background:var(--fail-t);color:var(--fail);font-weight:600}
table.pit td.warm input{background:var(--amber-t)}
table.pit tr.rb td{background:#14222e;color:#ffd9a8;text-align:center;padding:.32em .2em;font-weight:600;font-size:.72rem}
table.pit tr.rb th.rowhdr{background:#0d1720;color:#e8913f}
.dimrow{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;margin-bottom:10px}
.dimrow .fld{min-width:110px}
.dimrow button{height:34px}
/* roster */
.tech-card{border:1px solid var(--line);border-radius:5px;margin-bottom:10px;background:#fff}
.tech-card>summary{cursor:pointer;padding:10px 14px;display:flex;align-items:center;gap:10px;font-weight:600;list-style:none}
.tech-card>summary::-webkit-details-marker{display:none}
.tech-card>summary .chev{margin-left:auto;color:var(--ink3);transition:transform .15s}
.tech-card[open]>summary .chev{transform:rotate(90deg)}
.tech-card .bd{padding:12px 14px;border-top:1px solid var(--line2)}
.cal-chip{font-family:var(--mono);font-size:.64rem;padding:2px 8px;border-radius:10px}
.cal-chip.ok{background:var(--pass-t);color:var(--pass)}
.cal-chip.soon{background:var(--amber-t);color:var(--amber)}
.cal-chip.expired{background:var(--fail-t);color:var(--fail)}

@media (max-width:900px){
  #sidebar{position:fixed;left:-240px;z-index:100;transition:left .2s;box-shadow:4px 0 20px rgba(0,0,0,.2)}
  #sidebar.open{left:0}
  #menu-btn{display:inline-flex}
}
#menu-btn{display:none;border:1px solid var(--line);background:#fff;border-radius:4px;padding:.35em .6em;font-size:1rem}

/* ================= REPORT / PRINT SYSTEM ================= */
#report-pages{background:#9aa3a8;padding:18px;border-radius:6px}
.rpage{background:#fff;width:1056px;min-height:816px;margin:0 auto 18px;box-shadow:0 3px 14px rgba(0,0,0,.28);position:relative;padding:34px 44px;box-sizing:border-box;color:#000;font-size:11.5px;line-height:1.35;overflow:hidden}
.rpage.portrait{width:816px;min-height:1056px}
.rpage *{box-sizing:border-box}
.rpage table{border-collapse:collapse}
.r-dblrule{border-top:2.5px solid var(--rp-accent);border-bottom:1px solid var(--rp-accent);height:5px;margin:6px 0}
.r-secbar{background:#000;color:#fff;font-weight:700;font-size:12px;padding:2px 8px;margin:14px 0 8px}
.r-kv{display:flex;gap:8px;padding:2.5px 0}
.r-kv b{min-width:250px;text-align:right;font-weight:700}
.r-cols{display:grid;grid-template-columns:1fr 1fr;column-gap:30px}
.r-box{border:1.4px solid #000;padding:6px 10px;margin-bottom:10px;min-height:44px}
.r-boxlbl{border:1.4px solid #000;display:inline-block;padding:1px 10px;font-weight:700;background:#fff;position:relative;top:10px;margin-left:8px;font-size:11.5px}
.r-hdrstrip{border:1.6px solid #000;font-weight:700;font-size:11.5px;padding:4px 8px;display:flex;gap:0;justify-content:space-between;margin-bottom:8px}
.r-footer{position:absolute;bottom:26px;left:44px;right:44px;font-size:10.5px;display:flex;justify-content:space-between}
.r-brand{font-family:var(--rp-disp);font-weight:800;font-size:26px;letter-spacing:.5px}
.r-brand i{display:inline-block;width:56px;height:30px;background:linear-gradient(115deg,var(--rp-accent) 55%,#c8102e 55%,#c8102e 63%,var(--rp-accent) 63%);clip-path:polygon(0 100%,100% 0,100% 100%);margin-right:8px;vertical-align:-6px}
table.r-grid{width:100%;font-size:10px}
table.r-grid th,table.r-grid td{border:1px solid #000;padding:2px 4px;text-align:center}
table.r-grid th{background:var(--rp-hdrbg);color:var(--rp-hdrfg);font-size:9.5px}
table.r-grid td.lab{background:#efefef;font-weight:700;text-align:left}
.r-sig{display:flex;align-items:flex-end;gap:14px;margin-top:12px;font-size:11px}
.r-sig .ln{border-bottom:1px solid #000;min-width:170px;text-align:center;padding:0 8px}
/* map page layout */
.r-maprow{display:flex;gap:10px}
.r-mapmain{flex:1;min-width:0}
.r-mapside{width:190px}
.r-sidebox{border:1.4px solid #000;margin-bottom:12px;font-size:10px}
.r-sidebox h4{background:#d9d9d9;border-bottom:1.4px solid #000;font-size:10.5px;font-weight:700;text-align:center;padding:2px}
.r-sidebox .row{display:flex;border-bottom:.6px solid #999}
.r-sidebox .row:last-child{border-bottom:none}
.r-sidebox .row b{width:74px;padding:1.5px 4px;border-right:.6px solid #999}
.r-sidebox .row span{padding:1.5px 4px;flex:1;word-break:break-word}
.r-leg{display:flex;align-items:center;border-bottom:.6px solid #999;font-size:9.5px}
.r-leg i{width:22px;height:9px;border:1px solid #444;margin:1.5px 4px}
.r-leg b{width:34px}
/* LSC checkbox form */
.lscbox{border:1.6px solid #000;font-size:9.6px;break-inside:avoid}
.lscbox h5{border-bottom:1.2px solid #000;text-align:center;font-size:10.4px;padding:2px;font-weight:700}
.lscbox .it{display:flex;gap:5px;padding:2.5px 5px;align-items:flex-start;line-height:1.25}
.lscbox .cb{width:10px;height:10px;border:1.2px solid #000;display:inline-flex;align-items:center;justify-content:center;flex:0 0 10px;margin-top:1px;font-size:10px;font-weight:700;line-height:1;overflow:visible}
.lscbox .cb.x::before{content:'\\2713'}
.lsc3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
/* ---- Form-H checkbox data sheet (pages 1 & 2), replicates PDF ---- */
.hf-line{display:flex;align-items:flex-start;gap:6px;padding:2px 0;font-size:9.6px;line-height:1.3;border-bottom:.5px dotted #c9c9c9}
.hf-line:last-child{border-bottom:none}
.hf-line .no{min-width:30px;font-weight:700;color:#333}
.hf-line .lab{min-width:220px;font-weight:700}
.hf-line .lab.narrow{min-width:150px}
.hf-line .val{flex:1;min-width:0}
.hf-sec{background:#000;color:#fff;font-weight:700;font-size:10px;padding:2px 8px;margin:9px 0 5px}
.hf-subhd{font-weight:700;font-size:10px;border-bottom:1.5px solid #000;margin:7px 0 3px;padding-bottom:1px}
/* inline checkbox option: box + label; .on = selected (checked) */
.cbx{display:inline-flex;align-items:center;gap:3px;margin:0 9px 1px 0;font-size:9.4px;white-space:nowrap;vertical-align:middle}
.cbx .bx{width:10px;height:10px;border:1.1px solid #000;display:inline-flex;align-items:center;justify-content:center;flex:0 0 10px;background:#fff;font-size:9px;font-weight:700;line-height:1;color:#000;overflow:visible}
.cbx.on .bx::before{content:'X'}
.cbx.on{font-weight:700}
.cbx .bx.dot::before{content:'\\2022';font-size:8px}
.hf-cbrow{display:flex;flex-wrap:wrap;align-items:center;gap:1px 0}
/* boxed value (the underlined data cells on the PDF) */
.hf-fillrow{display:flex;flex-wrap:wrap;gap:3px 14px;align-items:baseline;padding:2px 0;font-size:9.4px}
.hf-fill{display:inline-flex;align-items:baseline;gap:4px}
.hf-fill b{font-weight:700}
.hf-fill span{border-bottom:1px solid #000;min-width:46px;text-align:center;padding:0 4px;display:inline-block}
.hf-note{font-size:8.6px;color:#333;padding:1px 0 1px 30px;font-style:italic}
/* THEMES */
.th-acuren{--rp-accent:#1f4e79;--rp-accent2:#2e74b5;--rp-hdrbg:#a9d08e;--rp-hdrfg:#000;--rp-disp:Calibri,'Public Sans',sans-serif;font-family:Calibri,'Public Sans',Carlito,sans-serif}
.th-acuren .r-title{color:#2e74b5;font-weight:700}

.th-slate{--rp-accent:#14222e;--rp-accent2:#d9641e;--rp-hdrbg:#14222e;--rp-hdrfg:#fff;--rp-disp:'Barlow Condensed',sans-serif;font-family:'Public Sans',sans-serif}
.th-slate .r-title{color:#14222e;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:.03em}
.th-slate .r-blue{color:#d9641e}

@media print{
  #sidebar,#topbar,.tbar,.addbtn,.tb-btn,.noprint,.rp-controls,.footer-note,.pg-head,.pg-sub{display:none!important}
  body{background:#fff}
  .page{display:none!important}
  .page.on{display:block!important}
  #content{max-width:none;padding:0}

  .rpage.portrait{page:portraitPg}

}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

   Company" -> "Pacific Gas & Electric"). */
function normalizeOperator(v){
  const s=String(v||'').trim(); if(!s)return s;
  if(OPERATORS[s])return s;
  const low=s.toLowerCase().replace(/[.,]/g,'');
  for(const [k,o] of Object.entries(OPERATORS)){
    const cands=[k,o.abbr,o.legalName].filter(Boolean).map(x=>String(x).toLowerCase().replace(/[.,]/g,''));
    if(cands.includes(low))return k;
    if(low.includes(String(o.legalName||'').toLowerCase().replace(/[.,]/g,''))&&o.legalName)return k;
  }

  if(/national grid/.test(low))return 'National Grid';
  if(/sacramento municipal|smud/.test(low))return 'Sacramento Municipal Utility District';
  return s;

function lookupEmail(name){
  if(!name)return '';
  if(CONTACTS[name]&&CONTACTS[name].email)return CONTACTS[name].email;
  for(const z of ZONE_NAMES){ const hit=(ZONE_LISTS[z]||[]).find(c=>c.name===name&&c.email); if(hit)return hit.email; }
  return '';
}
function zoneList(zone){ return ZONE_LISTS[zone]||[]; }

function riverBottom(g){ /* deepest reading per axial column — RSTRENG input, as workbook row 71 */
  const out=[];
  for(let c=0;c<g.cols;c++){
    let mx=0,any=false;
    for(let r=0;r<g.rows;r++){ const v=parseFloat(g.cells[r]?.[c]); if(isFinite(v)){any=true; if(v>mx)mx=v;} }
    out.push(any?mx:0);
  }
  return out;
}

/* WT-grid sizing rule (spec 5.5 / Table 1, matches template H6 & H6(2)):
   OD > 6.625"  -> 1"x1" grid, 12" circ window centered at 6:00 (circ start = OD*pi/2 - 6), 12 axial rows (1 ft)
   OD <= 6.625" -> 0.5"x0.5" grid, bottom 180 deg (circ start at 3:00 = OD*pi/4), 12" axial = 24 rows */
function intGridSpec(od){
  od=num(od);
  if(!isFinite(od)||od<=0)return null;
  const circ=od*Math.PI;
  if(od>6.625){
    return {spacing:1, cols:12, rows:12, circStartIn:circ/2-6};
  }
  const cols=Math.max(Math.round((circ/2)/0.5),4);
  return {spacing:0.5, cols, rows:24, circStartIn:circ/4};
}
function clockAtCircIn(circIn,circ){ /* inches from TDC -> h:mm clock */
  if(!(circ>0))return '';
  let h=(circIn/circ)*12; h=((h%12)+12)%12; if(h===0)h=12;
  const hh=Math.floor(h), mm=Math.floor((h-hh)*60); /* Excel h:mm floors minutes — matches template/deliverable */
  return hh+':'+String(mm).padStart(2,'0');
}
function resizeIntGrid(g,rows,cols){
  rows=Math.max(1,Math.min(48,rows|0)); cols=Math.max(1,Math.min(60,cols|0));

  for(let r=0;r<rows;r++)nc.push(Array.from({length:cols},(_,c)=>(g.cells[r]&&g.cells[r][c]!==undefined)?g.cells[r][c]:''));
  g.rows=rows;g.cols=cols;g.cells=nc;
}

/* ============================================================
   FAILURE PRESSURE ENGINE — exact port of RSTRENG.bas
   B31G · Modified B31G (0.85dL) · Effective Area (RSTRENG)
   ============================================================ */
function runRSTRENG(readingsMils, gridSpacingIn, tIn, dIn, SMYS, MOP, MAOP){
  const out={ok:false,msgs:[]};
  const t=tIn, d=dIn, G=gridSpacingIn;
  const r=readingsMils.map(x=>isFinite(x)?x:0);
  const n=r.length;
  if(!(t>0&&d>0&&SMYS>0&&MAOP>0)){out.msgs.push('Missing inputs: AWT, diameter, SMYS and MAOP are required (Master tab).');return out;}
  if(!(G>0)){out.msgs.push('Grid spacing must be greater than zero.');return out;}
  if(n<1||!r.some(x=>x>0)){out.msgs.push('No non-zero depth data points found. Enter corrosion depth measurements.');return out;}
  const maxMils=Math.max(...r);
  if(maxMils/1000>=t){out.msgs.push('Wall loss ('+maxMils+' mils) meets or exceeds original wall thickness — pipe is through-wall. Calculation not valid.');return out;}
  if(!(MOP>0)){out.msgs.push('MOP not entered — using MAOP for ratio (enter MOP on Master if known).'); MOP=MAOP;}

  /* first / last non-zero, virtual zero handling — as in BtnCalcCorrosion_Click */
  let firstNZ=r.findIndex(x=>x>0);
  let lastNZ=n-1; while(lastNZ>=0&&!(r[lastNZ]>0))lastNZ--;
  const virtLead=r[0]>0, virtTrail=r[n-1]>0;
  const startCol=firstNZ>0?firstNZ-1:0;
  const endCol=lastNZ<n-1?lastNZ+1:n-1;
  const aStart=virtLead?-1:startCol;
  const aEnd=virtTrail?n:endCol;

  const dep=k=>(k<0||k>=n)?0:r[k]/1000;
  const folias=Lx=>{const q=Lx*Lx/(d*t);return q<=50?Math.sqrt(1+0.6275*q-0.003375*q*q):0.032*q+3.3;};

  let BP=1e9, Pf=1e9, effLen=0, effStart=0, effEnd=0, effArea=0, MaxD=0;
  for(let j=aStart;j<=aEnd-1;j++){
    const Li=j*G; let Ax=0;
    for(let i=j+1;i<=aEnd;i++){
      const L1=(i-1)*G, L2=i*G;
      const H1=dep(i-1), H2=dep(i);
      const Havg=(H1+H2)/2;
      if(H1>MaxD)MaxD=H1; if(H2>MaxD)MaxD=H2;
      Ax+=Math.abs((L2-L1)*Havg);
      const Lx=L2-Li, Ao=Lx*t;
      if(Ao>0){
        if(Ax>=Ao){out.msgs.push('Wall loss area ≥ original pipe area within a segment — data error.');return out;}
        const Mt=folias(Lx);
        const Mp=(1-(Ax/Ao)/Mt)/(1-(Ax/Ao));
        const P1=(1/Mp)*(SMYS+10000)*2*t/d;
        if(P1<BP)BP=P1;
        if(P1<Pf){Pf=P1;effLen=Lx;effStart=Li;effEnd=L2;effArea=Ax;}
      }
    }
  }

  /* Modified B31G — 0.85 dL over full profile */
  const LxT=(aEnd-aStart)*G;
  const Ao85=t*LxT, Ax85=0.85*MaxD*LxT;
  if(!(Ao85>0)){out.msgs.push('Increase corrosion area to include a minimum of three cells.');return out;}
  const Mt85=folias(LxT);
  const Mp85=(1-(Ax85/Ao85)/Mt85)/(1-(Ax85/Ao85));
  const P185=(1/Mp85)*(SMYS+10000)*2*t/d;

  /* Original B31G */
  const a=0.893*LxT/Math.sqrt(d*t);
  const P2=2*SMYS*t/d;
  const dt=MaxD/t;
  const Pb31g = a<=4
    ? 1.1*P2*((1-(2/3)*dt)/(1-((2/3)*dt/Math.sqrt(a*a+1))))
    : 1.1*P2*(1-dt);

  /* failure length screens (CalcFailureLength_B31G / _M31G) */
  function failLenB31G(){let L=0.01,res=0,P=1e6;const p=2*SMYS*t/d;
    while(P>=MAOP&&L<=100){const aa=0.893*L/Math.sqrt(d*t),C1=Math.sqrt(aa*aa+1);
      P=aa<=4?1.1*p*((1-(2/3)*dt)/(1-((2/3)*dt/C1))):1.1*p*(1-dt);
      if(P<=MAOP)res=L; L+=0.01;} return res;}
  function failLenM31G(){let L=0.01,res=0,P=1e6;
    while(P>=MAOP&&L<=70){const Ax=0.85*MaxD*L,Ao=t*L,Mt=folias(L);
      const Mp=(1-(Ax/Ao)/Mt)/(1-(Ax/Ao)); P=(1/Mp)*(SMYS+10000)*2*t/d;
      if(P<=MAOP)res=L; L+=0.01;} return res;}

  out.ok=true;
  out.Pf=Pf; out.P85=P185; out.Pb31g=Pb31g;
  out.rEff=Pf/MOP; out.r85=P185/MOP; out.rB31g=Pb31g/MOP;
  out.sfEff=Pf/MAOP; out.sf85=P185/MAOP; out.sfB31g=Pb31g/MAOP;
  out.effLen=effLen; out.effArea=effArea; out.effStart=effStart; out.effEnd=effEnd;
  out.maxD=MaxD; out.pctWall=dt*100; out.profileLen=LxT;
  out.failLenB=failLenB31G(); out.failLenM=failLenM31G();
  if(dt>0.8) out.msgs.push('Defect depth exceeds 80% of wall thickness — repair may be required depending on code or regulatory jurisdiction.');
  return out;
}

 bluered:[[0,'#2e5c8a'],[.5,'#c9c9c9'],[1,'#b3352c']],

};
function lerpHex(a,b,t){
  const pa=parseInt(a.slice(1),16),pb=parseInt(b.slice(1),16);
  const ar=(pa>>16)&255,ag=(pa>>8)&255,ab=pa&255, br=(pb>>16)&255,bg=(pb>>8)&255,bb=pb&255;
  const r=Math.round(ar+(br-ar)*t),g=Math.round(ag+(bg-ag)*t),b2=Math.round(ab+(bb-ab)*t);
  return '#'+[r,g,b2].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function gradientColor(preset,pct){
  const stops=GRADIENTS[preset]||GRADIENTS.traffic;
  pct=Math.max(0,Math.min(1,pct));
  for(let i=0;i<stops.length-1;i++){
    const [t0,c0]=stops[i], [t1,c1]=stops[i+1];
    if(pct>=t0&&pct<=t1)return lerpHex(c0,c1,(pct-t0)/((t1-t0)||1));
  }
  return stops[stops.length-1][1];
}

      return `<td><input type="${c.type||'text'}" data-p="${p}" value="${esc(v)}" style="min-width:${c.w||64}px"${c.step?` step="${c.step}"`:''}></td>`;
    }).join('');
    return `<tr><td class="rowno">${i+1}</td>${cells}<td><button class="del" data-del="${id}" data-i="${i}" title="Delete row">✕</button></td></tr>`;
  }).join('');
  const tn=$('#tn-'+id); if(tn)tn.textContent=arr.length+' row'+(arr.length!==1?'s':'');
}

/* header strip shown on every H page (linked cells in the workbook) */
function hdrStrip(){
  const m=D.master;
  const f=(l,v)=>`<div><b>${l}</b><span>${esc(v)}</span></div>`;
  return `<div class="hdr-strip">${
    f('Line / Route',m.lineNumber)+f('Mile point',m.milePoint)+f('Dig site',m.digSite)+
    f('Order no.',m.orderNumber)+f('Stationing',m.stationing)+f('Ref. girth weld',m.refGirthWeld)+
    f('Excavation date',m.dExcavation)+f('Examined by',m.techs)+f(opAbbr()+' PM',m.pm)
  }</div>`;
}

function uttStats(){
  const el=$('#utt-stats'); if(!el)return;
  const all=D.sections.flatMap(s=>s.utt.map(v=>num(v))).filter(v=>isFinite(v)&&v>0);
  const nwt=wallIn(D.master.nwt)*1000;
  const mn=all.length?Math.min(...all):NaN, mx=all.length?Math.max(...all):NaN,
        avg=all.length?all.reduce((a,b)=>a+b,0)/all.length:NaN;
  const low=isFinite(mn)&&isFinite(nwt)&&mn<nwt*0.875;
  el.innerHTML=
    `<div class="stat"><b>Readings</b><div class="v">${all.length}</div></div>
     <div class="stat ${low?'bad':''}"><b>Minimum</b><div class="v">${fmt(mn)}<small> mils</small></div></div>
     <div class="stat"><b>Maximum</b><div class="v">${fmt(mx)}<small> mils</small></div></div>
     <div class="stat"><b>Average</b><div class="v">${fmt(avg,1)}<small> mils</small></div></div>
     <div class="stat"><b>Nominal wall</b><div class="v">${fmt(nwt)}<small> mils</small></div></div>`+
    (low?`<div class="stat bad" style="flex:2;min-width:220px"><b>Flag</b><div style="font-size:.8rem;padding-top:4px">Minimum UTT is below 87.5% of nominal wall — investigate as metal loss.</div></div>`:'');
}
function syncH2(){ /* keep one findings record per section */
  while(D.h2.length<D.sections.length)D.h2.push({sec:D.h2.length+1,visual:'',uttNotes:'',wfmtPerformed:'',wfmt:'',linFound:'',seamMethod:'',acidEtch:'',otherDamages:'None',comments:''});
  D.h2.length=D.sections.length;
}
function indicationsInSection(i){
  const s=D.sections[i]; if(!s)return [];
  const a=num(s.start),b=isFinite(num(s.end))?num(s.end):Infinity;
  return D.indications.filter(r=>{const x=num(r.dist);return isFinite(x)&&x>=a&&x<b;});
}
function autoFillH2(i){
  const rows=indicationsInSection(i);
  const mech=rows.filter(r=>TCAT_LEGEND[r.type]&&TCAT_LEGEND[r.type][1]==='MD');
  const corr=rows.filter(r=>['EC','CEC','EML','IC','IML'].includes(r.type));
  const lin=rows.filter(r=>['LIN','SCC'].includes(r.type));
  const other=rows.filter(r=>!mech.includes(r)&&!corr.includes(r)&&!lin.includes(r));
  const cnt=arr=>{const c={};arr.forEach(r=>{c[r.type]=(c[r.type]||0)+1;});return Object.entries(c).map(([k,v])=>`${v}-${k}`).join(', ');};
  const f=D.h2[i];
  f.linFound=lin.length?'Yes':'No';
  f.wfmtPerformed=f.wfmtPerformed||'Yes';
  f.wfmt=lin.length?`WFMT revealed ${lin.length} Linear Indication${lin.length>1?'s':''} (LIN).`:'WFMT revealed no relevant indications.';
  f.otherDamages=cnt(other)||(mech.length?'':'None');
  f.comments=[mech.length?cnt(mech)+' mechanical damage':'',corr.length?cnt(corr)+' corrosion':''].filter(Boolean).join(' · ');
  renderH2f(); refresh('sitelog');
}

/* ---- SVG helpers ---- */
function svgOpen(w,h){return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" role="img">`;}
function pipeStrip(elId, rows, colorFn, legendId, legendTypes){
  const el=$('#'+elId); if(!el)return;
  const pts=rows.map(r=>({x:num(r.dist),c:clockToNum(r.clock),t:r.type,id:r.id||r.no||'',len:num(r.len)}))
                .filter(p=>isFinite(p.x));
  const gw=D.sections.map(s=>num(s.start)).filter(v=>isFinite(v));
  const gwEnd=D.sections.map(s=>num(s.end)).filter(v=>isFinite(v));
  const xs=[...pts.map(p=>p.x),...gw,...gwEnd, num(D.master.assessStart), num(D.master.assessEnd)].filter(v=>isFinite(v));
  const x0=xs.length?Math.min(...xs):0, x1=xs.length?Math.max(...xs):10;
  const span=(x1-x0)||10, pad=span*0.04;
  const W=980,H=300,L=52,R=20,T=18,B=40;
  const X=v=>L+((v-(x0-pad))/(span+2*pad))*(W-L-R);
  const Y=c=>T+((c===0?12:c)/12===1&&c!==12?H:0)||0; // placeholder, replaced below
  const Yc=c=>{let cc=c%12; return T+(cc/12)*(H-T-B);};
  let s=svgOpen(W,H);
  s+=`<rect x="${L}" y="${T}" width="${W-L-R}" height="${H-T-B}" fill="#fbfcfd" stroke="#d5dbde"/>`;
  for(let c=0;c<=12;c+=3){
    s+=`<line x1="${L}" y1="${Yc(c)}" x2="${W-R}" y2="${Yc(c)}" stroke="#e7ebec"/>`+
       `<text x="${L-6}" y="${Yc(c)+4}" font-size="10" text-anchor="end" fill="#6b7d8c" font-family="IBM Plex Mono,monospace">${c===0?12:c}:00</text>`;
  }
  const ticks=6;
  for(let i=0;i<=ticks;i++){
    const v=x0-pad+((span+2*pad)/ticks)*i;
    s+=`<line x1="${X(v)}" y1="${H-B}" x2="${X(v)}" y2="${H-B+5}" stroke="#6b7d8c"/>`+
       `<text x="${X(v)}" y="${H-B+18}" font-size="10" text-anchor="middle" fill="#6b7d8c" font-family="IBM Plex Mono,monospace">${v.toFixed(1)}</text>`;
  }
  s+=`<text x="${(L+W-R)/2}" y="${H-4}" font-size="10" text-anchor="middle" fill="#3d4f5f" font-family="Barlow Condensed,sans-serif" letter-spacing="2">AXIAL DISTANCE FROM REFERENCE (FT) — FLOW →</text>`;
  /* girth welds */
  const gwSet=[...new Set([...gw,...gwEnd])];
  gwSet.forEach(g=>{ s+=`<line x1="${X(g)}" y1="${T}" x2="${X(g)}" y2="${H-B}" stroke="#16232f" stroke-width="1.6" stroke-dasharray="1 3"/>`+
    `<text x="${X(g)+2}" y="${T+10}" font-size="8.5" fill="#16232f" font-family="IBM Plex Mono,monospace">GW</text>`;});
  /* long seams per section */
  D.sections.forEach(sec=>{
    const c=clockToNum(sec.seamLoc), a=num(sec.start), b=num(sec.end);
    if(isFinite(c)&&isFinite(a)&&isFinite(b))
      s+=`<line x1="${X(a)}" y1="${Yc(c)}" x2="${X(b)}" y2="${Yc(c)}" stroke="#e8913f" stroke-width="1.4" stroke-dasharray="6 3" opacity=".85"/>`;
  });
  /* indications */
  pts.forEach(p=>{
    const cy=isFinite(p.c)?Yc(p.c):Yc(6);
    const rr=isFinite(p.len)&&p.len>0?Math.min(4+p.len*0.5,11):5;
    s+=`<circle cx="${X(p.x)}" cy="${cy}" r="${rr}" fill="${colorFn(p.t)}" fill-opacity=".82" stroke="#fff" stroke-width="1"><title>${esc(p.id||p.t)} · ${p.x} ft · ${esc(p.t)}</title></circle>`;
  });
  if(!pts.length) s+=`<text x="${(L+W-R)/2}" y="${(T+H-B)/2}" font-size="13" text-anchor="middle" fill="#a9b4bc">No plotted entries yet — add rows with distance + clock to draw the map</text>`;
  s+='</svg>';
  el.innerHTML=s;
  const lg=$('#'+legendId);
  if(lg){
    const used=new Set(pts.map(p=>p.t).filter(Boolean));
    lg.innerHTML=legendTypes.filter(t=>used.has(t[0])).map(t=>`<span><i style="background:${t[2]}"></i>${t[0]} — ${t[1]}</span>`).join('')
      +`<span><i style="background:none;border-top:2px dashed #16232f;border-radius:0;height:0;margin-top:5px"></i>Girth weld</span>`
      +`<span><i style="background:none;border-top:2px dashed #e8913f;border-radius:0;height:0;margin-top:5px"></i>Long seam</span>`;
  }
}

function parseReadings(g){ return String(g.readings||'').split(/[\s,;\t\n]+/).map(x=>parseFloat(x)).filter(x=>isFinite(x)); }

function gridProfileSVG(g){
  const r=riverBottom(g); const awt=num(g.awt);
  if(!r.some(v=>v>0))return '<div style="color:#a9b4bc;font-size:.85rem;padding:14px;text-align:center">River-bottom profile appears here as you fill the grid.</div>';
  const W=980,H=150,L=40,R=14,T=12,B=26;
  const maxV=Math.max(...r, isFinite(awt)?awt:0)||1;
  const bw=(W-L-R)/r.length;
  let s=svgOpen(W,H);
  s+=`<rect x="${L}" y="${T}" width="${W-L-R}" height="${H-T-B}" fill="#fbfcfd" stroke="#d5dbde"/>`;
  if(isFinite(awt)&&awt>0){const y=T+(awt/maxV)*(H-T-B);
    s+=`<line x1="${L}" y1="${y}" x2="${W-R}" y2="${y}" stroke="#b3352c" stroke-dasharray="5 3"/><text x="${W-R-2}" y="${y-3}" font-size="9" text-anchor="end" fill="#b3352c" font-family="IBM Plex Mono,monospace">AWT ${awt} mils</text>`;}
  r.forEach((v,i)=>{const h=(v/maxV)*(H-T-B);
    const over=isFinite(awt)&&v>=awt*0.8;
    s+=`<rect x="${L+i*bw+1}" y="${T}" width="${Math.max(bw-2,1)}" height="${h}" fill="${over?'#b3352c':'#2e5c8a'}" fill-opacity=".8"><title>col ${i+1}: ${v} mils</title></rect>`;});
  s+=`<text x="${(L+W)/2}" y="${H-6}" font-size="10" text-anchor="middle" fill="#3d4f5f" font-family="Barlow Condensed,sans-serif" letter-spacing="2">RIVER-BOTTOM PROFILE (DEEPEST PER COLUMN) · FEEDS RSTRENG</text></svg>`;
  return s;
}
function pitGridsOf(fam){return fam==='h5'?D.h5grids:D.rstreng.grids;}
function pitTable(g,gi,fam='rs'){
  const G=num(g.gridSpacing)||1;
  const rb=riverBottom(g);
  const awt=num(g.awt);
  let h=`<table class="pit"><thead><tr><th class="rowhdr">circ ↓ / axial →</th>`;
  for(let c=0;c<g.cols;c++)h+=`<th>${(c*G).toFixed(G<1?1:0)}"</th>`;
  h+=`</tr></thead><tbody>`;
  for(let r=0;r<g.rows;r++){
    h+=`<tr><th class="rowhdr">R${r+1} · +${(r*G).toFixed(G<1?1:0)}"</th>`;
    for(let c=0;c<g.cols;c++){
      const v=g.cells[r][c];
      const nv=parseFloat(v);
      const preset=D.gridColor[fam==='h5'?'h5':'h4']||'traffic';
      const style=isFinite(nv)&&isFinite(awt)&&awt>0?` style="background:${gradientColor(preset,nv/awt)}"`:'';
      h+=`<td${style}><input inputmode="decimal" data-cell="${fam},${gi},${r},${c}" value="${esc(v)}" aria-label="row ${r+1} col ${c+1}"></td>`;
    }
    h+=`</tr>`;
  }
  h+=`<tr class="rb"><th class="rowhdr">RIVER BTM</th>`;
  for(let c=0;c<g.cols;c++)h+=`<td data-rb="${fam},${gi},${c}">${rb[c]||''}</td>`;
  h+=`</tr></tbody></table>`;
  return h;
}

/* geodesic distance for GPS check (haversine) */
function haversineFt(la1,lo1,la2,lo2){
  const R=20902231, r=Math.PI/180;
  const dLa=(la2-la1)*r, dLo=(lo2-lo1)*r;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*r)*Math.cos(la2*r)*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
function gpsStats(){
  const el=$('#gps-stats'); if(!el)return;
  const rows=D.gps.rows.filter(x=>isFinite(num(x.lat))&&isFinite(num(x.lon))&&num(x.lat)!==0);
  const fts=D.gps.rows.map(x=>num(x.refFt)).filter(isFinite);
  const totalFt=fts.length>1?Math.max(...fts)-Math.min(...fts):NaN;
  let geo=NaN;
  if(rows.length>1){const a=rows[0],b=rows[rows.length-1];geo=haversineFt(num(a.lat),num(a.lon),num(b.lat),num(b.lon));}
  const diff=isFinite(totalFt)&&isFinite(geo)?Math.abs(totalFt-geo):NaN;
  el.innerHTML=
   `<div class="stat"><b>Points w/ coords</b><div class="v">${rows.length}</div></div>
    <div class="stat"><b>Total ref dist</b><div class="v">${fmt(totalFt,1)}<small> ft</small></div></div>
    <div class="stat"><b>Geodesic (1st→last)</b><div class="v">${fmt(geo,1)}<small> ft</small></div></div>
    <div class="stat ${isFinite(diff)?(diff>15?'bad':(diff>5?'mid':'good')):''}"><b>Difference</b><div class="v">${fmt(diff,1)}<small> ft</small></div></div>`;
}
function corrCheck(){
  const el=$('#corr-check'); if(!el)return;
  const rows=D.correlation.filter(r=>isFinite(num(r.iliDepth))&&isFinite(num(r.fieldDepth)));
  if(!rows.length){el.innerHTML='<span style="color:var(--ink3)">Enter ILI depth % and field depth % on a row to check tool tolerance.</span>';return;}
  el.innerHTML=rows.map(r=>{
    const d=num(r.fieldDepth)-num(r.iliDepth), tol=num(r.tol)||10;
    const inTol=Math.abs(d)<=tol;
    return `<div style="padding:4px 0;border-bottom:1px dashed var(--line2)">
      <b style="font-family:var(--mono)">${esc(r.iliId||'?')}</b> → ${esc(r.fieldId||'field')} ·
      Δdepth <b style="font-family:var(--mono);color:${inTol?'var(--pass)':'var(--fail)'}">${d>0?'+':''}${d.toFixed(1)}%</b>
      ${inTol?'within':'<b>outside</b>'} ±${tol}% tolerance</div>`;
  }).join('');
}

/* Cross-check: every EC/CEC/EML indication over the 10% NWT depth threshold (or with L/W recorded)
   should have a matching pit-depth grid. Ported logic from spec 4.5.4 / 6.2. */
function checkGridCoverage(){
  const nwt=wallIn(D.master.nwt)*1000;
  const needing=D.indications.filter(r=>{
    if(!['EC','CEC','EML'].includes(r.type))return false;
    const d=num(r.depth);
    const pctOK=isFinite(d)&&isFinite(nwt)&&nwt>0&&(d/nwt)>=0.10;
    return pctOK||num(r.len)>0||num(r.wid)>0;
  });
  const covered=new Set();
  D.rstreng.grids.forEach(g=>{ if(g.anomaly)covered.add(String(g.anomaly).trim().toUpperCase()); });
  const missing=needing.filter(r=>!covered.has((r.type+'-'+r.id).toUpperCase())&&!covered.has(String(r.id).toUpperCase()));
  return missing;
}

/* ---- internal grids renderer ---- */
function intGridStats(g){
  const vals=g.cells.flat().map(parseFloat).filter(isFinite);
  return {n:vals.length,mn:vals.length?Math.min(...vals):NaN,mx:vals.length?Math.max(...vals):NaN};
}
function intGridClockHdr(g,c){
  const od=num(g.compOD)||num(D.master.diameter), circ=od*Math.PI;
  const start=num(g.circStart), sp=num(g.spacing);
  if(!isFinite(start)||!(sp>0)||!(circ>0))return String(c+1);
  return clockAtCircIn(start+c*sp,circ);
}
function renderIntGrids(){
  const el=$('#intgrids-list'); if(!el)return;
  el.innerHTML=D.intGrids.map((g,i)=>{
    const st=intGridStats(g);
    const nwt=wallIn(D.master.nwt);
    const low=isFinite(st.mn)&&isFinite(nwt)&&st.mn<nwt*0.875;
    const od=num(g.compOD)||num(D.master.diameter);
    const rule=od>6.625?'OD > 6.625&quot; → 1&quot;×1&quot; grid, 12&quot; circ window centered @ 6:00, 12&quot; axial':'OD ≤ 6.625&quot; → 0.5&quot;×0.5&quot; grid, bottom 180°, 12&quot; axial';
    let tbl='';
    if(g.rows&&g.cols){
      tbl='<div class="pitwrap"><table class="pit"><thead><tr><th class="rowhdr">axial ↓ / clock →</th>';
      for(let c=0;c<g.cols;c++)tbl+=`<th>${intGridClockHdr(g,c)}</th>`;
      tbl+='</tr></thead><tbody>';
      const ax0=num(g.axialStart)||0, sp=num(g.spacing)||1;
      for(let r=0;r<g.rows;r++){
        tbl+=`<tr><th class="rowhdr">${(ax0+r*sp/12).toFixed(2)} ft</th>`;
        for(let c=0;c<g.cols;c++){
          const v=g.cells[r][c], nv=parseFloat(v);
          const cls=isFinite(nv)&&isFinite(nwt)&&nwt>0?(nv<nwt*0.8?' class="deep"':(nv<nwt*0.875?' class="warm"':'')):'';
          tbl+=`<td${cls}><input inputmode="decimal" data-icell="${i},${r},${c}" value="${esc(v)}"></td>`;
        }
        tbl+='</tr>';
      }
      tbl+='</tbody></table></div>';
    } else {
      tbl='<div class="banner info">Enter the component O.D. and click <b>Size grid per spec</b> — the grid dimensions, spacing and clock headers come from the Bell-Hole spec rule automatically.</div>';
    }
    return card(`IG-${i+1}`,`Internal corrosion wall-loss grid ${i+1} of ${D.intGrids.length}`,`
      <div class="fgrid">
        ${fld(`intGrids[${i}].gridLoc`,'Grid location / component')}
        ${fld(`intGrids[${i}].compOD`,'Component O.D.','number',{un:'in',step:'any',ph:String(num(D.master.diameter)||'')})}
        ${fld(`intGrids[${i}].axialStart`,'Axial start of grid','number',{un:'deci-ft from zero ref',step:'any'})}
        ${fld(`intGrids[${i}].circStart`,'Circ. start of grid','number',{un:'in from TDC',step:'any'})}
        ${fld(`intGrids[${i}].spacing`,'Grid spacing','number',{un:'in',step:'any'})}
        ${fld(`intGrids[${i}].notes`,'Notes','text',{w:'w2'})}
      </div>
      <div style="margin:10px 0;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <button class="tb-btn pri" data-igsize="${i}">⚙ Size grid per spec</button>
        <span style="font-size:.72rem;color:var(--ink3)">${rule} · readings in <b>inches</b> · paste whole blocks from Excel · red &lt; 80% NWT, amber &lt; 87.5%</span>
      </div>
      ${tbl}
      <div class="stats" style="margin-top:10px">
        <div class="stat"><b>Cells filled</b><div class="v">${st.n}${g.rows?' / '+(g.rows*g.cols):''}</div></div>
        <div class="stat ${low?'bad':''}"><b>Minimum</b><div class="v">${isFinite(st.mn)?st.mn.toFixed(3):'—'}<small> in</small></div></div>
        <div class="stat"><b>Maximum</b><div class="v">${isFinite(st.mx)?st.mx.toFixed(3):'—'}<small> in</small></div></div>
        <div class="stat"><b>Nominal</b><div class="v">${isFinite(nwt)?nwt.toFixed(3):'—'}<small> in</small></div></div>
      </div>
      ${low?'<div class="banner crit" style="margin-top:10px">Minimum remaining wall is below 87.5% of nominal — treat as internal metal loss (IML) and log on the Indication Table.</div>':''}
      ${D.intGrids.length>1?`<div style="margin-top:10px;text-align:right"><button class="del" data-delintgrid="${i}">✕ remove grid</button></div>`:''}`);
  }).join('');
}
/* Wenner 4-pin array: rho = 2*pi*a*R, with a and rho in consistent units.
   Expressed for a soil resistivity in ohm-cm, the constant folds the pin
   spacing conversion in:  a in ft -> 2*pi*30.48 = 191.5 · a in m -> 628.3 ·
   a in cm -> 6.283.  The meter's range multiplier scales the raw reading R. */
const WENNER_K={ft:2*Math.PI*30.48, m:2*Math.PI*100, cm:2*Math.PI};
function computeResistivity(){
  /* --- 4-pin (Wenner): needs the pin spacing, not just a multiplier --- */
  const mult4=num(D.h1.pin4Mult), R4=num(D.h1.pin4Ohms)*(isFinite(mult4)&&mult4!==0?mult4:1);
  const a=num(D.h1.pin4Spacing), k=WENNER_K[D.h1.pin4Unit||'ft']||WENNER_K.ft;
  const p=(isFinite(R4)&&isFinite(a)&&a>0)?k*a*R4:NaN;
  /* --- soil box: the cell constant is built into the box, so reading x range --- */
  const multB=num(D.h1.boxMult), b=num(D.h1.boxOhms)*(isFinite(multB)&&multB!==0?multB:1);
  D.h1.pin4Res=isFinite(p)?String(Math.round(p)):'';
  D.h1.boxRes=isFinite(b)?String(Math.round(b)):'';
  const f1=$('input[data-p="h1.pin4Res"]'); if(f1)f1.value=D.h1.pin4Res;
  const f2=$('input[data-p="h1.boxRes"]'); if(f2)f2.value=D.h1.boxRes;
  const w=$('#pin4-work');
  if(w)w.innerHTML=isFinite(p)
    ? `&rho; = ${k.toFixed(1)} &times; ${a} ${D.h1.pin4Unit||'ft'} &times; ${R4} &Omega; = <b>${Math.round(p).toLocaleString()} &Omega;·cm</b>`
    : (String(D.h1.pin4Ohms).trim()?'<span style="color:var(--amber)">enter the pin spacing to calculate 4-pin resistivity</span>':'');
}
/* dent % OD auto-compute — hook via generic ro refresh */
function refreshDentPct(){
  const od=num(D.master.diameter);
  D.dents.forEach((r,i)=>{
    const d=num(r.depth);
    r.pctOD=(isFinite(d)&&isFinite(od)&&od>0)?(d/od*100).toFixed(1)+'%':'';
    const el=$(`[data-ro="dents[${i}].pctOD"]`); if(el)el.textContent=r.pctOD;
  });
}

/* Outlook / vCard contact import.
   Accepts: this tool's .json, an Outlook CSV export, or a vCard (.vcf).
   Format is detected from the file content so a mis-named file still works. */
function contactsImport(file){
  const rd=new FileReader();
  rd.onload=()=>{try{
    const text=String(rd.result||'');
    const name=(file.name||'').toLowerCase();
    const head=text.slice(0,4000);
    let parsed;
    if(name.endsWith('.vcf')||name.endsWith('.vcard')||/^BEGIN:VCARD/im.test(head)){
      parsed=parseVCards(text);
    } else if(name.endsWith('.csv')||(/,/.test(head)&&/(e-?mail|first name|last name|display name|full name|job title)/i.test(head))){
      parsed=parseOutlookCSV(text);
    } else {
      const obj=JSON.parse(text);
      const c=obj._type==='hform-contacts'?obj.contacts:(obj.contacts||obj);
      if(typeof c!=='object'||!Object.keys(c).length)throw new Error('no contacts found in file');
      parsed=c;
    }
    const found=Object.keys(parsed).length;
    if(!found)throw new Error('no usable contacts were found in that file');
    mergeContacts(parsed);
  }catch(e){alert('Could not import contacts: '+e.message);}};
  rd.readAsText(file);
}

/* merge imported people into CONTACTS (keeps existing, adds/updates by name) */
function mergeContacts(incoming){
  const existing=Object.keys(CONTACTS).length;
  const inNames=Object.keys(incoming);
  const dupes=inNames.filter(n=>CONTACTS[n]);
  let mode='merge';
  if(existing){
    const msg=`Import ${inNames.length} contact(s)?\n\n`+
      `• OK — merge into your current ${existing} contact(s)`+(dupes.length?` (updates ${dupes.length} matching name(s))`:'')+`\n`+
      `• Cancel — replace the list entirely with the ${inNames.length} imported contact(s)`;
    mode=confirm(msg)?'merge':'replace';
  }
  if(mode==='replace')CONTACTS={};
  const zoneDefault=(D.master.zone&&D.master.zone!=='Select Zone'&&D.master.zone!=='Other')?D.master.zone:'North';
  inNames.forEach(n=>{
    const src=incoming[n]||{};
    const prev=CONTACTS[n]||{};
    CONTACTS[n]={
      title:src.title||prev.title||'',
      email:src.email||prev.email||'',
      phone:src.phone||prev.phone||'',
      zone:src.zone||prev.zone||zoneDefault
    };
  });
  rebuildAfterRoster();
  nav('contacts');
  alert(`Imported ${inNames.length} contact(s). Directory now has ${Object.keys(CONTACTS).length}.`);
}

/* --- Outlook CSV --- header names cover Outlook desktop + Outlook.com/People exports --- */
function parseOutlookCSV(text){
  const rows=parseCSV(text);
  if(rows.length<2)throw new Error('CSV needs a header row and at least one contact');
  const hdr=rows[0].map(h=>h.trim().toLowerCase());
  const col=res=>{for(let i=0;i<hdr.length;i++)for(const re of res)if(re.test(hdr[i]))return i;return -1;};
  const iFirst =col([/^first name$/,/^given name$/]);
  const iLast  =col([/^last name$/,/^surname$/,/^family name$/]);
  const iMiddle=col([/^middle name$/]);
  const iDisp  =col([/^(display name|full name|name)$/]);
  const iEmail =col([/e-?mail address$/,/^e-?mail$/,/email 1|primary email/,/e-?mail.*address/]);
  /* "Job Title" must win over Outlook's name-prefix "Title" column (Mr./Dr./…) */
  const iTitle =(()=>{const j=col([/^job title$/,/^role$/,/^position$/]);return j>=0?j:col([/^title$/]);})();
  const iPhoneB=col([/business phone|work phone|office phone/]);
  const iPhoneM=col([/mobile phone|cell phone|^mobile$/]);
  const iPhoneAny=col([/phone/]);
  const iCompany=col([/^company$|^organization$/]);
  const iZone  =col([/zone/]);
  const out={};
  rows.slice(1).forEach(r=>{
    const g=i=>i>=0?String(r[i]??'').trim():'';
    let nm=g(iDisp);
    if(!nm){nm=[g(iFirst),g(iMiddle),g(iLast)].filter(Boolean).join(' ').trim();}
    const email=g(iEmail);
    if(!nm&&!email)return;               // skip empty rows
    if(!nm)nm=email;                     // fall back to the email as the name
    let phone=g(iPhoneB)||g(iPhoneM)||(iPhoneAny>=0?g(iPhoneAny):'');
    const title=g(iTitle)||(iCompany>=0?g(iCompany):'');   // company only if no job title
    let key=nm, k=2; while(out[key])key=nm+' ('+(k++)+')';   // de-dupe within the file
    out[key]={title,email,phone,zone:g(iZone)};
  });
  if(!Object.keys(out).length)throw new Error('no rows with a name or e-mail address');
  return out;
}

/* --- vCard (.vcf) --- handles multi-card files and quoted-printable/folded lines --- */
function parseVCards(text){
  const unfolded=text.replace(/\r\n/g,'\n').replace(/\n[ \t]/g,'');  // join folded lines
  const cards=unfolded.split(/BEGIN:VCARD/i).slice(1);
  const out={};
  cards.forEach(card=>{
    const get=re=>{const m=card.match(re);return m?m[1].trim():'';};
    let fn=get(/\nFN[^:]*:(.*)/i);
    if(!fn){
      const n=get(/\nN[^:]*:(.*)/i);                 // N: Last;First;Middle;…
      if(n){const p=n.split(';');fn=[p[1],p[2],p[0]].filter(Boolean).join(' ').trim();}
    }
    const email=get(/\nEMAIL[^:]*:(.*)/i);
    if(!fn&&!email)return;
    if(!fn)fn=email;
    const title=get(/\nTITLE[^:]*:(.*)/i)||get(/\nORG[^:]*:(.*)/i).split(';')[0].trim();
    const tel=get(/\nTEL[^:]*:(.*)/i);
    let key=fn,k=2; while(out[key])key=fn+' ('+(k++)+')';
    out[key]={title,email,phone:tel,zone:''};
  });
  if(!Object.keys(out).length)throw new Error('no VCARD entries with a name or e-mail');
  return out;
}

/* Push the values applyZoneContacts() wrote into the already-rendered inputs.

function applyZoneContacts(zoneChanged){
  const z=D.master.zone;
  if(!z||z==='Select Zone')return;
  /* Zone-driven roles (workbook Master D7/D10/D13/D16). Only North/South/Bay
     have a mapping; the workbook's IF-chain returns blank for anything else. */
  if(ZONE_ROLES.pm[z]){
    D.master.pm=ZONE_ROLES.pm[z];

    D.master.contractorPM=ZONE_ROLES.contractorPM[z];

  } else if(zoneChanged){

       entered freely (only on an explicit zone change, never on a re-sync,
       so manual entries are never wiped underneath the user) */
    D.master.pm=D.master.cm=D.master.contractorPM=D.master.leadInspector='';
  }
  /* Fixed roles: only seed if still blank, so a manual entry is never overwritten. */
  Object.entries(FIXED_ROLE_DEFAULTS).forEach(([k,nm])=>{ if(!D.master[k])D.master[k]=nm; });
  /* keep the PM email in sync for the mailto "To" */
  if(D.master.pm)D.master.pmEmail=lookupEmail(D.master.pm)||D.master.pmEmail;

     verbatim, so no one on the list is dropped or hidden. */
  if(ZONE_NAMES.includes(z)){

  syncContactFields();   // push the new values into the fields already on screen
}

function clockToInches(clock,circ){
  const c=clockToNum(clock), C=num(circ);

  return String(Math.round((c%12)*C/12*100)/100);

/* --- SyncXML: data_id = event_id*100000 + days since 1900 + fractional day (exact port) --- */
function sSyncXML(){
  const eid=String(D.master.eventId||'').replace(/\D/g,'');
  let dataId='0';
  const n=parseFloat(eid);
  if(isFinite(n)&&n>0){
    const now=new Date();
    const days=Math.floor((now-new Date(1900,0,1))/86400000);
    const frac=(now.getHours()*3600+now.getMinutes()*60+now.getSeconds())/86400;
    dataId=(n*100000+days+frac).toFixed(4);

      if(dz>10)dz=dz/1000; /* mils→inches, VBA rule */
      utc+=`<GridPoints${attr('grid_type','UTC')}${attr('anomaly_id',id)}${attr('grid_point',String(gp))}${attr('reference_id',id)}${attr('pos_x005F_x',isFinite(posIn)?posIn:'')}${attr('pos_y',Math.round(num(clockToInches(UTT_CLOCKS[j],circ))||0))}${attr('dim_z',dz)}${attr('notes',id+' UT Wall Thickness-'+(j===0?'TDC':j+" O'clock"))}${attr('last_edited_by',creatorName())}${attr('last_edited_on',nowISO())} />\n`;
    });
  });
  return sx+utc;
}

function sGridsCDXML(){

/* --- Indication EC/MD/MP grids (sGridsXML port; notes = TYPE-NO,comments + interactions + eng decision) --- */
function sGridsXML(){
  const circ=siteCirc();
  return D.indications.filter(r=>r.type&&TCAT_LEGEND[r.type]).map((r,i)=>{
    const [pre,gt,def]=TCAT_LEGEND[r.type];
    const no=r.id||String(i+1);
    let dz=num(r.depth); if(isFinite(dz)&&dz>10)dz=dz/1000;
    let notes=`${r.type}-${no},${r.comments||''}`;
    if(r.decision)notes+=` ENG DECISION: ${r.decision}`;

  }).join('\n');
}
function buildTCATXML(){

const COAT_PHRASES={DBT:'areas of disbonded coating (DBT)',HOL:'coating holidays (HOL)',CAL:'areas of calcareous deposits (CAL)',BLST:'coating blisters (BLST)',PAT:'coating patches (PAT)',RST:'rust deposits (RST)',SAG:'sagging areas (SAG)',WRK:'wrinkled areas (WRK)'};
function countsBy(rows,key='type'){const c={};rows.forEach(r=>{if(r[key])c[r[key]]=(c[r[key]]||0)+1;});return c;}
function composeFindings(){
  const m=D.master, out=[];
  const coats=(D.h1.coatingTypeFound||[]).join(' and ')||m.coatingType||'existing';
  out.push(`Coating Assessment was performed on ${coats} Coating.`);
  const cc=countsBy(D.coatDamage);
  const ccTxt=Object.entries(cc).map(([k,v])=>{let p=COAT_PHRASES[k]||k;if(v===1)p=p.replace(/^areas /,'area ').replace(/holidays/,'holiday').replace(/blisters/,'blister').replace(/patches/,'patch').replace(/deposits/,'deposit');return `${v} ${p}`;}).join(', ');
  out.push(ccTxt?`Coating Assessment revealed ${ccTxt}.`:'No coating damages were observed.');
  const metal=D.indications.filter(r=>r.type&&!['LIN','SCC'].includes(r.type));
  const mc=countsBy(metal);
  const mcTxt=Object.entries(mc).map(([k,v])=>{const t=IND_TYPES.find(x=>x[0]===k);const nm=t?t[1]:k;return `${v} ${nm}${v>1&&!/s$/.test(nm)?'s':''} (${k})`;}).join(', ');
  out.push(mcTxt?`Visual Assessment revealed ${D.sections.length} sections within the assessment area consisting of ${mcTxt}.`
               :`Visual Assessment revealed ${D.sections.length} sections within the assessment area with no anomalous conditions.`);
  const lin=D.indications.filter(r=>['LIN','SCC'].includes(r.type)).length;
  out.push(lin?`WFMT revealed ${lin} Linear Indication${lin>1?'s':''} (LIN).`:'WFMT revealed no relevant indications.');
  out.push('No indications detected with UTT.');
  const etched=NDE('acid').rows.filter(r=>r.axial||r.seam);
  if(etched.length){
    const secNames=etched.map(r=>String(r.axial).replace(/section\s*/i,'')).filter(Boolean);
    const smls=D.sections.map((s,i)=>({i:i+1,t:s.seamType})).filter(x=>x.t==='SMLS').map(x=>x.i);
    const erw=D.sections.map((s,i)=>({i:i+1,t:s.seamType,c:s.seamLoc})).filter(x=>x.t==='ERW');
    let line=`Acid Etch was performed on sections ${secNames.join(', ').replace(/, ([^,]*)$/,' & $1')}.`;
    if(smls.length)line+=` No seam was detected on sections ${smls.join(' & ')} (SMLS)`;
    if(erw.length)line+=`${smls.length?' while an':' An'} ERW was observed on sections ${erw.map(x=>`${x.i} (${x.c})`).join(', ')}.`;
    else if(smls.length)line+='.';
    out.push(line);
  }
  out.push((D.h1.groundMove||[]).some(g=>g!=='None')?'Evidence of ground movement observed — see H1.':'No evidence of encroachment observed.');
  return out.join('\n');
}

    {lx:sx+bw+pad, ly:sy-lh-pad},{lx:sx-lw-pad, ly:sy-lh-pad},
    {lx:sx+bw+pad, ly:sy+bh+pad},{lx:sx-lw-pad, ly:sy+bh+pad},
    {lx:sx+bw+pad, ly:sy+pad},{lx:sx-lw-pad, ly:sy+pad},
    {lx:sx+pad, ly:sy-lh-pad},{lx:sx+bw/2-lw/2, ly:sy-lh-pad}];

    for(let ni=0;ni<60&&!placed;ni++){

      for(const o of occ){ if(lx<o.x+o.w+1&&lx+lw>o.x-1&&ly<o.y+o.h+1&&ly+lh>o.y-1){clear=false;break;} }

function gridMapSVG(kind){
  const m=D.master;
  const rows=kind==='coat'?D.coatDamage:D.indications;
  const colors=kind==='coat'?RMAP_COAT:RMAP_IND;
  const gw=[...new Set(D.sections.flatMap(s2=>[num(s2.start),num(s2.end)]).filter(isFinite))].sort((a,b)=>a-b);
  const xsAll=[...rows.map(r=>num(r.dist)),...gw,num(m.assessStart)||0,num(m.assessEnd)].filter(isFinite);
  let x0=Math.min(0,...xsAll), x1=Math.max(10,...xsAll);
  x1=Math.ceil(x1); x0=Math.floor(x0);
  const circ=siteCirc()||num(m.diameter)*Math.PI||33.8;
  const W=920,LW=40,RW=40,TH=16,BH=16,GLB=56;
  const GH=24*15, H=TH+GH+BH+GLB;
  const X=v=>LW+((v-x0)/((x1-x0)||1))*(W-LW-RW);
  const Yc=c=>TH+((((c%12)+12)%12)/12)*GH;
  let s=svgOpen(W,H);
  s+=`<rect x="${LW}" y="${TH}" width="${W-LW-RW}" height="${GH}" fill="#fff" stroke="#000" stroke-width="1.4"/>`;
  const ftStep=(x1-x0)>20?Math.ceil((x1-x0)/10):1;
  for(let f=x0;f<=x1;f+=ftStep){
    s+=`<text x="${X(f)+2}" y="${TH-4}" font-size="8.5" font-weight="bold">${f.toFixed(2)}'</text>`;
    s+=`<text x="${X(f)+2}" y="${TH+GH+11}" font-size="8.5" font-weight="bold">${f.toFixed(2)}'</text>`;
    if(f>x0)s+=`<line x1="${X(f)}" y1="${TH}" x2="${X(f)}" y2="${TH+GH}" stroke="#eee"/>`;
  }
  s+=`<text x="${LW-4}" y="${TH-4}" font-size="8.5" font-weight="bold" text-anchor="end">Feet</text>`;
  s+=`<text x="${LW-4}" y="${TH+GH+11}" font-size="8.5" font-weight="bold" text-anchor="end">Feet</text>`;
  for(let i=0;i<24;i++){
    const c=i/2, y=Yc(c);
    const lab=clockLabel(c===0?12:c);
    s+=`<line x1="${LW}" y1="${y}" x2="${W-RW}" y2="${y}" stroke="#bbb" stroke-dasharray="3 3" stroke-width="${i%2?0.4:0.7}"/>`;
    s+=`<text x="${LW-4}" y="${y+9}" font-size="8" text-anchor="end">${lab}</text>`;
    s+=`<text x="${W-RW+4}" y="${y+9}" font-size="8">${lab}</text>`;
  }
  gw.forEach(g=>{
    s+=`<line x1="${X(g)}" y1="${TH}" x2="${X(g)}" y2="${TH+GH}" stroke="#2e74b5" stroke-width="1.3" stroke-dasharray="6 4"/>`;
    s+=`<text transform="translate(${X(g)+3},${TH+GH+BH+GLB-6}) rotate(-90)" font-size="8.5" fill="#c00000">GW @ ${g.toFixed(2)}'</text>`;
  });
  const occ=[];
  D.sections.forEach(sec=>{
    const c=clockToNum(sec.seamLoc),a=num(sec.start),b=num(sec.end);
    if(isFinite(c)&&isFinite(a)&&isFinite(b)){
      s+=`<line x1="${X(a)}" y1="${Yc(c)}" x2="${X(b)}" y2="${Yc(c)}" stroke="#2e74b5" stroke-width="1.1" stroke-dasharray="2 3"/>`;
      s+=`<text x="${X(a)+3}" y="${Yc(c)-2}" font-size="6.5" fill="#2e74b5">Seam @ ${rEsc(sec.seamLoc)}</text>`;
      occ.push({x:X(a),y:Yc(c)-9,w:60,h:10});
    }
  });
  /* pass 1: geometry with wrap-splitting + clamping; seed occupancy with every box part */
  const items=[];
  rows.forEach((r,i)=>{
    const x=num(r.dist); if(!isFinite(x))return;
    const t=r.type||''; const [fill,stroke]=colors[t]||['#ccc','#666'];
    const lenFt=Math.max((num(r.len)||1)/12,0.04*(x1-x0)/10);
    const circExt=kind==='coat'?num(r.circ):num(r.wid);
    const hClk=isFinite(circExt)&&circExt>0?Math.max(circExt/circ*12,0.35):0.5;
    const c=clockToNum(r.clock); const cy=isFinite(c)?Yc(c):Yc(6);
    let rx=Math.max(X(x),LW+1);
    let rw=Math.max(X(x+lenFt)-rx,4);
    if(rx+rw>W-RW-1)rw=Math.max(W-RW-1-rx,4);
    const rh=Math.min(Math.max(hClk/12*GH,6),GH);
    const id=(kind==='coat'?(t+'-'+String(r.no||i+1).padStart(3,'0')):(t+'-'+String(r.id||i+1).padStart(3,'0')));
    /* wrap across 12:00 / 11:30 boundary: split into up to 2 parts */
    let yTop=cy-rh/2, parts=[];
    if(yTop<TH){ /* extends above 12:00 → wraps to bottom of map */
      const over=TH-yTop;
      parts.push({y:TH,h:rh-over});
      parts.push({y:TH+GH-over,h:over,wrapped:true});
    } else if(yTop+rh>TH+GH){ /* extends past 11:30 → wraps to top */
      const over=(yTop+rh)-(TH+GH);
      parts.push({y:yTop,h:rh-over});
      parts.push({y:TH,h:over,wrapped:true});
    } else parts.push({y:yTop,h:rh});
    parts.forEach(p=>occ.push({x:rx,y:p.y,w:rw,h:p.h}));
    items.push({rx,rw,parts,fill,stroke,id,x,clock:r.clock});
  });
  /* pass 2: draw boxes */
  items.forEach(it=>{
    it.parts.forEach(p=>{
      s+=`<rect x="${it.rx}" y="${p.y}" width="${it.rw}" height="${p.h}" fill="${it.fill}" fill-opacity=".9" stroke="${it.stroke}" stroke-width="1"${p.wrapped?' stroke-dasharray="3 2"':''}><title>${rEsc(it.id)} · ${it.x} ft · ${rEsc(it.clock||'')}</title></rect>`;
    });
  });
  /* pass 3: labels with collision avoidance + corner leaders */
  items.forEach(it=>{
    const p0=it.parts[0];
    const L2=placeMapLabel(occ,it.rx,p0.y,it.rw,p0.h,it.id,W,TH,GH);
    s+=`<line x1="${L2.lx+L2.lw/2}" y1="${L2.ly+L2.lh/2}" x2="${L2.ax}" y2="${L2.ay}" stroke="#666" stroke-width=".5"/>`;
    s+=`<rect x="${L2.lx}" y="${L2.ly}" width="${L2.lw}" height="${L2.lh}" fill="#fff" fill-opacity=".92" stroke="#999" stroke-width=".5"/>`;
    s+=`<text x="${L2.lx+3}" y="${L2.ly+8}" font-size="7.5">${rEsc(it.id)}</text>`;
  });
  s+='</svg>';
  return s;
}

function h3DiagramSVG(forReport){
  const m=D.master,p=D.profile;
  const secs=D.sections.filter(s=>isFinite(num(s.start)));
  const a0=isFinite(num(m.assessStart))?num(m.assessStart):(secs.length?Math.min(...secs.map(s=>num(s.start))):0);
  const aEnd=[...secs.map(s=>num(s.end)),num(m.assessEnd)].filter(isFinite);
  const a1=aEnd.length?Math.max(...aEnd):a0+10;
  const W=940,H=470,L=90,R=170,T=86,PIPE_Y=250,SOIL_T=140,SOIL_B=400;
  const X=v=>L+((v-a0)/((a1-a0)||1))*(W-L-R);
  /* vertical scale: the depth ruler is 4 divisions of 1.64 ft over (SOIL_B-58-SOIL_T)px */
  const VPXFT=((SOIL_B-58-SOIL_T)/4)/1.64;
  let s=svgOpen(W,H).replace('<svg ',`<svg data-h3scale="${(a1-a0)/(W-L-R)}" data-h3vscale="${1/VPXFT}" `)+FIT_GRAD;
  /* inclination + DoC boxes */
  const box=(x,txt,pre)=>`<rect x="${x-30}" y="${T-70}" width="60" height="20" fill="#fff" stroke="#000"/><text x="${x}" y="${T-56}" font-size="11" text-anchor="middle">${pre}${txt||'—'}</text>`;
  s+=`<text x="${(L+W-R)/2}" y="${T-78}" font-size="10" text-anchor="middle">Inclination Angle (degrees)</text>`;
  const sign=v=>{const n=num(v);return isFinite(n)?((n<0?'-  ':'+  ')+Math.abs(n)):'';};
  s+=box(X(a0)+30,sign(p.inclUS),'')+box((X(a0)+X(a1))/2,sign(p.inclCtr),'')+box(X(a1)-30,sign(p.inclDS),'');
  s+=`<text x="${(L+W-R)/2}" y="${T-30}" font-size="10" text-anchor="middle">Depth of Cover</text>`;
  const dbox=(x,v)=>`<rect x="${x-26}" y="${T-24}" width="52" height="20" fill="#fff" stroke="#000"/><text x="${x}" y="${T-10}" font-size="11" text-anchor="middle">${v||'—'}</text>`;
  s+=dbox(X(a0)+30,D.h1.docUS)+dbox((X(a0)+X(a1))/2,D.h1.docCtr)+dbox(X(a1)-30,D.h1.docDS);
  /* compass */
  s+=`<g transform="translate(${L-52},${T+16})"><text x="0" y="0" font-size="13" font-weight="bold">N</text><path d="M10,22 L16,2 L22,22 L16,15 Z" fill="#000"/></g>`;
  /* soil */
  s+=`<rect x="${L-14}" y="${SOIL_T}" width="${W-L-R+28}" height="${SOIL_B-SOIL_T}" fill="#e8e0c8"/>`;
  s+=`<rect x="${L-14}" y="${SOIL_B-58}" width="${W-L-R+28}" height="58" fill="#7a4a21"/>`;
  s+=`<rect x="${L-14}" y="${SOIL_T}" width="${W-L-R+28}" height="${SOIL_B-SOIL_T}" fill="url(#)" stroke="#8a6b3f" stroke-width="1"/>`;
  for(let gx=0;gx<=8;gx++){const xx=L-14+gx*(W-L-R+28)/8;s+=`<line x1="${xx}" y1="${SOIL_T}" x2="${xx}" y2="${SOIL_B-58}" stroke="#cfc5a5" stroke-width=".6"/>`;}
  for(let gy=0;gy<4;gy++){const yy=SOIL_T+gy*(SOIL_B-58-SOIL_T)/4;s+=`<line x1="${L-14}" y1="${yy}" x2="${W-R+14}" y2="${yy}" stroke="#cfc5a5" stroke-width=".6"/>`;}
  /* depth scale left */

function gpsSchematicSVG(){
  const pts=D.gps.rows.filter(r=>r.label);
  const W=940,H=210,L=60,R=60,PIPE_Y=150;
  let s=svgOpen(W,H);
  s+=`<rect x="10" y="60" width="46" height="120" fill="#7a4a21"/><rect x="${W-56}" y="60" width="46" height="120" fill="#7a4a21"/>`;
  s+=`<circle cx="${L+40}" cy="${PIPE_Y}" r="24" fill="#5b9bd5" stroke="#2f5a86" stroke-width="1.5"/>`;
  s+=`<rect x="${L+64}" y="${PIPE_Y-15}" width="${W-L-R-140}" height="30" rx="3" fill="#d5d5d5" stroke="#555"/>`;
  s+=`<rect x="${W-R-76}" y="${PIPE_Y-15}" width="30" height="30" fill="#3a3a3a"/>`;
  s+=`<text x="${L+90}" y="${PIPE_Y+42}" font-size="11" font-weight="700">FLOW</text><line x1="${L+140}" y1="${PIPE_Y+38}" x2="${L+230}" y2="${PIPE_Y+38}" stroke="#000" stroke-width="2" marker-end="url(#arr)"/><defs><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z"/></marker></defs>`;
  const n=pts.length||1;
  pts.forEach((p,i)=>{
    const x=L+30+((W-L-R-70)/Math.max(n-1,1))*i;
    s+=`<text transform="translate(${x},52) rotate(-90)" font-size="8" text-anchor="start">${rEsc(p.label)}</text>`;
    s+=`<line x1="${x}" y1="58" x2="${x}" y2="${PIPE_Y-22}" stroke="#000" stroke-width=".9" marker-end="url(#arr)"/>`;
  });
  s+='</svg>';
  return s;
}

   DATA AUTOMATION — CSV import · corrosion pull · photo gen
   ============================================================ */
function parseCSV(text){
  const rows=[]; let row=[],cur='',inQ=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(inQ){ if(ch==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else inQ=false; } else cur+=ch; }
    else if(ch==='"')inQ=true;
    else if(ch===','||ch==='\t'){row.push(cur);cur='';}
    else if(ch==='\n'||ch==='\r'){ if(ch==='\r'&&text[i+1]==='\n')i++; row.push(cur);cur='';
      if(row.some(c=>c.trim()!==''))rows.push(row); row=[]; }
    else cur+=ch;
  }
  if(cur!==''||row.length){row.push(cur); if(row.some(c=>c.trim()!==''))rows.push(row);}
  return rows;
}
const CSV_MAP=[
 ['id',      /ind.*(i\.?d\.?|number)|anomaly.*id|^id$|^no\.?$/i],
 ['type',    /ind.*type|^type$|legend/i],
 ['surf',    /id\/od|surface|od\/id/i],
 ['dist',    /dist|feet.*ref|axial|from ref|log ?dist/i],
 ['clock',   /clock|orientation|o'?clock/i],
 ['len',     /^len|length/i],
 ['wid',     /^wid|width/i],
 ['depth',   /depth(?!.*%)|deep/i],
 ['awt',     /awt|actual wall/i],
 ['method',  /sizing|method/i],
 ['comments',/comment|note|remark/i],
 ['decision',/decision|eng/i],
 ['repair',  /repair/i],
];
function csvImportIndications(file){
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const rows=parseCSV(String(rd.result));
      if(rows.length<2)throw new Error('file needs a header row plus at least one data row');
      const hdr=rows[0];
      const colFor={};
      hdr.forEach((h,i)=>{ for(const [key,re] of CSV_MAP){ if(colFor[key]===undefined&&re.test(h.trim())){colFor[key]=i;break;} } });
      if(colFor.type===undefined&&colFor.dist===undefined)throw new Error('could not recognize any columns — headers found: '+hdr.join(', '));
      let added=0;
      rows.slice(1).forEach(r=>{
        const get=k=>colFor[k]!==undefined?String(r[colFor[k]]??'').trim():'';
        if(!get('type')&&!get('dist'))return;
        D.indications.push({id:get('id')||String(D.indications.length+1).padStart(3,'0'),
          type:get('type').toUpperCase(),surf:get('surf')||'OD',dist:get('dist'),clock:get('clock'),
          len:get('len'),wid:get('wid'),depth:get('depth'),awt:get('awt'),
          method:get('method'),comments:get('comments'),decision:get('decision'),repair:get('repair')});
        added++;
      });
      renderTable('ind'); refresh('ind');
      alert(`Imported ${added} indication(s).\nMapped columns: ${Object.entries(colFor).map(([k,i])=>k+'←"'+hdr[i]+'"').join(', ')}`);
    }catch(e){alert('CSV import failed: '+e.message);}
  };
  rd.readAsText(file);
}

  const have=new Set(D.corrLog.map(r=>(r.comments||'').split(' ')[0]));

  });

}
